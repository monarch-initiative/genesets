  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy pancreatic cancer pathway gene set (MSigDB C2 curated gene set).
  This is a cancer disease pathway gene set, not a cell-type signature. The member
  genes are heavily enriched for KRAS/RAS-MAPK signaling components (KRAS, RAF1,
  MAP2K1, MAPK1/3), PI3K/AKT effectors (PIK3CA, PIK3CG, AKT1/2, PTEN), TP53 and
  cell-cycle regulators (CDKN2A, RB1, CDK4/6), TGF-beta pathway members (TGFB1/2,
  SMAD2/3/4, TGFBR1/2), and apoptosis modulators (CASP3/9, BCL2-family), reflecting
  the major mechanistic arms of the KEGG pancreatic cancer pathway: KRAS-driven
  proliferation, PI3K/AKT survival signaling, TP53/CDKN2A-mediated cell-cycle
  dysregulation, TGF-beta/SMAD invasion signaling, and apoptosis evasion.
