  - term:
      id: GO:0050852
      label: T cell receptor signaling pathway
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    evidence:
      - reference: PMID:28847903
        reference_title: "T Helper Cell Differentiation, Heterogeneity, and Plasticity."
        supports: SUPPORT
        evidence_source: OTHER
        snippet: "The differentiation of Th cells relies on the strength of T-cell receptor (TCR) signaling and signals triggered by polarizing cytokines that activate and/or up-regulate particular transcription factors."
        explanation: >-
          TCR signaling is the initiating event for CD4+ T helper cell activation and
          subsequent differentiation into effector subsets (Th1, Th2, Th17, Tfh).
          Canonical TCR signaling genes (CD3D, CD3E, CD3G, ZAP70, LAT, LCK) are
          high-confidence markers of CD4+ T cells and are well annotated to this
          GO term. This review establishes TCR signaling strength as a determinant
          of CD4 T helper cell fate decisions.
  - term:
      id: GO:0042110
      label: T cell activation
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      T cell activation encompasses the morphological and functional changes that
      follow antigen recognition by CD4+ T cells through their TCR-CD4 complex,
      including cytokine production, co-stimulatory receptor upregulation, and
      proliferation. Activation marker genes (CD28, ICOS, IL2RA) are canonical
      components of this signature.
  - term:
      id: GO:0001772
      label: immunological synapse
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      The immunological synapse is the specialized contact zone formed between a
      CD4+ T cell and an antigen-presenting cell, where TCR, CD4, and co-stimulatory
      receptors (CD28, LFA-1) cluster to facilitate antigen recognition and signal
      transduction. It is the defining cell-biological structure of TCR-mediated T
      cell activation and is expected to be enriched in CD4+ T cell marker sets.
  - term:
      id: GO:0043367
      label: CD4-positive, alpha-beta T cell differentiation
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      This term captures the developmental process by which precursor cells commit
      to the CD4+ alpha-beta T cell lineage. It is a supporting annotation because
      the bone marrow gene set primarily marks mature resting CD4+ T cells rather
      than actively differentiating progenitors; nonetheless, lineage-defining
      transcription factors (GATA3, TBX21, RORC in effector subsets) and surface
      markers (CD4) annotated here are expected enrichment hits.
  - term:
      id: GO:0006955
      label: immune response
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Generic immune response term recovered by enrichment of any immune cell
      signature. CD4+ T helper cells are central coordinators of adaptive immune
      responses, but this term is too broad to serve as a specific annotation;
      it is shared with virtually all immune and non-immune cell types under
      relevant conditions.
  - term:
      id: GO:0006412
      label: translation
    aspect: biological_process
    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Translation is a ubiquitous housekeeping process. Its appearance in
      enrichment results reflects highly expressed ribosomal protein genes in
      bone marrow CD4+ T cells, not a T cell-specific function. Illustrates a
      non-informative enrichment hit common across immune cell type signatures.
  - term:
      id: GO:0030217
      label: T cell differentiation
    aspect: biological_process
    category: core_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: curator_added
    recovery_status: annotation_gap
    curator_note: >-
      T cell differentiation is biologically core to CD4+ T cell identity —
      surface markers (CD4), lineage transcription factors (ThPOK/ZBTB7B), and
      co-receptors in this signature directly reflect the differentiated CD4+
      T helper lineage. This is an annotation_gap: the relevant marker genes
      ARE in the set but many lack explicit GO:0030217 annotations in GOA-human
      (annotations are often placed on more specific child terms such as
      GO:0043367, leaving the parent under-populated for enrichment recovery).
      Recorded as a curation target to improve GO annotation coverage.
