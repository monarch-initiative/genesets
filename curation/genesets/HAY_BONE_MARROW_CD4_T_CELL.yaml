taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of CD4-positive, alpha-beta T (helper) cells from human
  bone marrow (Hay et al.). CD4+ T helper cells are adaptive immune lymphocytes that
  recognise peptide-MHC class II complexes on antigen-presenting cells via their
  T cell receptor (TCR) and coordinate downstream immune responses through cytokine
  secretion, B cell help, and activation of innate effectors. In bone marrow they
  exist primarily as resting memory cells.
