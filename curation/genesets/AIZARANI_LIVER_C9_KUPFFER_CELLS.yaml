taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of Kupffer cells (resident liver macrophages)
  from human liver (Aizarani et al.). Kupffer cells are the primary hepatic
  tissue-resident macrophages that patrol the liver sinusoids, phagocytose
  pathogens and cellular debris, and regulate hepatic immune homeostasis via
  innate immune sensing, complement-mediated clearance, and cytokine secretion.
