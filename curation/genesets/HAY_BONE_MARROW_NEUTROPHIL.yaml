gene_set_id: MSIGDB:HAY_BONE_MARROW_NEUTROPHIL
gene_set_name: HAY_BONE_MARROW_NEUTROPHIL
collection: C8
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of neutrophils (granulocytes) from human bone marrow
  (Hay et al.). Neutrophils are the most abundant circulating leukocytes and the
  first-responder cells of innate immunity, specialised for phagocytosis of
  microorganisms, degranulation of preformed cytotoxic granules (azurophil,
  specific, and gelatinase granules), and generation of a respiratory burst via
  NADPH oxidase.
