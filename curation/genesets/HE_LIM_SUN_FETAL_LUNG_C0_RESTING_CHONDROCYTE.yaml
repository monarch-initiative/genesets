  - term:
      id: GO:0030198
      label: extracellular matrix organization
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The chondrocyte's principal effector function is secreting and organising
      the cartilage extracellular matrix. Carriers present in the set span the
      fibrillar and network collagens (COL2A1, COL9A1/A2/A3, COL11A1/A2,
      COL12A1, COL27A1), the large aggregating proteoglycan ACAN, link protein
      HAPLN1, the matrilins (MATN1/MATN3/MATN4), small leucine-rich
      proteoglycans PRELP and EPYC, and chondroadherin CHAD — all annotated to
      extracellular matrix organization or children (annotation_supported).
      Categorised core_process because matrix production is the chondrocyte's
      defining activity, but specificity is lineage_shared because ECM
      organization is a generic property of matrix-producing connective-tissue
      cells; here it is realised as the cartilage-specific matrix. Confirmatory.
  - term:
      id: GO:0030199
      label: collagen fibril organization
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Cartilage collagen fibrils are heterotypic assemblies of type II, type XI
      and type IX collagen, where the type XI and type IX collagens template
      and constrain the diameter and spacing of the COL2A1 fibril core. Carrier
      genes COL2A1, COL11A1, COL11A2 and COL9A1 (all present) are annotated to
      collagen fibril organization in goa_human (annotation_supported).
      Categorised supporting_process because it is a specific sub-aspect of the
      broader matrix-building role rather than the top-level defining process.
      Confirmatory.
  - term:
