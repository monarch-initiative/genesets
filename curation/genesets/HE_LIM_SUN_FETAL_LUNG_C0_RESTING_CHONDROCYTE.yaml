    insight: confirmatory
    curator_note: >-
      Cartilage development is the defining developmental program of the
      chondrocyte. The master chondrogenic transcription factor SOX9, together
      with its co-factors SOX5 and SOX6, drives the cartilage matrix program.
      The set carries SOX9, SOX5, SOX6, SOX8, COL2A1, ACAN, COL11A1, COL11A2,
      COL9A1/A2/A3, MATN3, GDF5, NOG, FGFR3 and TRPV4, which are directly
      annotated to cartilage development or its children in goa_human, so
      enrichment recovers this term cleanly (annotation_supported). Marked
      confirmatory because a resting-chondrocyte signature is expected to
      enrich for cartilage development by construction.
