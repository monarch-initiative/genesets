taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of resting (cluster C0) chondrocytes from the
  He/Lim/Sun fetal human lung atlas (MSigDB C8). These cells form the airway
  cartilage of the developing conducting airways. Chondrocytes are the
  cartilage-resident cells that secrete and maintain the cartilage-specific
  extracellular matrix, dominated by type II collagen and the large aggregating
  proteoglycan aggrecan, under the control of the master chondrogenic
  transcription factor SOX9. The signature is rich in crisp cartilage
  effectors — COL2A1, ACAN, SOX9, the type IX and XI collagens
  (COL9A1/A2/A3, COL11A1/A2), the matrilins (MATN1/MATN3/MATN4) and link
  protein HAPLN1 — making it a textbook chondrocyte matrix program.
