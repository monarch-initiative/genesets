    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      A principal physiological purpose of the Th17 program is mucosal host
      defense against fungi, most notably Candida albicans, executed through the
      IL-17/IL-22 axis; loss of IL-17 immunity causes chronic mucocutaneous
      candidiasis. Antifungal-effector members of the signature (IL17A, IL17F,
      IL23R, IL22) carry this annotation, so enrichment recovers it
      (annotation_supported). Scored supporting rather than core, and
      lineage_shared, because antifungal defense is a downstream effector
      purpose of the IL-17 output shared with other IL-17-producing cells rather
      than the lineage-defining identity axis itself.
