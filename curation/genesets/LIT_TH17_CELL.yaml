        reference_title: "The orphan nuclear receptor RORgammat directs the differentiation program of proinflammatory IL-17+ T helper cells."
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        snippet: "the orphan nuclear receptor RORgammat is the key transcription factor that orchestrates the differentiation of this effector cell lineage"
        explanation: >-
          The gene set is, by definition, the readout of the Th17
          identity/differentiation program. The defining paper shows that
          RORgammat (encoded by RORC, a dominant member of this signature) is
          the master transcription factor that orchestrates differentiation of
          the Th17 effector lineage. T-helper 17 cell differentiation is
          therefore the central, cell-type-specific process the signature
          represents, and the lineage-program members (RORC, STAT3, IL23R, IL21)
          carry this GO annotation, so enrichment recovers it
          (annotation_supported). This is the defining ACTIVE program of the
          set, not a driver lesion.
    curator_note: >-
      This is the defining ACTIVE process of the set. It is cell_type_specific
      because the term literally names the Th17 cell and its differentiation is,
      by construction, the program this signature reads out.
  - term:
      id: GO:0032620
      label: interleukin-17 production
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    evidence:
      - reference: PMID:16990136
        reference_title: "The orphan nuclear receptor RORgammat directs the differentiation program of proinflammatory IL-17+ T helper cells."
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        snippet: "RORgammat induces transcription of the genes encoding IL-17 and the related cytokine IL-17F"
        explanation: >-
          IL-17A and IL-17F are the eponymous signature cytokines of the Th17
          lineage (the cell is named for IL-17), and the paper shows RORgammat
          directly induces transcription of the genes encoding IL-17 and IL-17F.
          IL17A and IL17F are members of this UP signature and carry the
          interleukin-17 production annotation, so enrichment recovers it
          (annotation_supported). Used the specific cytokine-production child
          (GO:0032620) rather than the generic cytokine-production parents.
    curator_note: >-
      Kept core and cell_type_specific because IL-17A/IL-17F production is the
      eponymous, defining effector output of the Th17 program. Other innate-like
      lymphocytes (gamma-delta T cells, ILC3) also make IL-17, but within this
      CD4+ helper signature IL-17 production is the cell-type-defining function.
