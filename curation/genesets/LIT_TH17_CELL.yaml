description: >-
  Literature-defined cell-state ACTIVITY signature of the T-helper 17 (Th17)
  lineage, the proinflammatory IL-17-producing pole of CD4+ helper T cell
  differentiation established by Harrington, Hatton, Weaver et al. (Nat Immunol
  2005, PMID:16200070), who showed that IL-17-producing CD4+ effector T cells
  develop via a lineage distinct from the Th1 and Th2 lineages, and defined
  molecularly by Ivanov, Littman et al. (Cell 2006, PMID:16990136), who
  identified the orphan nuclear receptor RORgammat (RORC) as the master
  transcription factor that directs the Th17 differentiation program. Unlike
  MSigDB causal/driver disease pathway sets, the members here are the READOUT of
  an ACTIVE program, not driver mutations: they are the genes UP in the
  RORgammat-driven Th17 identity/differentiation program induced from naive CD4+
  T cells by IL-6 and TGF-beta and amplified by IL-23. The signature is
  dominated by the canonical Th17 identity markers: the master transcription
  factor RORC (RORgammat) and the cooperating factor RORA; the signal
  transducer STAT3; the eponymous signature cytokines IL17A and IL17F together
  with the Th17 effector cytokines IL22 and IL21; the IL-23 receptor IL23R that
  stabilizes the committed state; and the lineage-defining chemokine receptor
  CCR6. Because the member genes literally carry the GO annotations for the
  processes the Th17 state executes (Th17 differentiation, IL-17 production,
  Th17-type immune response, inflammation, mucosal antifungal defense),
  enrichment recovers those processes (annotation_supported) rather than leaving
  them as gaps. This set is one POLE of a four-member SERIES (series
  SERIES:CD4_THELPER): it is the th17 role, contrasted with the Th1
  (IFN-gamma/T-bet), Th2 (IL-4/GATA3), and regulatory T cell (FOXP3) poles of
  the CD4+ helper-T-cell differentiation axis, against which the same shared
  terms resolve to contrasting interpretations. DISEASE RELEVANCE: the Th17
  program provides mucosal host defense against extracellular bacteria and fungi
  (notably Candida) but, when dysregulated, is a central driver of autoimmune
  and chronic inflammatory disease (psoriasis, multiple sclerosis, inflammatory
  bowel disease, rheumatoid arthritis, ankylosing spondylitis), making the
  RORgammat/IL-17/IL-23 axis a validated therapeutic target. The lineage was
  defined in mouse models; we curate the human-orthologous program and keep the
  taxon human per corpus convention.
contexts:
  - term:
      id: CL:0000899
      label: T-helper 17 cell
    context_type: cell_type
    role_note: >-
      The signature reads out the Th17 (T-helper 17) identity/differentiation
      state of the CD4-positive, alpha-beta T cell rather than any single
      disease: the RORgammat-positive, IL-17-producing proinflammatory program.
      CL:0000899 (T-helper 17 cell; RORgamma-t-positive, CCR6-positive,
      IL-17-producing) is the anchoring cell-state context, the th17 pole of the
      CD4+ helper-T-cell differentiation series (its contrasting poles being
      Th1, Th2 and regulatory T cells).
