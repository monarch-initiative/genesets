description: >-
  WikiPathways WP5356 gene set (MSigDB C2:CP:WIKIPATHWAYS) representing the
  affected pathways in Duchenne muscular dystrophy (DMD). DMD is caused by
  loss-of-function mutations in the DMD gene encoding dystrophin, a large
  cytoskeletal protein that forms the core scaffold of the dystrophin-associated
  glycoprotein complex (DGC). Loss of DGC integrity renders the sarcolemma
  mechanically fragile, leading to contraction-induced micro-tears, unregulated
  calcium influx, activation of calcium-dependent proteases, chronic
  inflammatory infiltration, progressive muscle necrosis, and fibrosis. The
  member genes span the DGC structural components (DMD, DAG1, sarcoglycans,
  syntrophins, dystrobrevins), calcium-handling regulators, inflammatory
  mediators, and the compensatory regenerative response, collectively capturing
  the major pathomechanistic arms of DMD in skeletal muscle.
