  - term:
      id: GO:0032480
      label: negative regulation of type I interferon production
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: broadly_expressed
    seed_source: curator_added
    recovery_status: annotation_gap
    insight: mechanistic
    evidence:
      - reference: PMID:21994800
        reference_title: "Filoviral immune evasion mechanisms."
        supports: SUPPORT
        evidence_source: IN_VITRO
        snippet: "EBOV VP35 inhibits the phosphorylation of IRF-3/7 by the TBK-1/IKKε kinases in addition to sequestering viral RNA from detection by RIG-I like receptors. MARV VP40 inhibits STAT1/2 phosphorylation by inhibiting the JAK family kinases. EBOV VP24 inhibits nuclear translocation of activated STAT1 by karyopherin-α."
        explanation: >-
          Antagonism of type I interferon production is the single most
          important immune evasion strategy of EBOV, enabling unrestricted
          viral replication in the face of ongoing innate immune activation.
          EBOV VP35 targets the TBK1/IRF3/IRF7 phosphorylation axis and VP24
          blocks STAT1 nuclear import; TBK1, IRF3, IRF7, and STAT1 are all
          present in the WikiPathways gene set. However, GOA-human annotates
          these host genes to the positive (sensing/signalling) arms of the
          IFN pathway; the negative regulatory outcome into which they are
          subverted by EBOV is not captured in their current GO annotations.
          This is therefore an annotation gap and a GO curation target.
    curator_note: >-
      annotation_gap, not membership_gap. Immune evasion of type I IFN
      production is a defining and central feature of EVD pathogenesis:
      EBOV VP35 and VP24 suppress IFN production by hijacking host signalling
      components (TBK1, IRF3, IRF7, STAT1, karyopherins) that are members of
      the WikiPathways gene set. GOA-human annotates these host genes to the
      positive-sensing arms of the pathway; the negative regulatory outcome
      driven by viral antagonism is not represented in their GO annotations.
      Enrichment analyses of this gene set will therefore not recover
      GO:0032480 even though the underlying biology is core to EVD. This term
      is biologically core and is NOT weakened on annotation grounds — it is
      a GO annotation curation target.
