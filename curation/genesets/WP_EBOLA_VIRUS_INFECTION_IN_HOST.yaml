    evidence:
      - reference: PMID:36558734
        reference_title: "Filoviruses: Innate Immunity, Inflammatory Cell Death, and Cytokines."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "The innate immune system is the first line of defense against pathogenic insults such as filoviruses. Pattern recognition receptors (PRRs), including toll-like receptors, retinoic acid-inducible gene-I-like receptors, C-type lectin receptors, AIM2-like receptors, and NOD-like receptors, detect pathogens and activate downstream signaling to induce the production of proinflammatory cytokines and interferons, alert the surrounding cells to the threat, and clear infected and damaged cells through innate immune cell death."
        explanation: >-
          This review (Lu et al. 2022, Pathogens) describes the innate immune
          sensing of filoviruses including EBOV and the downstream antiviral
          effector response. The WP_EBOLA_VIRUS_INFECTION_IN_HOST gene set is
          dominated by RIG-I-pathway genes (DDX58/RIG-I, IFIH1/MDA5, MAVS, TBK1,
          IRF3, IRF7) and ISGs (MX1, OAS family, IFIT family, ISG15), which are
          directly annotated to GO:0051607 (defense response to virus) in
          GOA-human. Defense response to virus is therefore the primary core
          biological process represented by the gene set's antiviral arm.
  - term:
      id: GO:0060337
      label: type I interferon-mediated signaling pathway
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    evidence:
      - reference: PMID:21994800
        reference_title: "Filoviral immune evasion mechanisms."
        supports: SUPPORT
        evidence_source: IN_VITRO
        snippet: "The Type I interferon (IFN) response is critical for establishing an antiviral state in the host cell and subsequent activation of the adaptive immune responses. Several filoviral encoded components target Type I IFN responses, and this innate immune suppression is important for viral replication and pathogenesis."
        explanation: >-
          Type I interferon signalling through JAK1/TYK2-STAT1/STAT2-IRF9 is a
          mechanistically central arm of the Ebola host-response pathway. Genes
          encoding IFNAR1, IFNAR2, JAK1, TYK2, STAT1, STAT2, IRF9, and multiple
          ISGs present in the WikiPathways gene set are annotated to GO:0060337
          (type I interferon-mediated signaling pathway) in GOA-human. The fact
          that EBOV dedicates multiple proteins (VP35, VP24) specifically to
          antagonising this pathway — described in this review — underscores its
          centrality to EVD pathogenesis and to this gene set's biology.
  - term:
      id: GO:0045087
      label: innate immune response
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Innate immune response is the umbrella process encompassing pattern
      recognition, cytokine induction, and effector activation during EBOV
      infection. Genes encoding PRRs (DDX58/RIG-I, IFIH1/MDA5, TLR3, TLR7),
      adaptor proteins (MAVS), kinases (TBK1, IKBKE), and transcription factors
      (IRF3, IRF7, NFkB subunits) in the WikiPathways set are annotated to
      GO:0045087 in GOA-human. This term is the direct parent of GO:0051607 and
      is broadly shared across many infection-context gene sets, making it a
      well-supported but non-discriminating supporting rather than a uniquely
      informative core descriptor of the EBOV pathway.
  - term:
      id: GO:0019065
      label: receptor-mediated endocytosis of virus by host cell
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_gap
    insight: confirmatory
    curator_note: >-
      Ebola virus enters cells primarily via macropinocytosis followed by
      endosomal routing; the intracellular receptor NPC1 (Niemann-Pick C1) is
      the obligate EBOV entry receptor in late endosomes, and cathepsins B and L
      (CTSB, CTSL) process the viral glycoprotein to enable NPC1 binding. These
      genes are present in the WikiPathways gene set, but their GOA-human
      annotations are predominantly to generic receptor-mediated endocytosis
      (GO:0006898) and endosomal biogenesis terms rather than to the virus-
      specific child GO:0019065. This is an annotation gap: the viral entry
      biology is biologically correct (NPC1, CTSL, CTSB are the documented EBOV
      entry machinery) and the genes ARE members, but GOA-human lacks explicit
      GO:0019065 annotations for these host entry factors — a GO curation target.
  - term:
      id: GO:0006954
      label: inflammatory response
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Ebola virus disease is characterised by dysregulated systemic inflammation
      and cytokine storm, caused by massive induction of TNF, IL6, IL1B, IL8,
      and MCP-1 by infected monocytes and macrophages. The WikiPathways gene set
      includes cytokines and their signalling intermediaries annotated to
      GO:0006954 in GOA-human, supporting this classification. Inflammatory
      response is a significant mechanistic component of EBOV pathogenesis but
      is broadly shared across infectious-disease and immune pathway gene sets,
      hence classified as a supporting rather than a uniquely defining core
      process.
  - term:
