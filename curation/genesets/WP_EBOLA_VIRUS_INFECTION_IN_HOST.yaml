    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Translation is a ubiquitous housekeeping process. Its appearance as an
      enrichment hit in this gene set reflects ribosomal protein or translation
      factor genes included as background in the WikiPathways pathway
