description: >-
  MSigDB C5:HPO gene set comprising the human genes annotated to the Human
  Phenotype Ontology term "Motor neuron atrophy" (HP:0007373). This is a broad,
  cross-disease motor-neuron-degeneration phenotype rather than a single pathway:
  its members span amyotrophic lateral sclerosis (ALS), spinal muscular atrophy
  (SMA), and distal hereditary motor neuropathy / CMT2 overlap. The shared
  biology of these genes is the progressive degeneration and death of motor
  neurons — programmed cell death of motor neurons (the defining outcome),
  axonal / neurite degeneration ("dying-back" axonopathy), dysregulated RNA
  processing (TDP-43 / FUS-class RNA-binding proteins), and impaired axonal
  transport (dynein / kinesin motor genes). It is interpreted here as the
  convergent biology of motor-neuron-degeneration genes, NOT as one mechanistic
  pathway. The defining motor-neuron apoptotic process is recorded as an
  annotation_gap: the causal genes are present but are largely annotated to the
  generic parent apoptotic process rather than the motor-neuron-specific child.
contexts:
