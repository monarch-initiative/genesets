  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of microglia from human fetal cerebrum
  (Descartes fetal cell atlas, Cao et al. 2020 Science, PMID:33184181;
  MSigDB C8). Microglia are the brain-resident macrophages and the principal
  innate-immune sentinels of the CNS parenchyma; they survey the neuropil with
  motile processes, clear apoptotic cells and debris by phagocytosis, prune
  synapses via the classical complement cascade, and mount inflammatory,
  chemokine and inflammasome responses to injury or infection. The signature is
  a crisp, well-annotated myeloid/microglial profile, carrying canonical markers
  such as AIF1 (Iba1), C1QA, C1QC, C2, C5AR1/C5AR2, CSF1R, P2RY12, CX3CR1,
  TYROBP, TREM2, ITGAM, CD68, CD163, CD33, CD74 and the CASP1/CASP5/NLRC4/NAIP
  inflammasome module.
