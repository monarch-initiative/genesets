gene_set_name: KEGG_THYROID_CANCER
collection: C2:CP:KEGG_LEGACY
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy thyroid cancer pathway gene set (MSigDB C2 curated gene set).
  This is a cancer disease pathway gene set, not a cell-type signature. The member
  genes are enriched for components of the RET/PTC–RAS–BRAF–MAPK signaling axis
  (the dominant oncogenic driver in papillary thyroid carcinoma), the PAX8–PPARG
  fusion and PAX8/NKX2-1 transcription factor network, CTNNB1/Wnt signaling
  components, and regulators of cell proliferation. A defining biological feature
  captured in this gene set is dedifferentiation: constitutive MAPK activation
  leads to loss of thyroid-specific differentiation markers (NIS/SLC5A5,
  thyroglobulin, TSH receptor), a clinically significant hallmark of
  radioactive-iodine–refractory thyroid cancer. The PAX8-PPARG fusion, recurring
  in follicular thyroid carcinomas, and activating CTNNB1 mutations, enriched in
  anaplastic/poorly-differentiated carcinomas, provide additional mechanistic arms
  in this gene set.
