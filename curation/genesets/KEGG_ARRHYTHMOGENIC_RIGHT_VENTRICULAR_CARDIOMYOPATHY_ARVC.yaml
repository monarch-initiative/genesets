description: >-
  KEGG legacy arrhythmogenic right ventricular cardiomyopathy (ARVC) pathway
  gene set (MSigDB C2 curated gene set). This is a disease pathway gene set,
  not a cell-type signature. The member genes are dominated by desmosomal
  proteins (PKP2, DSP, DSG2, DSC2, JUP) that form the intercalated disc
  adhesion complex, supplemented by cell-junction and cadherin-catenin
  components (CDH2, CTNNA3), gap-junction proteins (GJA1, GJA5), and calcium-
  handling/adrenergic regulators (RYR2, CACNA1C, CACNB2, ADRB1, ADRB2).
  Unlike dilated cardiomyopathy (dominated by sarcomere and dystrophin-
  glycoprotein-complex genes) or hypertrophic cardiomyopathy (dominated by
  thick-filament components), the defining ARVC lesion is desmosome
  dysfunction: loss of desmosomal integrity in right-ventricular cardiomyocytes
  leads to myocyte detachment, fibro-fatty replacement, and life-threatening
  ventricular arrhythmias. As a KEGG legacy pathway it captures the established
  mechanistic arms and reflects the major gene families whose mutations underlie
  familial ARVC.
