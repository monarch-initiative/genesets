gene_set_id: MSIGDB:DESCARTES_FETAL_CEREBRUM_EXCITATORY_NEURONS
gene_set_name: DESCARTES_FETAL_CEREBRUM_EXCITATORY_NEURONS
collection: C8
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of excitatory (glutamatergic) neurons from human
  fetal cerebrum (Descartes atlas). These cells are of neural lineage, not
  hematopoietic, and produce and release glutamate as their primary
  neurotransmitter. Excitatory neurons are the most abundant neuron class in the
  cerebral cortex and are characterized by glutamate-mediated chemical synaptic
  transmission, formation of axons and dendrites, and action-potential-driven
  neurotransmitter secretion at synaptic terminals.
