gene_set_name: KEGG_VIBRIO_CHOLERAE_INFECTION
collection: C2:CP:KEGG_LEGACY
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy Vibrio cholerae infection pathway gene set (MSigDB C2 curated gene
  set). This is a disease/infection pathway gene set, not a cell-type signature.
  The member genes encode the host molecular machinery subverted or engaged during
  cholera: cholera toxin ADP-ribosylates the Gsα subunit (GNAS), locking it in
  the active GTP-bound state and constitutively stimulating adenylate cyclases
  (ADCY) to overproduce cyclic AMP. Elevated cAMP activates protein kinase A
  (PKA; PRKAR* and PRKAC* subunits), which phosphorylates the cystic fibrosis
  transmembrane conductance regulator (CFTR), driving massive luminal chloride
  secretion in intestinal epithelial cells. Osmotic water follows, producing the
  profuse secretory diarrhea of cholera. Additional gene set members include
  vacuolar-type H+-ATPase (V-ATPase; ATP6V* subunits) involved in endosomal and
  lysosomal processing of the toxin and cell maintenance, cytoskeletal components
  (actin), and secondary ion transporters (SLC26A3/DRA, KCNQ1). As a legacy KEGG
  pathway it captures the established Gs/cAMP/PKA/CFTR axis and omits more
  recently characterised host innate-immune and tight-junction responses.
