  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of pancreatic acinar cells (exocrine, digestive-
  enzyme-secreting) from human pancreas (Muraro et al. single-cell atlas of the
  human pancreas, MSigDB C8). Pancreatic acinar cells are the predominant
  exocrine cell type, constituting approximately 80% of pancreatic mass. Their
  defining function is the synthesis of digestive enzyme precursors (zymogens),
  storage in apical zymogen granules, and regulated secretion into the
  pancreatic duct lumen in response to cholecystokinin (CCK) and neural
  stimuli. Secreted enzymes include serine proteases (trypsinogen, PRSS1/PRSS2;
  chymotrypsinogen, CTRB1/CTRB2; elastase, CELA3A/CELA2A), alpha-amylase
  (AMY2A), pancreatic lipase (PNLIP), and phospholipase A2 (PLA2G1B).
