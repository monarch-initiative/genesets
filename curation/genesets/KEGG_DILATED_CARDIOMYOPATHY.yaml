    aspect: biological_process
    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Translation is a ubiquitous housekeeping process. Its appearance as an
      enrichment hit reflects ribosomal protein genes that are incidentally
      co-expressed in cardiomyocytes or present in the KEGG pathway gene set as
      background members. It does not reflect a DCM-specific function and is
      recorded here to flag a non-informative enrichment result.
  - term:
      id: GO:0048738
      label: cardiac muscle tissue development
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: curator_added
    recovery_status: annotation_gap
    insight: confirmatory
    curator_note: >-
      Cardiac muscle tissue development is biologically relevant to DCM because
      several DCM-causing genes (e.g. MYH7, TNNT2, TTN, LMNA) play roles in
      cardiac tissue formation and maturation, and DCM frequently manifests as a
      developmental failure to maintain normal ventricular architecture. However,
      many of the sarcomere and DGC genes in this set are annotated predominantly
      to contraction/structural GO terms rather than developmental terms, even
      though their roles in tissue development are well-established. This is an
      annotation gap: the biology is genuine but the gene-level GO annotations to
      this term are incomplete, so enrichment is unlikely to recover it from this
      gene set.
