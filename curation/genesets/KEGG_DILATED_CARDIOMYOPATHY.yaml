        snippet: "Mutations in several genes can cause DCM, including genes encoding structural components of the sarcomere and desmosome."
        explanation: >-
          Cardiac muscle contraction is the central physiological process that
          fails in dilated cardiomyopathy. The review establishes that DCM is
          caused by mutations in sarcomere structural genes whose protein products
          power cardiac contractile force, directly supporting cardiac muscle
          contraction as the core biological process disrupted in this disease.
    curator_note: >-
      The defining pathophysiology of dilated cardiomyopathy is impaired systolic
      contraction of the left ventricle. The KEGG DCM pathway gene set is dominated
      by genes encoding actin (ACTC1), myosin heavy chains (MYH6, MYH7), myosin
      light chains (MYL2, MYL3), troponins (TNNT2, TNNI3, TNNC1), and
      tropomyosin (TPM1) — the core molecular machinery of the sarcomere that
      directly executes cardiac muscle contraction. This is a legitimately
      cell-type-specific association for a cardiac disease gene set.
  - term:
      id: GO:0030017
      label: sarcomere
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The sarcomere is the repeating contractile unit of cardiac myofibrils and
      the defining ultrastructural hallmark of striated muscle cells. A large
      fraction of the KEGG DCM pathway genes encode sarcomeric proteins (MYH6,
      MYH7, MYL2, MYL3, TNNT2, TNNI3, TNNC1, TPM1, ACTC1, TTN), making the
      sarcomere the dominant cellular compartment represented in this gene set.
      Mutations in sarcomere genes are the most common genetic cause of familial
      dilated cardiomyopathy.
  - term:
      id: GO:0016010
      label: dystrophin-associated glycoprotein complex
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The dystrophin-associated glycoprotein complex (DGC) provides a critical
      mechanical link between the intracellular cytoskeleton and the extracellular
      matrix in cardiomyocytes, transmitting contractile force and protecting the
      sarcolemma from contraction-induced damage. The KEGG DCM pathway explicitly
      includes genes encoding DGC components: DMD (dystrophin), SGCA/SGCB/SGCG/
      SGCD (sarcoglycans), DAG1 (dystroglycan), and SNTA1 (syntrophin). Loss of
      DGC integrity is a well-established primary mechanism of DCM, particularly
      in X-linked DCM caused by DMD mutations (MONDO:0010542).
