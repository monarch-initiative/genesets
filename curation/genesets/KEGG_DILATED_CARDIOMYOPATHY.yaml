    curator_note: >-
      Parent term of cardiac muscle contraction; shared with skeletal and smooth
      muscle lineages. Expected to appear alongside the more specific cardiac
      muscle contraction child term (GO:0060048) in enrichment results from this
      predominantly sarcomeric gene set. The association is biologically valid
      but less informative than the cardiac-specific child term.
  - term:
      id: GO:0055117
      label: regulation of cardiac muscle contraction
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The KEGG DCM pathway gene set includes multiple regulators of cardiac
      contractile function beyond structural sarcomere proteins: adrenergic
      receptor components (ADRA1A, ADRB1, ADRB2), calcium-handling proteins
      (ATP2A2/SERCA2a, RYR2, PLN), and signalling kinases. These collectively
      modulate the frequency, rate and extent of cardiac muscle contraction and
      represent the functional regulatory arm of the KEGG DCM pathway
      representation. Dysregulation of calcium handling is a secondary consequence
      of sarcomere gene mutations in DCM.
  - term:
