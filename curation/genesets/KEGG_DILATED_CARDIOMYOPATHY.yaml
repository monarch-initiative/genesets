  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy dilated cardiomyopathy pathway gene set (MSigDB C2 curated gene set).
  This is a disease pathway gene set, not a cell-type signature. The member genes
  are dominated by sarcomere and contractile apparatus proteins (actin, myosin heavy
  and light chains, troponins, tropomyosin, titin), the dystrophin-glycoprotein
  complex (dystrophin/DMD, sarcoglycans, dystrobrevin), cytoskeletal and ECM
  linkage components, and adrenergic/calcium-handling regulators whose loss-of-
  function or structural disruption causes ventricular dilation and systolic
  dysfunction. As a KEGG legacy pathway it captures established mechanistic arms
  and reflects the major gene families whose mutations underlie familial dilated
  cardiomyopathy.
