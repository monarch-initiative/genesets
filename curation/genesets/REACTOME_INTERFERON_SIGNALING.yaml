gene_set_id: MSIGDB:REACTOME_INTERFERON_SIGNALING
gene_set_name: REACTOME_INTERFERON_SIGNALING
collection: C2:CP:REACTOME
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Reactome Interferon Signaling pathway gene set (MSigDB C2 curated pathway,
  ~296 genes). This is a pathway signature, not a cell-type signature. Its
  membership spans BOTH interferon arms: the type I ligands and receptor
  (IFNA1-21, IFNB1, IFNAR1, IFNAR2) and the type II ligand and receptor (IFNG,
  IFNGR1, IFNGR2); the shared JAK-STAT/ISGF3 signalling core (JAK1, JAK2, TYK2,
  STAT1, STAT2, STAT3, IRF1, IRF9); a large interferon-stimulated gene and
  antiviral-effector block (ISG15, MX1, MX2, OAS1/2/3, OASL, RSAD2, IFIT1/2/3/5,
  IFI6/27/35/44/44L, IFITM1/2/3, BST2, GBP1-7, USP18, HERC5, SAMHD1, RNASEL);
  the MHC antigen-presentation apparatus (HLA class I A/B/C/E/F/G, HLA class II
  DR/DQ/DP, B2M, CIITA, PSMB8); TRIM-family antiviral restriction factors; and —
  reflecting Reactome's pathway boundary — a large nuclear-pore-complex and
  karyopherin block (NUP*, KPNA1-7, KPNB1, RANBP2, TPR) that is bundled in
  because activated STATs are imported to the nucleus through the nuclear pore.
  That transport block is ubiquitous machinery and makes the set enrich for
  nucleocytoplasmic transport without that being an interferon-specific function.
  Both single-cell factor models discussed in the competitive-landscape docs seed
  their interferon components from Reactome pathway sets of exactly this kind:
  f-scLVM (Buettner 2017) annotates factors from Reactome, and expiMap
  (Lotfollahi 2023) trains latent gene-program nodes on Reactome; this is the
  umbrella interferon program those factors/nodes derive from. Its minimal
  clinical counterpart is the six-gene LIT:TYPE_I_INTERFERON_SCORE.
