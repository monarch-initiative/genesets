description: >-
  Single-cell marker signature of pulmonary alveolar epithelial type I (AT1)
  cells from human lung (Travaglini et al., MSigDB C8). AT1 cells are extremely
  thin, squamous epithelial cells that cover the great majority of the alveolar
  surface and form the gas-exchange interface (blood-air barrier) of the lung.
  Together with the fused capillary endothelium and a shared thin basement
  membrane, they minimise the diffusion distance for O2/CO2 exchange. AT1 cells
  are exceptionally rich in caveolae and are the squamous/gas-exchange pole of
  the alveolar epithelium, partnered with surfactant-secreting AT2 cells. The
  signature carries the canonical AT1 markers AGER, PDPN, CAV1/CAV2, HOPX,
  CLIC5, RTKN2, the basement-membrane collagen-IV chains COL4A1/2/3/4, and the
  alveolar tight-junction claudin CLDN18.
