description: >-
  KEGG legacy chronic myeloid leukemia pathway gene set (MSigDB C2 curated gene set).
  This is a blood cancer disease pathway gene set, not a cell-type signature. The member
  genes encode signaling proteins activated by the BCR-ABL1 fusion tyrosine kinase (the
  product of the Philadelphia chromosome t(9;22)(q34;q11) translocation), hematopoietic
  growth-factor receptors, RAS/MAPK proliferative signaling components (RAS, RAF,
  MAP2K, MAPK), PI3K-AKT survival effectors, JAK-STAT transcriptional activators, and
  core apoptosis regulators (BCL2-family, CASP3, CYCS), reflecting the major mechanistic
  arms of the KEGG chronic myeloid leukemia pathway: BCR-ABL1-driven constitutive
  tyrosine kinase signaling, RAS/MAPK-mediated proliferation, PI3K-AKT survival
  signaling, JAK-STAT-dependent transcription, and apoptosis evasion.
