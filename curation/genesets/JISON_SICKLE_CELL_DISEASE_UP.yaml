  - term:
      id: GO:0006954
      label: inflammatory response
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    evidence:
      - reference: PMID:15031206
        reference_title: "Blood mononuclear cell gene expression profiles characterize the oxidant, hemolytic, and inflammatory stress of sickle cell disease."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Global transcriptional analysis of circulating leukocytes highlights the intense oxidant and inflammatory nature of steady-state sickle cell disease and provides insight into the broad compensatory responses to vascular injury."
        explanation: >-
          The source gene set is defined by differential expression of PBMC
          transcripts in sickle cell disease patients. The source paper explicitly
          characterises the signature as reflecting the inflammatory stress of
          SCD. Inflammatory response (GO:0006954) is the primary biological
          process captured by the UP gene set and is expected to be strongly
          recovered by GO enrichment of the 183 upregulated genes.
    curator_note: >-
      Chronic inflammation is a hallmark of sickle cell disease pathophysiology:
      recurrent vaso-occlusion, ischemia-reperfusion injury, and free
      haemoglobin-driven endothelial activation maintain a persistent
      inflammatory state in circulating leukocytes. GO:0006954 is the most
      direct and informative annotation for this gene set and is expected to
      be the top enrichment hit.
  - term:
      id: GO:0006979
      label: response to oxidative stress
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    evidence:
      - reference: PMID:15031206
        reference_title: "Blood mononuclear cell gene expression profiles characterize the oxidant, hemolytic, and inflammatory stress of sickle cell disease."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Patients with sickle cell disease demonstrated differential gene expression of 112 genes involved in heme metabolism, cell-cycle regulation, antioxidant and stress responses, inflammation, and angiogenesis."
        explanation: >-
          Oxidative stress is a co-equal driver of PBMC gene expression changes
          in SCD alongside inflammation. Free haemoglobin released by haemolysis
          consumes nitric oxide and generates reactive oxygen species; the Jison
          2004 paper explicitly identifies antioxidant and stress-response
          transcripts among the differentially expressed genes, including
          inducible heme oxygenase-1 (HMOX1), which is annotated to response
          to oxidative stress.
    curator_note: >-
      Key upregulated genes in this set include HMOX1 (heme oxygenase-1),
      catalase, and superoxide dismutase family members, all of which carry
      GO:0006979 annotations. The oxidant stress axis in SCD arises from
      haemolysis-driven reactive oxygen species generation and is mechanistically
      distinct from (but synergistic with) the inflammatory response.
  - term:
      id: GO:0045087
      label: innate immune response
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    evidence:
      - reference: PMID:30332562
        reference_title: "Pathophysiology of Sickle Cell Disease."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "concerted activation of sterile inflammation (Toll-like receptor 4- and inflammasome-dependent innate immune pathways)"
        explanation: >-
          The pathophysiology review by Sundd et al. (2019) identifies
          TLR4-dependent and inflammasome-dependent innate immune activation
          as one of the four core mechanistic pillars of SCD. Circulating
          haem and damage-associated molecular patterns (DAMPs) released by
          haemolysis activate innate immune pattern-recognition receptors in
          monocytes and granulocytes, upregulating interferon-stimulated genes
          and pro-inflammatory cytokine transcripts among the PBMC UP genes.
    curator_note: >-
      Innate immune response (GO:0045087) is a supporting rather than core
      annotation because the gene set derives from PBMCs rather than a
      purified innate-immune cell type; the innate-immune signal is real and
      expected to be enrichment-recovered, but the set also contains adaptive
      immune and stress-response transcripts that dilute specificity.
  - term:
      id: GO:0006955
      label: immune response
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Immune response (GO:0006955) is the parent of innate immune response
      and is expected to be recovered alongside the more specific child term.
      PBMCs comprise monocytes, T lymphocytes, B lymphocytes, and NK cells,
      all of which contribute immune-response transcripts to the UP signature.
      The term is real and relevant but non-discriminating because it covers
      virtually all PBMC biology.
  - term:
      id: GO:0045321
      label: leukocyte activation
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    evidence:
      - reference: PMID:15031206
        reference_title: "Blood mononuclear cell gene expression profiles characterize the oxidant, hemolytic, and inflammatory stress of sickle cell disease."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Ischemia-reperfusion injury, plasma hemoglobin-mediated nitric oxide consumption, and free radical generation activate systemic inflammatory responses."
        explanation: >-
          The ischemia-reperfusion, haemolysis, and free-radical milieu of SCD
          constitutes a sustained leukocyte-activating stimulus. Circulating
          monocytes and lymphocytes in steady-state SCD show activation
          transcriptional profiles; many of the 183 UP genes encode surface
          receptors, adhesion molecules, and signalling intermediates annotated
          to leukocyte activation. Leukocyte activation is lineage-shared
          because it is specific to the haematopoietic lineage captured by
          the PBMC sample type.
    curator_note: >-
      Leukocyte activation (GO:0045321) is expected to be recovered by
      enrichment of this PBMC UP gene set. It is categorised as a supporting
      process rather than core because leukocyte activation is an enabling
      upstream event; the consequent inflammatory and immune response are
      the more biologically defining endpoints of the SCD UP signature.
  - term:
      id: GO:0006412
      label: translation
    aspect: biological_process
    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Translation (GO:0006412) is a ubiquitous housekeeping process that
      appears as a non-specific enrichment artifact in PBMC gene sets due
      to the high number of ribosomal protein-coding genes present in
      large transcriptomic signatures. Its recovery does not reflect
      SCD-specific biology and is included here as an illustrative
      nonspecific hit analogous to its role in other MSigDB-derived
      interpretations.
