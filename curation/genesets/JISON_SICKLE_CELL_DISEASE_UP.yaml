n_genes: 183
description: >-
  Genes up-regulated in peripheral blood mononuclear cells (PBMC) from sickle
  cell disease patients compared to healthy subjects (Jison et al. 2004,
  PMID:15031206). The 183-gene upregulated signature captures the chronic
  inflammatory, oxidant, and hemolytic stress state of steady-state sickle
  cell disease, with enrichment for transcripts involved in heme metabolism,
  antioxidant and stress responses, inflammation, leukocyte activation, and
  innate immune signalling.
