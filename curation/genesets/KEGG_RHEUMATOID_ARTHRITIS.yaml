taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy rheumatoid arthritis pathway gene set (MSigDB C2 curated gene set).
  This is a disease pathway gene set representing the autoimmune inflammatory joint
  disease rheumatoid arthritis. Member genes are heavily enriched for pro-inflammatory
  cytokines and their receptors (TNF, IL1A/B, IL6, IL17), MHC class II antigen
  presentation machinery (HLA-DRA, HLA-DRB1, HLA-DQA1, HLA-DQB1), osteoclast
  differentiation and bone-erosion regulators (TNFSF11/RANKL, TNFRSF11A/RANK,
  TNFRSF11B/OPG), chemokines driving synovial leukocyte recruitment (CXCL1, CCL2),
  and angiogenesis factors (VEGF/PGF) in the inflamed synovium. The gene set reflects
  the major mechanistic arms of the KEGG RA pathway: synovial inflammation, adaptive
  immune activation, pannus-mediated cartilage invasion, and osteoclast-driven bone
  erosion.
