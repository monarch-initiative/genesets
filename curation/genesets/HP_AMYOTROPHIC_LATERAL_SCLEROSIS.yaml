  label: Homo sapiens
direction: NA
n_genes: 49
description: >-
  MSigDB C5:HPO gene set: human genes annotated to the HPO phenotype Amyotrophic
  lateral sclerosis (HP:0007354) — i.e. genes whose variation CAUSES ALS, not a
  single mechanistic pathway. Members are the established ALS causal/risk genes
  (SOD1, TARDBP/TDP-43, FUS, C9orf72, TBK1, OPTN, VCP, UBQLN2, SQSTM1, PFN1,
  MATR3, HNRNPA1, CHCHD10, ANG, SETX, ALS2, VAPB, DCTN1, KIF5A, NEK1, …). The
  shared biology of these causal genes converges on a handful of themes:
  motor-neuron degeneration/death (the defining phenotype), dysregulated RNA
  metabolism/splicing (the RNA-binding proteins TDP-43, FUS, MATR3, hnRNPA1,
  SETX), impaired proteostasis/autophagy (OPTN, SQSTM1, TBK1, VCP, UBQLN2),
  oxidative-stress handling (SOD1), and aberrant stress-granule/condensate
  dynamics of the prion-like RBPs. Because the set is a phenotype-defined causal
  catalogue rather than an annotated pathway, several core processes are present
  as annotation_gaps (the genes are in the set but GO annotation is too shallow
  or too generic to recover the disease-defining child term).
