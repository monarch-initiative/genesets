gene_set_id: MSIGDB:KEGG_ALZHEIMERS_DISEASE
gene_set_name: KEGG_ALZHEIMERS_DISEASE
collection: C2:CP:KEGG_LEGACY
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy Alzheimer's disease pathway gene set (MSigDB C2 curated gene set).
  This is a disease pathway gene set, not a cell-type signature. The member genes
  are heavily enriched for mitochondrial electron-transport-chain and
  ATP-synthase subunits (oxidative phosphorylation), amyloid precursor protein
  processing machinery, apoptosis regulators, and calcium-signaling components,
  reflecting the major mechanistic arms of the KEGG Alzheimer's disease pathway
  representation.
contexts:
  - term:
      id: MONDO:0004975
      label: Alzheimer disease
    context_type: disease
  - term:
      id: UBERON:0000955
      label: brain
    context_type: anatomical_structure
associations:
  - term:
      id: GO:0006119
      label: oxidative phosphorylation
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    insight: confirmatory
    evidence:
      - reference: PMID:32709961
        reference_title: "Brain energy rescue: an emerging therapeutic concept for neurodegenerative disorders of ageing."
        supports: SUPPORT
        snippet: "restoring oxidative phosphorylation and glycolysis, increasing insulin sensitivity, correcting mitochondrial dysfunction"
        explanation: >-
          The KEGG Alzheimer's disease pathway gene set is dominated by
          ETC complex I–V and ATP-synthase subunits. Impaired oxidative
          phosphorylation is a core mechanistic feature of Alzheimer's
          disease energetics, as described in this Nat Rev Drug Discov
          review of brain energy rescue strategies.
  - term:
      id: GO:0005739
      label: mitochondrion
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    insight: confirmatory
    curator_note: >-
      A large fraction of KEGG AD pathway members (COX subunits, NADH
      dehydrogenase subunits, ATP synthase subunits, cytochrome bc1
      subunits) are localised to the mitochondrion, making it the
      dominant cellular compartment represented in this gene set.
  - term:
      id: GO:0042987
      label: amyloid precursor protein catabolic process
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    insight: confirmatory
    curator_note: >-
      APP, PSEN1, PSEN2, BACE1, and ADAM10 are all members of the KEGG
      AD pathway and directly participate in amyloid precursor protein
      catabolism; this is the molecular hallmark step distinguishing the
      Alzheimer's disease pathway from generic neurodegeneration pathways.
  - term:
      id: GO:0006915
      label: apoptotic process
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    insight: confirmatory
    curator_note: >-
      CASP3, CASP9, BAD, and BCL2-family members in the KEGG AD pathway
      encode canonical intrinsic apoptosis components. Apoptosis is
      shared across many disease contexts and is not AD-specific, but
      is a significant mechanistic component of neuronal loss in this
      pathway representation.
  - term:
      id: GO:0051402
      label: neuron apoptotic process
    aspect: biological_process
    category: core_process
    confidence: medium
    specificity: lineage_shared
    seed_source: curator_added
    insight: confirmatory
    curator_note: >-
      Neuronal cell death by apoptosis is the central downstream outcome
      of the KEGG Alzheimer's disease pathway. Added as curator_added
      because enrichment tools may recover the parent term
      (apoptotic process) in preference to this more specific
      neuron-restricted child term.
  - term:
      id: GO:0006816
      label: calcium ion transport
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    insight: confirmatory
    curator_note: >-
      Voltage-gated calcium channels, RYR3, and ITPR1/2/3 (inositol
      trisphosphate receptors) feature in the KEGG AD pathway calcium
      signaling arm. Dysregulation of calcium homeostasis contributes
      to mitochondrial dysfunction and neuronal excitotoxicity in AD,
      but the term is broadly expressed and not AD-specific.
  - term:
      id: GO:0006412
      label: translation
    aspect: biological_process
    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    curator_note: >-
      Translation appears as a non-specific enrichment hit driven by
      ribosomal protein subunit genes present in the gene set. It is
      a ubiquitous housekeeping process and does not reflect a
      disease-specific function of the Alzheimer's disease pathway.
