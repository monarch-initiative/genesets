  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of intestinal epithelial cells from human fetal
  intestine (Descartes cell atlas, Cao et al. 2020 Science, PMID:32848094;
  MSigDB C8). The cluster is dominated by absorptive enterocytes and carries a
  crisp effector signature: lipoprotein/chylomicron assembly (APOA1, APOA2,
  APOA4, APOB, APOC3, MTTP), cytosolic lipid/retinol binding (FABP1, FABP2,
  RBP2), brush-border hydrolases (SI, LCT, ANPEP, TREH, ALPI, MEP1A, MGAM2),
  apical/basolateral nutrient transporters (SLC5A1/SGLT1, SLC2A2/GLUT2, CUBN,
  ABCG5, ABCC2), and a battery of first-pass xenobiotic-metabolising enzymes
  (CYP3A5, CYP2C9/18/19, UGT, SULT, GSTA). A minority of secretory-lineage
  markers (MUC2, MUC13, MUC17, PIGR, ZG16) is also present, consistent with a
  mixed absorptive-epithelial cluster annotated as intestinal epithelial cell.
