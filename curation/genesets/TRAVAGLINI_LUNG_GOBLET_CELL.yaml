      label: chemokine-mediated signaling pathway
    aspect: biological_process
    category: marker_driven_plausible
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      The set carries several secreted chemokines — CXCL1 and CXCL6 (CXCR1/2
      ligands and neutrophil chemoattractants) and CXCL17, a mucosal chemokine
      enriched in airway secretory epithelium — that recruit and signal to
      immune cells at the airway surface. Directly annotated carriers under
      GO:0070098 are CXCL6 and CXCL17. Categorised marker_driven_plausible
      (medium confidence) because this inflammatory/recruitment output is
      plausible given the markers but is peripheral to, and not defining of,
      the goblet secretory identity; no insight is recorded as the category is
      not core/supporting.
