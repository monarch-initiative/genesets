  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of airway goblet cells from human lung
  (Travaglini et al., MSigDB C8). Goblet cells are the mucin-secreting
  secretory epithelial cells of the conducting airway: a narrow basal
  nucleus and an apical theca packed with mucin-laden secretory granules.
  They synthesise gel-forming and membrane mucins (MUC5B, MUC4, MUC16),
  decorate them with dense mucin-type O-linked glycans, fold and oligomerise
  them through an expanded ER (AGR2 and other protein-disulfide isomerases),
  store them in mucin granules, and release them to form the protective
  airway mucus gel — while also secreting a battery of antimicrobial and
  host-defense proteins into the airway surface liquid.
