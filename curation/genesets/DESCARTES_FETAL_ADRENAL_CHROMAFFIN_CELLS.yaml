gene_set_id: MSIGDB:DESCARTES_FETAL_ADRENAL_CHROMAFFIN_CELLS
gene_set_name: DESCARTES_FETAL_ADRENAL_CHROMAFFIN_CELLS
collection: C8
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of chromaffin cells of the human FETAL adrenal
  medulla (Descartes fetal cell atlas, Cao et al. 2020, PMID:33184181; MSigDB
  C8). Chromaffin cells are the catecholamine-producing neuroendocrine cells of
  the sympathoadrenal lineage. This is an early developmental signature: it is
  dominated by the sympathoadrenal / autonomic-neuron specification and neuronal
  projection program rather than by the mature catecholamine-synthesis
  machinery. Present are the sympathoadrenal / noradrenergic specification
  transcription factors ISL1, HAND1, TLX3, INSM2 and HMX1, the NGF receptor
  NTRK1 (TrkA, sympathoadrenal trophic survival), neuronal cytoskeleton /
  projection genes (PRPH, GAP43, MAP1B, STMN4, TUBB2A, TUBB2B, PLXNA4),
  neuropeptides (NPY, GAL, GALP), ion channels (RYR2, KCNB2, CACNG2) and ADCY8.
  The single catecholamine-handling gene present is the noradrenaline reuptake
  transporter SLC6A2 (NET). Notably, the cell type's textbook-defining effector
  machinery is ABSENT from this fetal signature: the catecholamine-biosynthesis
  enzymes TH, DBH, DDC and PNMT, the chromaffin-granule chromogranins CHGA and
  CHGB, and the vesicular monoamine transporter SLC18A1 (VMAT1) are NOT members.
  The set therefore captures the developmental specification of the cell type far
  more than its mature catecholamine output; those defining effector functions
  are recorded below as membership_gap associations.
