description: >-
  WikiPathways Nonalcoholic Fatty Liver Disease (NAFLD/MASLD) pathway gene set
  (MSigDB C2:CP:WIKIPATHWAYS, 155 genes). The set represents the major
  mechanistic arms of the disease: hepatic lipid accumulation via de novo
  lipogenesis, impaired fatty-acid beta-oxidation, and triglyceride storage in
  lipid droplets; insulin resistance and dysregulated insulin signalling;
  mitochondrial dysfunction and reactive-oxygen-species generation; progression
  from simple steatosis to steatohepatitis (NASH) driven by cytokine-mediated
  inflammation; and hepatocyte apoptosis. The WikiPathways representation
  captures established pathway biology and reflects the mechanistic consensus
  for NAFLD/MASLD at the time of curation.
