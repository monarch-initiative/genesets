gene_set_id: MSIGDB:AIZARANI_LIVER_HEPATOCYTES
gene_set_name: AIZARANI_LIVER_HEPATOCYTES
collection: C8
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of mature hepatocytes from human liver (Aizarani
  et al. liver atlas, MSigDB C8). Hepatocytes are the principal metabolic
  parenchymal cells of the liver, accounting for roughly 80% of liver volume;
  they execute xenobiotic detoxification via cytochrome P450 enzymes, lipid and
  lipoprotein metabolism, bile acid biosynthesis, synthesis of most plasma
  proteins including coagulation factors and complement components, and
  gluconeogenesis. This mature-hepatocyte signature is distinguished from the
  fetal hepatoblast set (DESCARTES_FETAL_LIVER_HEPATOBLASTS) by strong
  expression of adult-phase drug-metabolising enzymes and full hepatocyte
  metabolic differentiation.
