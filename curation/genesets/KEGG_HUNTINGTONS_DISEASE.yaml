gene_set_name: KEGG_HUNTINGTONS_DISEASE
collection: C2:CP:KEGG_LEGACY
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy Huntington's disease pathway gene set (MSigDB C2 curated gene set).
  This is a disease pathway gene set, not a cell-type signature. The member genes
  are heavily enriched for mitochondrial electron-transport-chain subunits
  (oxidative phosphorylation), transcriptional coactivators and repressors
  (CBP/CREBBP, SP1, NCOR, HDAC families reflecting transcriptional dysregulation),
  and apoptosis regulators, reflecting the major mechanistic arms of the KEGG
  Huntington's disease pathway representation. Polyglutamine-expanded mutant
  huntingtin (HTT) drives intranuclear inclusion body formation, and the resulting
  transcriptional dysregulation and mitochondrial impairment converge on striatal
  neuron death. As a legacy/core pathway it captures established mechanism and
  omits more recently characterised arms such as selective autophagy/mitophagy.
