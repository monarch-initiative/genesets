description: >-
  Single-cell marker signature of the basophil / mast cell cluster of human lung
  (Travaglini et al. 2020 Nature, PMID:33208946; MSigDB C8). This MSigDB cluster
  combines basophils and mast cells, the granulocyte/granular immune effectors
  that carry the high-affinity IgE receptor (FcεRI) and release preformed
  granule mediators on activation; mast cell is treated here as the primary
  identity, with basophil (CL:0000767) overlapping. The signature carries the
  crisp mast cell effector program: the secretory-granule serine proteases
  tryptase TPSAB1 and TPSB2 and carboxypeptidase A3 (CPA3), the two FcεRI
  subunits MS4A2 (FcεRI beta) and FCER1A (FcεRI alpha), the stem-cell-factor
  receptor KIT (CD117), the histamine-biosynthesis enzyme histidine
  decarboxylase HDC, the vesicular monoamine transporter SLC18A2 (VMAT2), and
  the mast/basophil master transcription factor GATA2. Also present are the
  lipid-mediator enzymes LTC4S (leukotriene C4 synthase), HPGDS (hematopoietic
  prostaglandin D2 synthase) and ALOX5AP (FLAP); the FcεRI signaling adaptors
  LAT2 (NTAL), GRAP2 (GADS), BTK and RAC2; the IL-33 receptor IL1RL1 (ST2);
  the granule components SRGN (serglycin), CTSG (cathepsin G) and CD63; the
  basophil/mast activation marker ENPP3 (CD203c); and the negative regulator of
  IgE-mediated degranulation RGS13.
