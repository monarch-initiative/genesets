      processes. Confirmatory for a mast/basophil signature.
  - term:
      id: GO:0001821
      label: histamine secretion
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: cell_type_specific
    seed_source: curator_added
    recovery_status: annotation_gap
    insight: confirmatory
    curator_note: >-
      Histamine release is the signature vasoactive output of mast cells and
      basophils, and the genes for the full histamine arm are present: histidine
      decarboxylase HDC (the rate-limiting biosynthetic enzyme, histidine →
      histamine) and the vesicular monoamine transporter SLC18A2 (VMAT2) that
      loads amines into granules, with the actual release occurring through the
      FcεRI-triggered degranulation machinery above. Recorded as an annotation_gap
      rather than annotation_supported: these genes are members but their GOA
      annotations sit on adjacent terms — HDC on histamine biosynthetic process
      and SLC18A2 on monoamine/amine transport — that do not roll up to the
      unifying GO:0001821 histamine secretion, so enrichment does not recover the
      secretion term itself. Added by curator (a GO annotation curation target) to
      record the cell type's defining histamine effector identity, which is split
      across biosynthesis, vesicular loading and exocytosis annotations.
  - term:
