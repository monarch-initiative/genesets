    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Mast cells/basophils are inflammatory effector cells, and the set carries a
      genuine de novo lipid-mediator (eicosanoid) inflammatory arm alongside the
      preformed mediators: LTC4S (leukotriene C4 synthase, cysteinyl-leukotriene
