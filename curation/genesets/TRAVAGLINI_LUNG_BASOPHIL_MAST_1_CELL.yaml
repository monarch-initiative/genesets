    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Mast cell activation is the broader cell-type-specific umbrella process —
      the change in behavior on exposure to antigen (via IgE/FcεRI), cytokines or
