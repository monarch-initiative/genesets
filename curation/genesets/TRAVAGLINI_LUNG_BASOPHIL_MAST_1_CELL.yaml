      GOA-human, so annotation_supported. Marked lineage_shared and
      supporting_process because inflammatory response as a term is common to many
      immune effector cells; the mast-cell-distinctive contribution is the
      leukotriene/PGD2 lipid-mediator program rather than the broad term itself.
