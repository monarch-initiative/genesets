  - term:
      id: GO:0043303
      label: mast cell degranulation
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Regulated exocytosis of secretory granules loaded with preformed mediators
      (histamine, neutral proteases, proteoglycans) is the defining effector
      function of the mast cell/basophil and the molecular event that this
      signature is built to capture. It is annotation_supported: the FcεRI beta
      subunit MS4A2 and the negative regulator RGS13 are annotated in the mast
      cell activation/degranulation branch of GOA-human, the granule-exocytosis
      regulator RAB27B is a member, and the released cargo itself — tryptases
      TPSAB1/TPSB2, carboxypeptidase A3 (CPA3), cathepsin G (CTSG) and the
      proteoglycan scaffold serglycin (SRGN) — is all present. Confirmatory: a
      mast/basophil marker set recovering mast cell degranulation recapitulates
      the cell type's identity by construction.
  - term:
      id: GO:0038095
      label: Fc-epsilon receptor signaling pathway
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Signaling through the high-affinity IgE receptor FcεRI is the canonical,
      cell-type-defining activation trigger of mast cells and basophils, carried
      by the crispest markers in the set. annotation_supported: the two receptor
      chains FCER1A (the IgE-binding alpha subunit) and MS4A2 (the signal-
      amplifying beta subunit) are directly annotated to the Fc-epsilon receptor
      signaling pathway in GOA-human, together with the downstream proximal
      machinery present here — the membrane adaptor LAT2 (NTAL), the GADS adaptor
      GRAP2, Bruton tyrosine kinase BTK and the Rho-family GTPase RAC2.
      Confirmatory: FcεRI signaling is the textbook activation pathway of this
      cell type and is entailed by the presence of FCER1A and MS4A2.
  - term:
      id: GO:0030141
      label: secretory granule
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The dense secretory (metachromatic) granule is the characteristic cellular
      structure of the mast cell/basophil and the store of preformed mediators
      released on degranulation. annotation_supported: the mast-cell-specific
      granule cargo drives recovery — tryptases TPSAB1 and TPSB2, carboxypeptidase
      A3 (CPA3), cathepsin G (CTSG) and the granule-matrix proteoglycan serglycin
      (SRGN) are annotated to the secretory granule / secretory granule lumen,
      with the granule-membrane tetraspanin CD63 also present. Marked
      cell_type_specific because, although secretory granule as a term is generic
      to many secretory cells, here it is recovered specifically through the
      mast-cell tryptase/CPA3 granule complement that defines this cell type.
  - term:
