description: >-
  Single-cell marker signature of inhibitory (GABAergic) neurons from human fetal
  cerebrum (Descartes fetal cell atlas, Cao et al. 2020, PMID:32848094). The
  contrasting pole to the excitatory (glutamatergic) neuron set. This is an early
  developmental signature: it is dominated by the transcription factors that
  specify forebrain GABAergic interneuron identity in the ventral telencephalon
  (DLX1, DLX2, DLX5, DLX6, ARX, LHX8, ISL1, SP8, TFAP2B, PAX2) together with
  interneuron-subtype neuropeptides (CCK, PDYN, TAC3, CORT via CENPS-CORT, AVP)
  and the cell-identity markers SCGN, SYNPR, RELN and SLC6A5. Notably, the mature
  GABAergic effector machinery — the GABA-synthesizing enzymes GAD1/GAD2 and the
  vesicular GABA transporter SLC32A1 (VGAT) — is ABSENT from this fetal signature.
  The set therefore captures the specification/differentiation program of the cell
  type far more than its mature neurotransmitter output.
