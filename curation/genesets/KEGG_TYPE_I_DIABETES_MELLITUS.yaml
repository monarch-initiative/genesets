gene_set_id: MSIGDB:KEGG_TYPE_I_DIABETES_MELLITUS
gene_set_name: KEGG_TYPE_I_DIABETES_MELLITUS
collection: C2:CP:KEGG_LEGACY
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy type 1 diabetes mellitus pathway gene set (MSigDB C2 curated gene set).
  This is a disease pathway gene set representing autoimmune destruction of pancreatic
  beta cells. Member genes are heavily enriched for antigen presentation machinery
  (MHC class I and II), cytotoxic T-cell effectors (granzymes, perforin), apoptosis
  regulators (CASP3, CASP8, BAD, BCL2-family), and cytokine signaling components,
  reflecting the major mechanistic arms of the KEGG type 1 diabetes pathway: immune
  recognition, T-cell-mediated beta-cell killing, and beta-cell apoptosis. Insulin and
  related beta-cell function genes are also represented as the targeted tissue.
contexts:
  - term:
