    curator_note: >-
      The cellular-component counterpart of the antigen-presentation arm. HLA-E
      (mouse Qa-1b), a captured member, is a non-classical MHC class I molecule and
      carries this complex annotation, so it is recovered (annotation_supported).
      Scored confirmatory and supporting (medium confidence) rather than a fresh
      insight: that an antigen-presentation gene set implicates the MHC class I
      complex is entailed by the antigen-presentation biology already captured above.
      No verbatim snippet is attached because the abstract names "antigen presentation"
      as a process but does not name the MHC class I complex as such.
  - term:
      id: GO:0007259
      label: cell surface receptor signaling pathway via JAK-STAT
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      JAK1, JAK2 and STAT1 are captured members and carry the JAK–STAT annotation, so
      enrichment recovers it (annotation_supported). Scored confirmatory because
      JAK–STAT is the canonical signal-transduction cascade immediately downstream of
      the IFN-γ receptor (IFNGR1/IFNGR2); its appearance is entailed by the IFN-γ
      sensing core_process rather than being an independent mechanistic surprise. Kept
      as a distinct supporting_process because it is the specific molecular conduit
      (receptor-associated kinases → STAT1) the resistance hits and PTPN2 act on.
