        reference_title: "A general introduction to the biochemistry of mitochondrial fatty acid beta-oxidation."
        supports: SUPPORT
        evidence_source: OTHER
        snippet: "FAO is a key metabolic pathway for energy homoeostasis in organs such as the liver, heart and skeletal muscle."
        explanation: >-
          Fatty acid metabolic process is the defining axis of this Hallmark set,
          whose members encode the enzymes that interconvert and degrade fatty
          acids. This biochemistry review establishes fatty-acid catabolism (FAO)
          as the key metabolic route through which fatty acids are handled for
          energy homoeostasis in the very tissues (liver, heart, skeletal muscle)
          where these genes are highly expressed. The set's acyl-CoA
          dehydrogenases, hydratases, hydroxyacyl-CoA dehydrogenases and
          thiolases carry fatty-acid-metabolic-process annotations, so enrichment
          recovers this overarching process (annotation_supported).
  - term:
      id: GO:0006635
      label: fatty acid beta-oxidation
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    evidence:
      - reference: PMID:20195903
        reference_title: "A general introduction to the biochemistry of mitochondrial fatty acid beta-oxidation."
        supports: SUPPORT
        evidence_source: OTHER
        snippet: "Once inside the mitochondria, acyl-CoAs are degraded into acetyl-CoA units via the classic series of four enzyme reactions"
        explanation: >-
          Fatty acid beta-oxidation is the most specific and most heavily
          populated module of the gene set. The review describes the canonical
          four-reaction cycle (dehydrogenation, hydration, second dehydrogenation,
          thiolytic cleavage) that shortens an acyl-CoA by two carbons per turn.
          Each step maps directly onto member genes: the acyl-CoA dehydrogenases
          ACADM/ACADL/ACADVL/ACADS (step 1), the enoyl-CoA hydratases ECH1/EHHADH
          and the trifunctional protein HADHA (steps 2-3), and the thiolases
          ACAA1/ACAA2 (step 4), with CPT1A/CPT2 providing the carnitine shuttle
          that delivers long-chain substrates. These genes carry
          fatty-acid-beta-oxidation annotations, so enrichment recovers this core
          process (annotation_supported); broadly_expressed because FAO operates
          across essentially all oxidative tissues rather than being
          lineage-restricted.
  - term:
      id: GO:0005739
      label: mitochondrion
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The mitochondrion is the principal site of fatty acid beta-oxidation and
      the dominant cellular compartment for this gene set. The carnitine-shuttle
      proteins (CPT1A, CPT2, CRAT, SLC25A20), the membrane-bound and matrix FAO
      enzymes (ACADVL, ACADM, HADHA, HADHB, ECH1, ACAA2) and the electron-transfer
      flavoproteins that feed FAO-derived electrons into the respiratory chain are
      all mitochondrial. These products carry mitochondrion annotations, so the
      compartment is recovered (annotation_supported).
  - term:
      id: GO:0005777
      label: peroxisome
    aspect: cellular_component
    category: core_component
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Fatty acid beta-oxidation also proceeds in the peroxisome, which handles
      very-long-chain and branched-chain fatty acids that mitochondria cannot
      fully oxidise. The peroxisomal FAO members of the set (ACOX1, EHHADH,
      HSD17B4, and the peroxisomal thiolase activity of ACAA1) carry peroxisome
      annotations, so this second FAO compartment is recovered
      (annotation_supported). Scored core_component but at medium confidence
      because it represents a smaller, complementary fraction of the set relative
      to the dominant mitochondrial compartment.
  - term:
      id: GO:0006629
      label: lipid metabolic process
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Lipid metabolic process is the broad parent of fatty-acid metabolism and is
      recovered because the set also includes lipid-handling enzymes beyond the
      core FAO cycle (e.g. fatty-acid activation, elongation, ketone-body and
      sterol/lipid-modifying enzymes). It is supporting rather than core because
      it is a generic superclass of the defining fatty-acid-metabolic-process
      axis asserted above rather than a separate biological activity.
  - term:
      id: GO:0006637
      label: acyl-CoA metabolic process
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Fatty acids are metabolised as their coenzyme-A thioesters, and many set
      members act on acyl-CoA intermediates: the acyl-CoA synthetases/ligases that
      activate fatty acids, the carnitine acyltransferases (CPT1A, CPT2, CRAT)
      that exchange the CoA and carnitine moieties, and the acyl-CoA thioesterases.
      These carry acyl-CoA-metabolic-process annotations, so the term is recovered
      (annotation_supported). Scored supporting: it captures the thioester
      chemistry that enables FAO rather than constituting a separate defining
      activity of the set.
