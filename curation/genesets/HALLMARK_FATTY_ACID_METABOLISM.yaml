description: >-
  MSigDB Hallmark gene set of genes encoding proteins involved in the metabolism
  of fatty acids (MSigDB brief description: "Genes encoding proteins involved in
  metabolism of fatty acids"). This is a metabolic-process signature, not a
  cell-type signature; the dominant functional module is fatty acid
  beta-oxidation (FAO), the catabolic pathway that shortens activated fatty
  acyl-CoAs two carbons at a time. Member genes include the acyl-CoA
  dehydrogenases that catalyse the first FAO step (ACADM, ACADL, ACADVL, ACADS),
  the mitochondrial trifunctional protein and matrix enzymes for the remaining
  hydratase / hydroxyacyl-CoA dehydrogenase / thiolase steps (HADHA, HADHB, HADH,
  ECH1, EHHADH, ACAA1, ACAA2), the carnitine shuttle that imports long-chain
  acyl-CoAs into the mitochondrion (CPT1A, CPT2, CRAT, SLC25A20), peroxisomal FAO
  enzymes (ACOX1, EHHADH, HSD17B4), and additional lipid-metabolism enzymes. FAO
  proceeds in both mitochondria and peroxisomes and supplies acetyl-CoA to the
  TCA cycle and reducing equivalents to the electron transport chain, making this
  an energy-homeostasis programme that is active across liver, heart, and
  skeletal muscle. Because the member enzymes literally carry the GO annotations
  for the fatty-acid metabolic processes they execute, enrichment recovers those
  processes (annotation_supported) rather than leaving them as gaps. Fatty acid
  metabolism is a pan-tissue metabolic program rather than a cell type, disease,
  or anatomical entity, so this file intentionally carries zero biological
  contexts; the program is captured entirely in the associations below.
