    evidence:
      - reference: PMID:17082649
        reference_title: "Transcriptional profiling of the human monocyte-to-macrophage differentiation and polarization: new molecules and patterns of gene expression."
        supports: SUPPORT
        evidence_source: IN_VITRO
        snippet: "with expected up-regulation of cyclo-oxygenase 2 in M1 cells"
        explanation: >-
          The M1 pole is the pro-inflammatory macrophage state: the paper
          reports up-regulation of cyclo-oxygenase 2 (PTGS2/COX-2) in M1 cells,
          and the broader signature is dominated by inflammatory effectors (TNF,
          IL1B, IL6, the chemokines CXCL9/10/11). Inflammatory response is
          intrinsic and core to what the M1 state IS, and these member genes
          carry the annotation, so enrichment recovers it (annotation_supported).
    curator_note: >-
      Kept core (not supporting): unlike a partly-protective state where
      inflammation is downgraded, pro-inflammatory activation is the defining
      function of the classically activated M1 pole. specificity is
      broadly_expressed because inflammatory response itself is shared across
      very many immune contexts and is not macrophage-specific.
  - term:
      id: GO:0034341
      label: response to type II interferon
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Interferon-gamma (type II interferon) is the canonical inducer of
      classical M1 activation, and the IFN-gamma/STAT1-IRF1 response module is a
      hallmark of the signature: the induced chemokines CXCL9, CXCL10 and CXCL11,
      together with STAT1, IRF1 and IDO1, are core M1 markers annotated to
      response to type II interferon, so enrichment recovers it
      (annotation_supported). Kept core because IFN-gamma response is
      mechanistically central to what defines the classically activated pole;
      specificity is broadly_expressed because responsiveness to IFN-gamma is
      shared across many cell types and is not macrophage-specific.
  - term:
      id: GO:0042742
      label: defense response to bacterium
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Classically activated M1 macrophages are the microbicidal effector pole:
      they kill intracellular and phagocytosed bacteria through reactive oxygen
      and nitrogen species and antimicrobial effectors. Antibacterial defense
      genes in the signature carry this annotation, so enrichment recovers it
      (annotation_supported). Scored supporting rather than core, and
      lineage_shared rather than cell_type_specific, because antibacterial
      defense is a general myeloid/phagocyte capacity that is a downstream
      effector function of the M1 state rather than its identity-defining axis.
  - term:
