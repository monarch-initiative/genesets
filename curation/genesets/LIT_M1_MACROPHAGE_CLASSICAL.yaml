      label: nitric oxide biosynthetic process
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Inducible nitric oxide synthase (NOS2/iNOS) is a canonical marker of
      classically activated M1 macrophages, producing nitric oxide as a
      microbicidal and pro-inflammatory effector. NOS2 is a member of the
      signature and carries this annotation, so enrichment recovers it
      (annotation_supported). Scored supporting (medium): NO biosynthesis is a
      characteristic effector output of M1 activation rather than the defining
      identity process, and is lineage_shared as a myeloid antimicrobial
      capacity (and more pronounced in mouse than human macrophages).
