  label: Homo sapiens
direction: UP
series: SERIES:MACROPHAGE_POLARIZATION
series_role: classical
description: >-
  Literature-defined cell-state ACTIVITY signature of classically activated
  (M1) macrophages, the pro-inflammatory pole of macrophage polarization
  profiled by Martinez, Gordon, Locati and Mantovani (J Immunol 2006,
  PMID:17082649) by transcriptome analysis of human monocyte-derived
  macrophages driven to the M1 versus M2 phenotype. Unlike MSigDB causal/driver
  disease pathway sets, the members here are the READOUT of an ACTIVE program,
  not driver mutations: they are the genes UPregulated in classically activated
  (M1) macrophages relative to resting macrophages, when monocyte-derived
  macrophages are polarized by the canonical M1 stimuli lipopolysaccharide (LPS)
  and interferon-gamma (IFN-gamma). The signature is dominated by a
  pro-inflammatory and antimicrobial program: the inflammatory cytokines TNF,
  IL1B, IL6 and the Th1-polarizing IL12B; the IFN-gamma/STAT1-IRF1 axis and its
  effector chemokines CXCL9, CXCL10 and CXCL11; the tryptophan-catabolizing
  IDO1; inducible nitric oxide synthase NOS2 (iNOS); the co-stimulatory CD80;
  the inflammatory cyclo-oxygenase PTGS2 (COX-2); and feedback regulators such
  as SOCS3. Because the member genes literally carry the GO annotations for the
  processes the M1 state executes, enrichment recovers those processes
  (annotation_supported) rather than leaving them as gaps. This set is one POLE
  of a polarization series (series SERIES:MACROPHAGE_POLARIZATION): it is paired
  with the reciprocal alternatively activated (M2) macrophage signature, the
  IL-4/IL-13-driven tissue-remodelling/anti-inflammatory pole, against which the
  same shared terms resolve to contrasting interpretations. DISEASE RELEVANCE:
  the M1 program is the classically activated, microbicidal and pro-inflammatory
  macrophage state that drives host defense against intracellular pathogens but,
  when chronic or dysregulated, contributes to inflammatory and autoimmune
  pathology (atherosclerosis, rheumatoid arthritis, inflammatory bowel disease,
  metabolic inflammation).
