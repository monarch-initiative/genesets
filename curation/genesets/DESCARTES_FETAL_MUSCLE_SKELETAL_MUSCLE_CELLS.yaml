      label: translation
    aspect: biological_process
    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Translation is a ubiquitous housekeeping process. Its appearance in
      enrichment results reflects highly expressed ribosomal protein genes
      common to actively growing and differentiating cells such as fetal
      skeletal muscle myocytes; not a skeletal-muscle-specific function.
      Illustrates a non-informative housekeeping enrichment hit.
  - term:
      id: GO:0048741
      label: skeletal muscle fiber development
    aspect: biological_process
    category: core_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: curator_added
    recovery_status: annotation_gap
    curator_note: >-
      Skeletal muscle fiber development — the maturation of myotubes into
      mature, fiber-type-specified muscle fibers — is biologically core to the
      Descartes fetal skeletal muscle signature; fetal skeletal muscle cells
      are precisely the transitional state this term describes. It is more
      specific than GO:0007519 (skeletal muscle tissue development) and captures
      the single-cell-level fiber maturation process. This is an annotation_gap:
      key structural genes in this signature (MYH3, MYH8, ACTA1, TNNT3) are
      annotated primarily to sarcomere/myofibril components and to muscle
      contraction, but are not consistently annotated to this developmental
      child term in GOA-human, reflecting incomplete GO annotation depth rather
      than absence of the biological process. This represents a GO annotation
      curation target.
