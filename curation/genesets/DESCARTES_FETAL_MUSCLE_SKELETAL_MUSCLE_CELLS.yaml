  - term:
      id: GO:0003009
      label: skeletal muscle contraction
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    evidence:
      - reference: PMID:29419405
        reference_title: "Muscle Contraction."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "the filaments of actin and myosin that power their contraction are organized into repeating arrays, called sarcomeres, that have a striated microscopic appearance"
        explanation: >-
          Skeletal muscle contraction is the defining functional process of
          skeletal myocytes and myofibers. This review establishes that skeletal
          (and cardiac) striated muscle contracts via actin/myosin sarcomere
          arrays. GO:0003009 is the skeletal-muscle-specific child of the
          generic muscle contraction term and directly captures the core process
          of this fetal skeletal muscle cell type. Crucially distinct from
          cardiac muscle contraction (GO:0060048): both share the sarcomere
          mechanism, but the cell type, isoforms, regulatory circuitry, and
          voluntary versus autonomous control are entirely different.
    curator_note: >-
      Skeletal muscle contraction is the defining process of this cell type.
      Fetal skeletal muscle cells are already assembling the contractile
      apparatus at the developmental stages captured by the Descartes atlas;
      this is the most specific GO term for their core function and is not
      shared with cardiac or smooth muscle lineages.
  - term:
      id: GO:0030017
      label: sarcomere
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      The sarcomere is the repeating contractile unit of the myofibril and is
      the defining ultrastructural hallmark of striated muscle cells, including
      skeletal myofibers. Marker genes encoding sarcomeric proteins (MYH3, MYH8,
      ACTA1, TNNI2, TNNT3) are prominent in fetal skeletal muscle signatures.
      Shared structurally with cardiac muscle but with distinct isoform
      composition; the term is cell-type-specific to the striated muscle lineage.
  - term:
      id: GO:0030016
      label: myofibril
    aspect: cellular_component
    category: core_component
    confidence: medium
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Myofibrils are the highly organized bundles of sarcomeres that fill the
      cytoplasm of skeletal muscle fibers. Formation of myofibrils is a key
      step in myofiber maturation during fetal myogenesis. Enrichment of
      myofibril-associated genes is characteristic of striated muscle marker
      sets; medium confidence because enrichment of myofibril genes partially
      overlaps with genes annotated to the sarcomere child term.
