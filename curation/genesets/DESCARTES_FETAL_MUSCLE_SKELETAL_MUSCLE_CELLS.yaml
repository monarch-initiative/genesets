  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of skeletal muscle cells (myocytes/myofibers)
  from human fetal skeletal muscle (Descartes atlas, MSigDB C8). Fetal skeletal
  muscle cells are striated, voluntary-muscle lineage cells that arise from
  myoblast fusion, progressively assemble sarcomeric contractile apparatus, and
  undergo myogenesis to form mature multinucleated myofibers. They are
  fundamentally distinct from cardiac muscle cells: contraction is voluntary,
  innervated by somatic motor neurons, and sarcomere composition is dominated by
  fetal/neonatal skeletal myosin heavy-chain isoforms (MYH3, MYH8) rather than
  cardiac isoforms (MYH6, MYH7). The fetal context means these cells are in
  active developmental transition, making myogenesis and fiber maturation
  processes biologically prominent alongside structural contractile genes.
