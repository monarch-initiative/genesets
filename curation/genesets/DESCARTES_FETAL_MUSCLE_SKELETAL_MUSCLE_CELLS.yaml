  - term:
      id: GO:0007519
      label: skeletal muscle tissue development
    aspect: biological_process
    category: core_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    evidence:
      - reference: PMID:31407867
        reference_title: "Skeletal muscle: A review of molecular structure and function, in health and disease."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "molecular mechanisms underlying muscle tissue development (myogenesis), with an emphasis on satellite cells and muscle regeneration"
        explanation: >-
          Fetal skeletal muscle cells in the Descartes atlas represent cells
          undergoing active myogenesis — fusion of myoblasts into myotubes and
          progressive assembly of the contractile apparatus. This review
          confirms that myogenesis is the central developmental programme of
          skeletal muscle, directly supporting the inclusion of skeletal muscle
          tissue development as a core process for this fetal signature.
    curator_note: >-
      Because the Descartes atlas captures fetal tissue, these skeletal muscle
      cells are in an active developmental state, making skeletal muscle tissue
      development a biologically core process rather than merely a supporting
      or peripheral process. Medium confidence because enrichment tools may not
      reliably recover developmental terms from marker sets dominated by
      structural and contractile protein genes.
  - term:
