description: >-
  Single-cell marker signature of airway smooth muscle cells from human lung
  (Travaglini et al., MSigDB C8). Airway smooth muscle is the contractile
  mesenchymal layer encircling the conducting airways; its calcium- and
  myosin-light-chain-kinase-driven contraction sets bronchial tone and airway
  caliber. The signature is dominated by the canonical smooth-muscle contractile
  program (ACTA2, MYH11, CNN1, TAGLN, MYLK, DES, LMOD1, MYOCD, PLN, ACTG2).
