taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of pancreatic beta cells (type B pancreatic
  cells) from human pancreas (Muraro et al. single-cell atlas of the human
  pancreas, MSigDB C8). Beta cells are the predominant endocrine cell type of
  the islets of Langerhans, constituting 50–80% of islet cells. Their defining
  function is the glucose-stimulated synthesis, packaging into dense core
  granules, and regulated secretion of insulin, the principal blood-glucose-
  lowering hormone. Impaired beta-cell function underlies all forms of diabetes
  mellitus.
