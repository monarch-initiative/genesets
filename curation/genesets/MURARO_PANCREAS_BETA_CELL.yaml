    insight: confirmatory
    evidence:
      - reference: PMID:25697093
        reference_title: "Pancreatic beta-cell identity, glucose sensing and the control of insulin secretion."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Insulin release from pancreatic beta-cells is required to maintain normal glucose homoeostasis in man and many other animals."
        explanation: >-
          This review establishes insulin secretion as the defining function of
          the pancreatic beta cell. The Muraro beta-cell signature is enriched
          for genes that mediate glucose-stimulated insulin secretion (INS,
          PCSK1, PCSK2, SCG5, SLC30A8, GCK), making insulin secretion the
          cardinal core process of this cell-type signature.
    curator_note: >-
      Insulin secretion (GO:0030073) is the primary defining process of the
      beta cell. It encompasses proinsulin synthesis in the ER, processing in
      the Golgi/dense core granule, and regulated exocytosis triggered by
      elevated blood glucose. This term is highly specific to pancreatic beta
      cells and a small number of other insulin-secreting cell types.
  - term:
      id: GO:0071333
      label: cellular response to glucose stimulus
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Glucose sensing is the hallmark trigger of beta-cell function: rising
      blood glucose enters via GLUT2 (SLC2A2), is phosphorylated by
      glucokinase (GCK, the beta-cell glucose sensor), metabolised to raise
      ATP/ADP, closes KATP channels, depolarises the plasma membrane, and
      triggers Ca2+-dependent insulin exocytosis. Cellular response to glucose
      stimulus (GO:0071333) therefore captures the upstream sensing step
      inseparable from insulin secretion and is cell-type-specific to beta
      cells and a few other glucose-responsive cell types.
  - term:
      id: GO:0031045
      label: dense core granule
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Dense core granules (also called B-granules or insulin secretory
      granules) are the organelles in which mature insulin is stored and from
      which it is released by regulated exocytosis. Beta cells contain
      approximately 10,000 dense core granules each. Multiple Muraro signature
      genes (INS, chromogranin/secretogranin family members, SLC30A8) localise
      to these granules. Dense core granule is a cellular-component term that
      is essentially diagnostic of the beta-cell identity in the context of the
      endocrine pancreas.
  - term:
      id: GO:0050796
      label: regulation of insulin secretion
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Regulation of insulin secretion (GO:0050796) reflects the extensive
      molecular circuitry that modulates the magnitude and timing of insulin
      release — including KATP channel subunits (KCNJ11, ABCC8), voltage-gated
      Ca2+ channels, and incretin-receptor signalling. These regulatory genes
      are prominent in the Muraro beta-cell signature. The term is
      cell-type-specific and is distinguished from the core insulin secretion
      term because it captures modulatory rather than effector machinery;
      supporting_process is appropriate because the regulation is essential but
      subsidiary to the actual secretion event.
  - term:
      id: GO:0006412
      label: translation
    aspect: biological_process
    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Translation is a ubiquitous housekeeping process. Its enrichment in the
      Muraro beta-cell signature reflects the extraordinary translational
      burden of the beta cell, which must produce large quantities of
      proinsulin/insulin protein, but the term itself is not informative as a
      beta-cell marker. Ribosomal protein and elongation-factor genes drive
      this enrichment signal and are present in virtually every active cell
      type. This is a canonical non-specific housekeeping hit.
  - term:
      id: GO:0003309
      label: type B pancreatic cell differentiation
    aspect: biological_process
    category: core_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: curator_added
    recovery_status: annotation_gap
    insight: confirmatory
    curator_note: >-
      Type B pancreatic cell differentiation (GO:0003309) captures the
      developmental program that specifies the beta-cell identity, controlled
      by transcription factors PDX1, NKX6-1, NEUROD1, MAFA, and PAX6 —
      several of which appear in the Muraro beta-cell signature. Enrichment-
      based approaches recover functional secretion terms preferentially, but
      not developmental identity terms, because the transcription factors that
      maintain beta-cell identity carry incomplete downstream GO annotations.
      This is an annotation_gap: the genes are present in the set but their GO
      annotations do not specifically propagate to type B pancreatic cell
      differentiation at sufficient depth to be recovered by enrichment. Added
      by curator to reflect the defining developmental process of this
      cell-type signature and to flag a GO annotation curation target.
