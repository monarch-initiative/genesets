gene_set_id: MSIGDB:DESCARTES_FETAL_EYE_PHOTORECEPTOR_CELLS
gene_set_name: DESCARTES_FETAL_EYE_PHOTORECEPTOR_CELLS
collection: C8
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of photoreceptor cells from human fetal eye/retina
  (Descartes fetal atlas, Cao et al. 2020 Science; MSigDB C8). Because the cells
  are FETAL, the signature is dominated by the structural machinery that
  photoreceptors build first — the outer segment and the connecting cilium /
  periciliary apparatus (RPGRIP1, MAK, CDHR1, EYS, USH2A, IMPG1, IMPG2, CERKL,
  LRIT2, PDC) — rather than by the mature light-response cascade. Phototransduction
  is only partially represented: the transducin alpha subunits GNAT1 (rod) and
  GNAT2 (cone), the rod cyclic-nucleotide-gated channel subunit CNGB1, the
  transducin regulator PDC (phosducin), and the cone channel modulator KCNV2 are
  present, but the mature rod/cone effector module — rhodopsin (RHO), the cone
  opsins (OPN1LW/MW/SW), the phosphodiesterase catalytic subunits (PDE6A/PDE6B),
  recoverin (RCVRN), arrestin (SAG) and rhodopsin kinase (GRK1) — is largely
  ABSENT, consistent with photoreceptors that have not yet switched on the mature
  cascade. A large fraction of the set is lincRNA / antisense / pseudogene noise
  (e.g. LINC00457/00463/01053/01915/02058/02932/03062, EGFLAM-AS1, PRICKLE2-AS1/AS2,
  GPC5-IT1, MTATP6P15, MTCO1P15/CO2P15, RPL18P11, RPL30P7) that carries no
  informative GO signal.
