description: >-
  WikiPathways amyotrophic lateral sclerosis (ALS) pathway gene set (MSigDB C2
  curated gene set, collection C2:CP:WIKIPATHWAYS). This is a disease pathway
  gene set, not a cell-type signature. ALS is a fatal progressive neurodegenerative
  disease characterised by selective degeneration of upper and lower motor neurons,
  leading to paralysis and respiratory failure. At 38 member genes this set is
  more compact than the legacy KEGG ALS pathway; it captures the core mechanistic
  arms of ALS pathobiology as represented in WikiPathways: SOD1-mediated oxidative
  stress, glutamate excitotoxicity through ionotropic receptors (AMPA/NMDA),
  mitochondrial dysfunction, and downstream apoptotic execution of motor neurons.
  It is a distinct gene set from KEGG_AMYOTROPHIC_LATERAL_SCLEROSIS_ALS (different
  source, different membership) and is curated independently.
