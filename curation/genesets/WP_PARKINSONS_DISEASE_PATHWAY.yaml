description: >-
  WikiPathways Parkinson's disease pathway gene set (MSigDB C2 curated gene set,
  collection C2:CP:WIKIPATHWAYS). This is a disease pathway gene set, not a
  cell-type signature. At 71 member genes, this set is substantially smaller
  than the KEGG legacy Parkinson's disease pathway and represents the mechanistic
  architecture of PD centred on its established causal genetic determinants:
  alpha-synuclein (SNCA) misfolding and Lewy body formation, the PINK1/Parkin
  axis mediating mitophagy of damaged mitochondria, ubiquitin-proteasome system
  (UPS) dysfunction (PRKN/parkin E3 ligase, UCHL1, proteasome subunits),
  dopaminergic neuron biology (TH, DDC, MAOB, SLC6A3), mitochondrial complex I
  dysfunction, and apoptotic dopaminergic neuron death. Unlike the KEGG PD
  legacy pathway — which is dominated by electron-transport-chain subunits —
  the WikiPathways PD set emphasises established PD causal gene products (SNCA,
  PRKN, PINK1, PARK7/DJ-1, LRRK2) and their molecular interactions. The
  PINK1/Parkin mitophagy pathway and alpha-synuclein aggregation biology are
  distinctive features relative to the KEGG version and are curated
  independently.
