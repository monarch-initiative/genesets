gene_set_id: MSIGDB:DESCARTES_FETAL_CEREBRUM_ASTROCYTES
gene_set_name: DESCARTES_FETAL_CEREBRUM_ASTROCYTES
collection: C8
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of astrocytes from human fetal cerebrum (Descartes
  atlas). Astrocytes are the most abundant class of macroglial cells in the central
  nervous system and are defined by expression of glial fibrillary acidic protein
  (GFAP), a type III intermediate filament. In the developing cerebrum, astrocytes
  provide structural and metabolic support to neurons, clear synaptic glutamate via
  high-affinity excitatory amino acid transporters (EAAT1/SLC1A3, EAAT2/SLC1A2),
  modulate synaptic transmission, and regulate the extracellular ionic environment.
  Their differentiation from radial glia is a defining event of mid-to-late fetal
  brain development.
