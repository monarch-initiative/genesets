  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy viral myocarditis pathway gene set (MSigDB C2 curated gene set).
  This is an infection-driven inflammatory heart disease pathway gene set, not a
  cell-type signature. The member genes are drawn from three mechanistic arms:
  (1) MHC-mediated antigen presentation and adaptive immune activation, in which
  virus-infected cardiomyocytes display viral peptides via upregulated MHC class I
  molecules (HLA-A/B/C, B2M, TAP1/TAP2, TAPBP) and professional antigen-presenting
  cells engage MHC class II (HLA-DR); (2) immune-mediated cardiomyocyte killing by
  CD8 cytotoxic T cells and NK cells using the perforin/granzyme (PRF1, GZMA,
  GZMB) and Fas/FasL (FAS, FASLG) cytotoxic programs, amplified by inflammatory
  cytokines (TNF, IFNG, IL1B, IL6, IL10); and (3) direct cytoskeletal disruption
  via enteroviral protease 2A cleavage of dystrophin (DMD), uncoupling the
  sarcomere from the sarcolemma through the dystrophin-associated glycoprotein
  complex (DMD, SGCA/B/G/D, DAG1, SNTA1) — a mechanism shared with the KEGG
  dilated cardiomyopathy pathway. As a KEGG legacy pathway it captures established
  mechanistic arms known at the time of curation.
