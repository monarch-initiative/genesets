    evidence:
      - reference: PMID:9160750
        reference_title: "The transcription factor GATA-3 is necessary and sufficient for Th2 cytokine gene expression in CD4 T cells."
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        snippet: "GATA-3 was selectively expressed in Th2 cells"
        explanation: >-
          The gene set is, by definition, the readout of the Th2 lineage
          differentiation program: the defining paper identifies GATA-3 as the
          master transcription factor that is selectively expressed in Th2 cells
          as naive CD4 precursors commit to the Th2 subset, and shows it is
          necessary and sufficient to drive the Th2 cytokine program. GATA3 and
          the cytokine and signaling genes it controls are the dominant members
          of this UP signature and carry the T-helper 2 cell differentiation
          annotation, so enrichment recovers it (annotation_supported). This is
          the central identity-defining ACTIVE program of the set, not a driver
          lesion, and it is precisely the fate that is NOT taken at the
          contrasting Th1/Th17/Treg poles of the series.
    curator_note: >-
      Kept core and cell_type_specific because acquisition of the Th2 fate is the
      single identity-defining process of this signature, and the master
      regulator GATA3 together with the STAT6 axis and the type 2 cytokines are
      the dominant members of the UP set.
  - term:
      id: GO:0032633
      label: interleukin-4 production
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    evidence:
      - reference: PMID:9160750
        reference_title: "The transcription factor GATA-3 is necessary and sufficient for Th2 cytokine gene expression in CD4 T cells."
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        snippet: "GATA-3 directly activated an IL-4 promoter-luciferase reporter gene in M12 cells"
        explanation: >-
          Production of interleukin-4 is the signature effector output of the Th2
          state: the defining paper shows the Th2 master factor GATA-3 directly
          activates the IL-4 promoter, and IL4 is a canonical member of this UP
          signature. The IL4 gene and its transcriptional regulators carry the
          interleukin-4 production annotation, so enrichment recovers it
          (annotation_supported). Kept core because IL-4 is the defining,
          autocrine-amplifying Th2 cytokine; scored lineage_shared rather than
          cell_type_specific because IL-4 production is shared with mast cells,
          basophils, NKT cells and group 2 innate lymphoid cells.
    curator_note: >-
      One of the two strongest core terms (with T-helper 2 cell differentiation);
      evidence attached here. IL-4 both defines and reinforces the Th2 program,
      so it is core despite being produced by other type 2 effectors as well.
  - term:
      id: GO:0042092
      label: type 2 immune response
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The Th2 cell is the central adaptive orchestrator of the type 2 immune
      response — the IL-4/IL-5/IL-13-driven program of resistance to helminths
      and the basis of allergic inflammation. The signature cytokine members
      (IL4, IL5, IL13) and the receptor/transcription-factor module carry this
      annotation, so enrichment recovers it (annotation_supported). Kept core
      because mounting the type 2 response is the physiological purpose the Th2
      state serves; scored lineage_shared because, by its own definition, the
      type 2 response is executed jointly with eosinophils, basophils, mast cells
      and ILC2 rather than by Th2 cells alone.
  - term:
