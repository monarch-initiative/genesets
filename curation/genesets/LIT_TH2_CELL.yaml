description: >-
  Literature-defined cell-state ACTIVITY signature of the type 2 T-helper (Th2)
  CD4+ effector lineage, the GATA-3/IL-4 differentiation program established by
  Zheng and Flavell (Cell 1997, PMID:9160750), who showed that the transcription
  factor GATA-3 is selectively expressed in Th2 cells and is necessary and
  sufficient for Th2 cytokine gene expression in CD4 T cells. Unlike MSigDB
  causal/driver disease pathway sets, the members here are the READOUT of an
  ACTIVE program, not driver mutations: they are the genes UP in the
  differentiated Th2 state relative to naive or alternatively polarized CD4 T
  cells. The signature is built around the master Th2 transcription factor GATA3
  and the signature type 2 cytokines it controls — IL4, IL5 and IL13 (with IL9
  and the regulatory IL10) — together with the IL-4 receptor/STAT6 signaling axis
  (IL4R, STAT6) that drives and amplifies the program, the alarmin (IL-33)
  receptor IL1RL1/ST2, the Th2 trafficking chemokine receptors CCR4 and CCR8, the
  prostaglandin D2 receptor PTGDR2/CRTH2, and Th2-promoting transcriptional
  regulators such as MAF (c-Maf) and GFI1. Because the member genes literally
  carry the GO annotations for the processes the Th2 state executes (Th2
  differentiation, IL-4/IL-5/IL-13 production, the type 2 immune response, B-cell
  help and IgE class switching), enrichment recovers those processes
  (annotation_supported) rather than leaving them as gaps. This set is ONE pole
  of a four-member SERIES of CD4 T-helper effector fates (series
  SERIES:CD4_THELPER): Th1 (IFN-gamma/T-bet), Th2 (this set, IL-4/GATA-3), Th17
  (IL-17/RORgammaT) and Treg (FOXP3), mutually antagonistic differentiation
  programs against which the same lineage-level terms (T-helper cell
  differentiation, cytokine production) resolve to contrasting type-specific
  interpretations. DISEASE RELEVANCE: the Th2 program is the central driver of
  type 2 immunity — protective against helminth and other extracellular parasites
  but, when dysregulated, the core pathogenic axis of allergic disease (allergic
  asthma, atopic dermatitis, allergic rhinitis, eosinophilic esophagitis and
  food allergy), where IL-4/IL-13 drive IgE class switching and IL-5 drives
  eosinophilia. The defining mechanistic experiments were performed in the mouse
  (transgenic CD4 T cells and the D10 Th2 clone); we curate the
  human-orthologous program and keep the taxon human per corpus convention.
contexts:
  - term:
      id: CL:0000546
      label: T-helper 2 cell
    context_type: cell_type
    role_note: >-
      Type 2 T-helper cell, the GATA3/IL-4 program. The signature reads out the
      differentiated Th2 state of the CD4-positive, alpha-beta T cell — defined
      by the master transcription factor GATA-3 and capacity to produce
      interleukin-4 — rather than any single disease. CL:0000546 (T-helper 2
      cell) is the anchoring cell-state context; its contrasting poles in the
      series are the Th1, Th17 and Treg CD4 effector fates.
