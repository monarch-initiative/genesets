      interleukin-13 production annotation, so enrichment recovers it
      (annotation_supported). Scored supporting rather than core, and
      lineage_shared, because IL-13 is a downstream type 2 effector output that
      is prominently shared with group 2 innate lymphoid cells, mast cells and
      basophils rather than a Th2-identity-defining process.
  - term:
      id: GO:0048295
      label: positive regulation of isotype switching to IgE isotypes
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Provision of B-cell help and induction of IgE class switching is the
      classic humoral arm of the Th2 program: IL-4 (and IL-13) produced by the
      Th2 cell positively regulate switching of B cells to the IgE isotype, the
      molecular basis of atopic and allergic disease. The member cytokine IL4
      carries this annotation, so enrichment recovers it (annotation_supported).
      Scored supporting rather than core, and lineage_shared, because IgE
      switching is a downstream effector consequence enacted in cooperation with
      B cells rather than an intrinsic identity-defining Th2 process.
