        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "the postnatal cardiac fibroblast which is responsible for producing the majority of the ECM"
        explanation: >-
          Cardiac fibroblasts are the principal source of extracellular matrix
          in the myocardium. This review of cardiac ECM biology directly
          establishes ECM organization as the defining functional output of
          cardiac fibroblasts, supporting the association as a core process of
          this cell-type marker signature.
    curator_note: >-
      Extracellular matrix organization is the canonical effector process of
      fibroblasts across connective tissues, and the most direct molecular
      descriptor of cardiac fibroblast activity. Although the term is
      broadly_expressed across stromal cell types in many organs, it is highly
      specific relative to the non-stromal cell types (cardiomyocytes,
      endothelial cells, immune cells) that co-inhabit the heart. Marker genes
      encoding structural ECM proteins (COL1A1, COL1A2, COL3A1, FBN1, ELN,
      DCN, LUM) are expected to dominate this signature.
  - term:
