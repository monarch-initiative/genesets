  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of cardiac fibroblasts from the human heart
  (Tucker et al. heart cell atlas, MSigDB C8). Cardiac fibroblasts
  (CL:0002548, fibroblast of cardiac tissue) are stromal cells embedded in the
  myocardial interstitium that maintain cardiac structural integrity by
  synthesising and remodelling extracellular matrix components, principally
  fibrillar collagens, fibronectin, and proteoglycans. Unlike fibroblasts in
  other organs, cardiac fibroblasts are continuously exposed to the cyclic
  mechanical loading of the beating heart, making mechanosensory signalling a
  defining feature of their biology and distinguishing them from lung or skin
  fibroblasts. Upon myocardial injury, cardiac fibroblasts activate and can
  transdifferentiate into myofibroblasts, producing a reparative collagen-rich
  scar. The signature is dominated by ECM structural and biosynthetic genes,
  consistent with the primary secretory and organisational function of this
  cell type in the cardiac stroma.
