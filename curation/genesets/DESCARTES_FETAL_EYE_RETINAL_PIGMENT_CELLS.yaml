gene_set_id: MSIGDB:DESCARTES_FETAL_EYE_RETINAL_PIGMENT_CELLS
gene_set_name: DESCARTES_FETAL_EYE_RETINAL_PIGMENT_CELLS
collection: C8
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of retinal pigment epithelial (RPE) cells from
  human fetal eye (Descartes fetal cell atlas, Cao et al. 2020; MSigDB C8). The
  RPE is the pigmented epithelial monolayer behind the neural retina that runs
  the visual (retinoid) cycle, re-isomerising all-trans-retinol to 11-cis-retinal
  to supply photoreceptor chromophore, and supports photoreceptors via subretinal
  ion/fluid homeostasis, outer-segment phagocytosis and the outer blood-retina
  barrier. The signature is dominated by the visual-cycle machinery (RPE65, LRAT,
  RLBP1/CRALBP, RGR, BCO1) and RPE support genes (BEST1, SLC16A8, MFRP, TTR,
  ITGAV, CLDN19); notably, the melanogenic effectors are not yet expressed in
  this fetal stage.
