series_role: down
description: >-
  MSigDB C2:CGP gene set of genes DOWN-regulated in peripheral blood mononuclear cells
  (PBMC) from patients with sickle cell disease compared to healthy subjects (Jison ML
  et al. 2004, PMID:15031206). The DOWN component captures the relative reduction of
  lymphocyte (T-cell and B-cell) signatures and ribosomal/translation programs in SCD
  PBMC. This relative decrease reflects the pathological inflammatory myeloid shift that
  accompanies SCD: the expanded and activated myeloid/inflammatory compartment dilutes
  the lymphoid signal, so T-cell receptor signaling, adaptive immune response, and
  ribosomal protein expression — hallmarks of resting lymphocytes — appear
  down-regulated in SCD PBMC relative to healthy controls. The set is complementary to
  JISON_SICKLE_CELL_DISEASE_UP, which captures the oxidant, hemolytic, and inflammatory
  response genes that are up-regulated in the same comparison.
