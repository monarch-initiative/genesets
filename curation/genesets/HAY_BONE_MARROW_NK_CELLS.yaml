  - term:
      id: GO:0045087
      label: innate immune response
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    insight: confirmatory
    curator_note: >-
      NK cells are innate immune lymphocytes that respond without prior
      sensitization. Innate immune response is shared with other innate cells
      (macrophages, DCs) and is therefore lineage-shared rather than NK-specific.
