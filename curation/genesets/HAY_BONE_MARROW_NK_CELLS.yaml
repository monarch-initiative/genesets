    aspect: cellular_component
    category: core_component
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    insight: confirmatory
    curator_note: >-
      NK cells store cytotoxic effectors (perforin, granzymes) in lytic/secretory
      granules. The secretory granule compartment is a hallmark of cytotoxic
      lymphocyte biology and is expected to be enriched in NK cell marker sets.
