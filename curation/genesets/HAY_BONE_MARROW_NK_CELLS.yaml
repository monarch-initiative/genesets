taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of natural killer (NK) cells from human bone marrow
  (Hay et al.). NK cells are innate lymphocytes that kill virus-infected and
  transformed target cells via granule exocytosis (perforin/granzyme) and death
  receptor pathways without prior sensitization.
