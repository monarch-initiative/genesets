    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The entire KEGG pathway models the cellular response of gastric epithelial
      cells to a bacterial pathogen, H. pylori. Response to bacterium is therefore
      a direct and accurate descriptor of this pathway's biological context. Many
      set members involved in innate sensing and downstream signalling (e.g.
      NFKBIA, MAP3K7/TAK1, NOD1-downstream adaptors) carry response-to-bacterium
      annotations in GOA-human. The term is broadly applicable across cell types
      and bacterial species and is therefore supporting rather than uniquely
      discriminating for this specific pathway.
