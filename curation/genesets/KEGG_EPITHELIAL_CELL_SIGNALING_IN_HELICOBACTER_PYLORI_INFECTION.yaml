description: >-
  KEGG legacy Helicobacter pylori epithelial-cell signaling pathway gene set
  (MSigDB C2 curated gene set). This is an infection-driven inflammatory disease
  pathway gene set, not a cell-type signature. H. pylori colonises the gastric
  mucosa and deploys virulence factors — CagA (injected via the type IV secretion
  system, T4SS), VacA (vacuolating cytotoxin), and peptidoglycan fragments
  (recognised by the intracellular receptor NOD1) — to activate the canonical
  IKK-NF-kappaB cascade and multiple MAPK branches (ERK1/2, p38, JNK) in gastric
  epithelial cells. The downstream transcriptional output drives robust
  pro-inflammatory chemokine and cytokine production, most prominently CXCL8
  (IL-8), which recruits neutrophils to the gastric mucosa and initiates the acute
  inflammatory response underlying H. pylori-associated gastritis. Persistent
  infection establishes a chronic inflammatory microenvironment that is a major
  risk factor for peptic ulcer disease and intestinal-type gastric cancer. Member
  genes encode kinases of the IKK complex and MAPK tiers, IkB proteins (NFKBIA),
  NF-kappaB subunits, chemokines and cytokines (CXCL8, IL-1B), receptor tyrosine
  kinases (EGFR, MET), and adaptors (SHP2/PTPN11) that mediate cytoskeletal
  remodelling. As a legacy KEGG pathway it captures the established core
  mechanism.
