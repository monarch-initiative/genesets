direction: NA
description: >-
  KEGG legacy glioma pathway gene set (MSigDB C2 curated gene set).
  This is a cancer disease pathway gene set, not a cell-type signature. The member
  genes are heavily enriched for growth-factor receptor signaling components (EGFR,
  PDGFRA/B and their downstream effectors), RAS/MAPK pathway members (HRAS, KRAS,
  NRAS, RAF1, MAP2K1, MAPK1/3), PI3K/AKT effectors (PIK3CA, PIK3R1, PTEN, AKT1),
  cell-cycle regulators driving G1/S transition (CDKN2A, CDK4, CDK6, CCND1, RB1,
  E2F family), and the TP53 tumor-suppressor axis, reflecting the major mechanistic
  arms of the KEGG glioma pathway: receptor tyrosine kinase-driven initiation,
  RAS/MAPK-mediated proliferation, PI3K/AKT survival signaling, cell-cycle
  checkpoint bypass, and TP53-mediated apoptosis deregulation.
