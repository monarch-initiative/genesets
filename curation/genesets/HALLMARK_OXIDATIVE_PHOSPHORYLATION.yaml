      id: GO:0006119
      label: oxidative phosphorylation
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    evidence:
      - reference: PMID:34777681
        reference_title: "Interplay between Mitochondrial Metabolism and Cellular Redox State Dictates Cancer Cell Survival."
        supports: SUPPORT
        evidence_source: OTHER
        snippet: "Mitochondria are the main powerhouse of the cell, generating ATP through the tricarboxylic acid cycle (TCA) and oxidative phosphorylation (OXPHOS), which drives myriad cellular processes."
        explanation: >-
          The 200-gene Hallmark OXPHOS set is built almost entirely from the
          structural subunits of ETC complexes I-V and the TCA-cycle enzymes that
          feed them; their collective biochemical output IS oxidative
          phosphorylation, making it the defining core process of the set. This
          cancer-metabolism review names OXPHOS (with the TCA cycle) as the
          mitochondrial route that generates ATP and drives cellular processes,
          and frames a switch to mitochondrial OXPHOS as part of the metabolic
          plasticity that is a hallmark of cancers - situating this signature as
          the oxidative pole of the tumour-metabolism (Warburg) axis. Because the
          member genes carry the OXPHOS GO annotations directly, enrichment
          recovers this core process (annotation_supported); broadly_expressed
          because oxidative phosphorylation operates across essentially all
          aerobically respiring human cell types.
