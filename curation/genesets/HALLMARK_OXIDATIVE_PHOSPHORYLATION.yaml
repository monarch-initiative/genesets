description: >-
  MSigDB Hallmark gene set (systematic name M5936; Liberzon et al. 2015,
  PMID:26771021) of 200 genes "encoding proteins involved in oxidative
  phosphorylation". This is a metabolic-PROCESS signature, not a cell-type
  signature: the members are predominantly nuclear-encoded structural subunits
  of the mitochondrial electron-transport-chain (ETC) complexes I-V - NADH
  dehydrogenase (NDUFA/NDUFB/NDUFS/NDUFV*), succinate dehydrogenase
  (SDHA/B/C/D, also TCA-cycle complex II), ubiquinol-cytochrome c reductase
  (UQCRC1/UQCRC2/UQCRFS1/UQCRB/UQCRH/UQCRQ), cytochrome c oxidase
  (COX4I1/COX5A/COX5B/COX6A1/COX6B1/COX6C/COX7*/COX8A) and ATP synthase
  (ATP5F1A/B/C/D/E, ATP5MC1-3, ATP5PB/PD/PF/PO) - together with TCA-cycle
  enzymes (CS, ACO2, IDH2/3A/3B/3G, OGDH, DLST, SUCLG1, SUCLA2, FH, MDH2) and
  mitochondrial ribosomal proteins that translate the mtDNA-encoded ETC
  subunits. Because these member genes literally ARE the OXPHOS machinery, they
  carry the GO annotations for the bioenergetic processes they execute, so
  enrichment recovers those processes (annotation_supported) rather than leaving
  them as gaps - this is an active-program / activity signature, unlike a
  driver-mutation panel. This set is the OXIDATIVE pole of the tumour-metabolism
  (Warburg) axis (series SERIES:TUMOR_METABOLISM, series_role oxidative), the
  contrasting counterpart to the glycolytic pole HALLMARK_GLYCOLYSIS: the Warburg
  effect describes cancer cells shifting energy production away from
  mitochondrial OXPHOS toward aerobic glycolysis, so the two hallmarks resolve to
  opposite metabolic interpretations of the same axis. Oxidative phosphorylation
  is a metabolic process rather than a cell type, disease or anatomical entity,
  so (as in LIT:PROLIFERATION_METAGENE and the BUFFA hypoxia panel) this file
  intentionally carries zero biological contexts; the program is captured
  entirely in the associations below. The hallmark is undirected (direction NA)
  and operates across virtually all aerobically respiring human cell types.
