        supports: SUPPORT
        evidence_source: OTHER
        snippet: "mitochondrial respiration coupled with the passage of electrons through the electron transport chain (ETC) set up a potential source of reactive oxygen species (ROS)"
        explanation: >-
          The ETC complex I-IV subunits (NDUFA/NDUFB/NDUFS/NDUFV*, SDHA-D,
          UQCRC1/UQCRC2/UQCRFS1, COX4I1/COX5A/COX5B/COX6*/COX7*/COX8A) are the
          literal electron-carrier machinery of the respiratory chain, and
          dominate the membership of this set. This review describes mitochondrial
          respiration as the passage of electrons through the ETC, the step that
          establishes the proton-motive force consumed by ATP synthase. The set's
          ETC-subunit members carry respiratory-electron-transport annotations, so
          enrichment recovers this term (annotation_supported). Scored co-equal
          core with oxidative phosphorylation because electron transport is the
          molecular arm that drives the coupled phosphorylation; broadly_expressed
          because the respiratory chain operates across nearly all aerobic cell
          types.
  - term:
      id: GO:0009060
      label: aerobic respiration
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Aerobic respiration is the overarching oxygen-dependent energy-yielding
      program that this gene set executes end to end: the TCA-cycle enzymes (CS,
      ACO2, IDH3A/3B/3G, OGDH/DLST, SUCLG1/SUCLA2, FH, MDH2) generate the reducing
      equivalents (NADH, FADH2) that the respiratory chain (NDUF*, SDH*, UQCR*,
      COX*) oxidises with O2 as the terminal electron acceptor, coupled to ATP
      synthase (ATP5*). Kept core because aerobic respiration is the defining
      biological activity of the set as a whole; annotation_supported because the
      ETC and ATP-synthase members carry aerobic-respiration annotations that
      enrichment recovers through the GO hierarchy; broadly_expressed because
      aerobic respiration is engaged by essentially every mitochondrion-bearing
      human cell type.
