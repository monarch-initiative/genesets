gene_set_id: MSIGDB:KEGG_ALLOGRAFT_REJECTION
gene_set_name: KEGG_ALLOGRAFT_REJECTION
collection: C2:CP:KEGG_LEGACY
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy allograft rejection pathway gene set (MSigDB C2 curated gene set).
  This is a disease pathway gene set representing alloimmune-mediated tissue destruction
  following solid organ or tissue transplantation. Host (recipient) T cells recognise
  donor MHC alloantigens presented on transplanted tissue, then clonally expand and
  differentiate into effector cells that destroy graft tissue through direct cytotoxicity
  (perforin-granzyme and Fas-FasL pathways) and pro-inflammatory cytokine release
  (TNF, IL-1alpha/beta, IFN-gamma, IL-2). NK cells contribute additional cytotoxic
  killing via shared perforin-granzyme machinery. Member genes are enriched for MHC
  class I (HLA-A, HLA-B, HLA-C, B2M) and class II (HLA-DRA, HLA-DRB1, HLA-DQA1,
  HLA-DQB1, HLA-DPA1, HLA-DPB1) molecules, cytotoxic effectors (PRF1, GZMB, FASLG),
  cytokine and cytokine-receptor signalling components (IL2, IL1A, IL1B, TNF, IFNG,
  IL6, IL10), and co-stimulatory molecules (CD80, CD86, CD28). This pathway represents
  host-versus-graft directionality — recipient immune cells attacking the donor organ —
  and should be distinguished from graft-versus-host disease (GVHD), where the reverse
  polarity applies: donor T cells attacking host tissue. As a legacy KEGG pathway
  representation, the set captures the established alloimmune effector phase and omits
  some regulatory and upstream priming events.
