taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy Prion Diseases pathway gene set (MSigDB C2 curated gene set).
  This is a disease pathway gene set, not a cell-type signature. The member
  genes reflect the major mechanistic arms of the KEGG prion diseases pathway
  (hsa05020): conversion of the cellular prion protein (PrPC) to its
  pathogenic misfolded isoform (PrPSc) with amyloid fibril formation;
  complement-mediated early prion propagation; neuroinflammatory activation
  of astrocytes and microglia; caspase-dependent neuronal apoptosis; and
  endoplasmic-reticulum stress and unfolded protein response signalling.
  Ribosomal protein subunits present in the gene set drive non-specific
  translation enrichment signals.
