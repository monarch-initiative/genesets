    evidence:
      - reference: PMID:28329764
        reference_title: "The lung is a site of platelet biogenesis and a reservoir for haematopoietic progenitors."
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        snippet: "The contribution of the lungs to platelet biogenesis is substantial, accounting for approximately 50% of total platelet production or 10 million platelets per hour."
        explanation: >-
          Lefrancais et al. directly imaged the lung microcirculation and showed
          that megakaryocytes resident in/transiting the lung release a large
          fraction of the body's platelets, establishing the lung as a primary
          site of terminal platelet production. This grounds GO:0030220 (platelet
          formation) as the defining, cell-type-specific process of this fetal
          lung megakaryocyte signature and explains why the platelet program is
          recovered from a lung-derived single-cell cluster.
    curator_note: >-
      Platelet formation (platelets budding from proplatelet processes extended
      by megakaryocytes) is the defining terminal function of this cell type, so
      it is core_process. annotation_supported: carrier genes present in the set
      and directly annotated to platelet formation / proplatelet biology in
      goa_human include TUBB1 (the megakaryocyte/platelet beta-1 tubulin that
      builds the proplatelet marginal microtubule band), GP1BA, ITGA2B/ITGB3,
      FLNA (filamin A), MPL and NBEAL2. insight is confirmatory because the
      signature is by construction a megakaryocyte cluster.
  - term:
      id: GO:0070527
      label: platelet aggregation
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Platelet aggregation (platelet-platelet adhesion via surface receptors)
      is the central effector function of the lineage's terminal product and is
      densely represented in the signature, so it is core_process. The set
      carries the canonical aggregation receptors and their activation
      machinery: the fibrinogen receptor ITGA2B/ITGB3 (GPIIb/IIIa), the
      von Willebrand factor receptor subunit GP1BA with GP9 (the GPIb-IX
      complex), the collagen receptor GP6, the thrombin receptor F2R (PAR1) and
      F2RL3 (PAR4), the ADP receptor P2RY1, the thromboxane receptor TBXA2R, and
      the inside-out integrin-activation module RAP1B, TLN1 and FERMT3
      (kindlin-3). annotation_supported and confirmatory of platelet identity.
  - term:
      id: GO:0031091
      label: platelet alpha granule
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The platelet alpha granule is the characteristic megakaryocyte-derived
      secretory organelle, whose cargo is synthesised largely at the
      megakaryocyte stage; it is therefore a core_component for this cell type.
      annotation_supported by alpha-granule cargo and biogenesis genes present
      in the set: PF4 (the GO term's own exemplar), PPBP (CXCL7/pro-platelet
      basic protein), SELP (P-selectin, the alpha-granule membrane protein
      mobilised to the surface on activation), THBS1 (thrombospondin-1) and the
      alpha-granule biogenesis regulator NBEAL2. Note the endocytosed cargo VWF
      is NOT a member of this signature, so the granule signal here is carried
      by the megakaryocyte-synthesised cargo rather than the plasma-derived
      component.
  - term:
      id: GO:0030219
      label: megakaryocyte differentiation
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Acquisition of megakaryocyte identity from a myeloid precursor is, by
      definition, the lineage program of this cluster, hence core_process.
      annotation_supported by the master regulators present in the set: the
      thrombopoietin receptor MPL (the cytokine receptor that drives
      megakaryopoiesis) together with the megakaryocyte/erythroid transcription
      factor circuit GATA1, its cofactor ZFPM1 (FOG1), NFE2, GFI1B and TAL1
      (with LYL1). The canonical megakaryocyte ETS factor FLI1 is NOT in this
      signature (a minor membership_gap in the TF module), but the program is
      otherwise well covered, so the overall status is annotation_supported.
      insight is confirmatory: differentiation into this very cell type is
      entailed by the set's construction.
  - term:
      id: GO:0007596
      label: blood coagulation
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Blood coagulation is recorded as supporting_process rather than
      core_process because the fibrin cascade proper is executed by plasma
      coagulation factors (largely hepatic); the platelet/megakaryocyte
      contribution is to provide the activated procoagulant surface and to
      release granule contents that accelerate clotting. annotation_supported by
      set genes annotated under blood coagulation, including PF4, the
      protease-activated receptors F2R (PAR1) and F2RL3 (PAR4), the
      ATP-gated channel P2RX1, ITGB3 and THBS1. Confirmatory for the hemostatic
      identity of the lineage.
  - term:
      id: GO:0007599
      label: hemostasis
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Hemostasis is the organism-level physiological output to which the
      platelet program contributes, the broad parent process above platelet
      aggregation and blood coagulation; it is categorised supporting_process
      because it describes the systems-level arrest of bleeding rather than the
      individual cell's molecular activity (mirroring how platelet aggregation
      is the cell-level core process here). annotation_supported by the same
      adhesion/activation carriers (GP1BA, GP9, ITGA2B, ITGB3, SELP, F2R,
      TBXA2R, CLEC1B). Retained as a distinct, higher-altitude term to capture
      the physiological role; confirmatory.
