  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of megakaryocytes from fetal human lung
  (Descartes fetal cell atlas, Cao et al. 2020; MSigDB C8). Megakaryocytes are
  large polyploid hematopoietic cells that undergo endomitosis and cytoplasmic
  restructuring to extend proplatelets and shed platelets. Their recovery from
  fetal lung reflects the lung as a physiological hematopoietic niche and a
  site of terminal platelet biogenesis, complementing bone-marrow
  thrombopoiesis. The signature is dominated by the megakaryocyte/platelet
  program: surface adhesion glycoproteins (ITGA2B/GPIIb, ITGB3, GP9, GP1BA,
  GP6), alpha-granule cargo (PF4, PPBP, SELP, THBS1), the proplatelet
  microtubule cytoskeleton (TUBB1) and signalling adaptor PLEK, and the
  megakaryocytic lineage transcription factors (GATA1, NFE2, GFI1B, ZFPM1,
  TAL1).
