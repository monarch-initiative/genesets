    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Beige adipocytes share much of the classical brown thermogenic
      differentiation program (PRDM16, PPARGC1A, EBF2, UCP1, CIDEA, DIO2), and
