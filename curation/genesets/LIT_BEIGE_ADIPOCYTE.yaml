          carry beige/brown fat-cell-differentiation annotations, so enrichment
          recovers this term (annotation_supported).
      - reference: PMID:22796012
        reference_title: "Beige adipocytes are a distinct type of thermogenic fat cell in mouse and human."
        supports: SUPPORT
        evidence_source: IN_VITRO
        snippet: "Beige cells have a gene expression pattern distinct from either white or brown fat and are preferentially sensitive to the polypeptide hormone irisin"
        explanation: >-
          The defining paper demonstrates that beige cells are a distinct fat-cell
          type with a gene-expression pattern unlike either white or classical
          brown fat, establishing beige fat cell differentiation as a
          cell_type_specific identity program rather than a shared one. This is
          why the beige-SELECTIVE markers (CD137/TNFRSF9, TMEM26, TBX1) and the
          irisin sensitivity define the set, and why enrichment over the
          differentiation regulators recovers this term (annotation_supported).
    curator_note: >-
      The identity-defining differentiation program of the set. Scored
      cell_type_specific (uniquely beige/brite) to contrast with the
      lineage_shared brown fat cell differentiation term below; both describe a
      thermogenic-adipocyte differentiation program, but only this one is specific
      to the white-fat-resident, inducible beige cell.
  - term:
      id: GO:0005739
      label: mitochondrion
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Thermogenesis is mitochondrial: induced beige adipocytes undergo
      mitochondrial biogenesis (driven by PPARGC1A/PGC-1alpha) and pack their
      mitochondria with UCP1 in the inner membrane plus electron-transport-chain
      and TCA-cycle machinery, so the mitochondrion is the defining cellular
      compartment of the thermogenic program this set reads out. The
      UCP1/PPARGC1A/CIDEA/COX members carry mitochondrial-localisation
      annotations, so enrichment recovers this core component
      (annotation_supported); broadly_expressed because mitochondria are present
      in essentially all human cell types even though their thermogenic
      specialisation here is beige-specific.
  - term:
      id: GO:0051591
      label: response to cAMP
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The proximal inducing signal for beige thermogenesis is cAMP: cold-driven
      sympathetic noradrenaline acts through beta-adrenergic receptors to raise
      cAMP, activating PKA and the downstream thermogenic transcriptional program
      - the defining paper explicitly shows beige cells respond to cyclic AMP
      stimulation with high UCP1 expression and respiration. cAMP-responsive
      members (e.g. UCP1, PPARGC1A, DIO2 induction) are annotated to response to
      cAMP, so enrichment recovers the term (annotation_supported). Scored
      supporting rather than core because it is the upstream signalling input
      (the browning trigger) rather than the thermogenic output itself;
      broadly_expressed because cAMP signalling is a general second-messenger
      response used across many cell types. No verbatim snippet is attached here
      because the cyclic-AMP evidence quote is carried on the core cold-induced
      thermogenesis term above.
  - term:
