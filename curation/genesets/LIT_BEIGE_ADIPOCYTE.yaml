series: SERIES:ADIPOCYTE_STATE
series_role: beige
description: >-
  Literature-defined cell-state ACTIVITY signature of the BEIGE (brite)
  adipocyte - the INDUCIBLE thermogenic pole that arises within white adipose
  tissue on cold or beta-adrenergic/cAMP stimulation. The program was defined by
  Wu, Bostrom, Spiegelman and colleagues (Cell 2012, PMID:22796012), who
  isolated "beige" cells from murine white fat depots and showed they are a
  distinct thermogenic fat-cell type that, like classical brown fat, respond to
  cyclic AMP stimulation with high UCP1 expression and respiration rates, yet
  have a gene-expression pattern distinct from either white or brown fat (and
  argued that the brown-fat deposits previously identified in adult humans are in
  fact composed of beige adipocytes). Beige is one of three members of
  SERIES:ADIPOCYTE_STATE: white (energy-storage, unilocular, UCP1-negative),
  classical brown (constitutive Myf5-lineage thermogenesis), and beige (this
  set) - the INDUCIBLE thermogenesis that emerges within white depots from a
  non-Myf5 lineage. The defining contrast is inducibility: beige cells have
  extremely low BASAL UCP1 but switch on a full thermogenic program (UCP1,
  PPARGC1A/PGC-1alpha, PRDM16, CIDEA, DIO2, ELOVL3, COX/ETC subunits, increased
  mitochondrial mass) in response to cold, sympathetic noradrenaline and cAMP/PKA
  signalling. The signature is anchored by beige-SELECTIVE surface and
  transcriptional markers that distinguish beige from classical brown and white -
  CD137/TNFRSF9, TMEM26 and TBX1 (the markers reported by the defining paper),
  together with CITED1, SHOX2 and the inducible thermogenic effectors UCP1 and
  PPARGC1A. Unlike MSigDB causal/driver disease pathway sets, the members here
  are the READOUT of an ACTIVE program, not driver mutations: they are the
  transcripts UP (high) in cold/cAMP-induced beige adipocytes relative to
  unstimulated white fat, so they literally carry the GO annotations for the
  thermogenic processes the state executes and enrichment recovers those
  processes (annotation_supported) rather than leaving them as gaps. DISEASE
  RELEVANCE: recruitable beige/brite fat increases whole-body energy expenditure
  and improves glucose and lipid homeostasis, making beige-adipocyte induction a
  much-pursued therapeutic strategy in obesity and type 2 diabetes - the paper
  frames beige cells as a mammalian cell type with therapeutic potential.
contexts:
  - term:
      id: CL:0001070
      label: beige adipocyte
    context_type: cell_type
    role_note: >-
      The directly matching Cell Ontology class: an adipocyte that is beige in
      colour, thermogenic, and that differentiates within white adipose tissue
      from a Myf5-negative progenitor. The signature reads out the INDUCIBLE
      (cold/cAMP/beta-adrenergic) thermogenic state of this brite adipocyte - the
      pole contrasted with the white (storage) and classical-brown (constitutive
      thermogenesis) members of this adipocyte-state series - so the beige
      adipocyte cell type is the anchoring context.
