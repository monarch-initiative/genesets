        supports: SUPPORT
        evidence_source: IN_VITRO
        snippet: "they respond to cyclic AMP stimulation with high UCP1 expression and respiration rates"
        explanation: >-
          The defining activity of the beige state is inducible UCP1-dependent
          thermogenesis: beige cells carry extremely low BASAL UCP1 but, on
          cyclic-AMP (downstream of cold/beta-adrenergic) stimulation, switch on
          high UCP1 expression and high respiration rates - i.e. cold-induced
          (non-shivering) thermogenesis. The thermogenic effectors driving this
          (UCP1, PPARGC1A/PGC-1alpha, PRDM16, CIDEA, DIO2) are members of the set
          and carry cold-induced-thermogenesis annotations, so enrichment recovers
          this core process (annotation_supported). Scored cell_state-defining
          core; specificity is lineage_shared because cold-induced thermogenesis
          is the property beige shares with classical brown adipocytes (the
          constitutive pole of this series), with the beige-specific distinction
          being its INDUCIBILITY within white fat.
      - reference: PMID:22796012
        reference_title: "Beige adipocytes are a distinct type of thermogenic fat cell in mouse and human."
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        snippet: "Brown fat generates heat via the mitochondrial uncoupling protein UCP1, defending against hypothermia and obesity"
        explanation: >-
          The paper frames the entire beige program against the canonical
          thermogenic mechanism it shares with brown fat - heat generation via
          the mitochondrial uncoupling protein UCP1 - which beige cells deploy
          upon induction. This establishes that the set's defining biological
          output is UCP1-mediated thermogenesis (cold-induced thermogenesis),
          recovered by enrichment because the UCP1/thermogenic effectors are
          members annotated to the term (annotation_supported).
    curator_note: >-
      This is the defining ACTIVE process of the beige cell state - inducible,
      UCP1-mediated non-shivering thermogenesis - and the central biological
      contrast that separates the thermogenic poles (beige/brown) from the
      storage pole (white) of SERIES:ADIPOCYTE_STATE.
  - term:
      id: GO:0009409
      label: response to cold
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Beige adipocytes are, by definition, cold-INDUCED: they emerge within white
      adipose tissue and acquire their thermogenic phenotype in response to cold
      exposure (via sympathetic noradrenaline) - the inducibility that defines the
      beige pole versus the constitutively thermogenic classical-brown pole and
      the storage-only white pole. The cold-responsive thermogenic effectors
      (UCP1, PPARGC1A, PRDM16, DIO2, CIDEA) are members annotated to response to
      cold / cold-induced thermogenesis, so enrichment recovers the term
      (annotation_supported). Kept core because cold induction is the
      identity-defining input of this state; specificity is lineage_shared because
      thermogenic response to cold is the program beige holds in common with
      classical brown adipocytes.
