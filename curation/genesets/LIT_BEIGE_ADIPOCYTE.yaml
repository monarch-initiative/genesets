          Beige fat cell differentiation is the cell-type-defining process of this
          set: the paper distinguishes beige/brite adipocytes as UCP1-positive
          cells that emerge within white fat from a non-Myf5 lineage - the white
          adipose tissue browning that yields the beige cell. The regulators and
