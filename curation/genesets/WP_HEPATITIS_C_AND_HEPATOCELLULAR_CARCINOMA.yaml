description: >-
  WikiPathways WP3646 gene set (MSigDB C2:CP:WIKIPATHWAYS). This pathway gene
  set spans two interlinked biological programmes: (1) the innate antiviral
  defence triggered by HCV infection — pattern recognition via RIG-I (DDX58)
  and MDA5 (IFIH1), MAVS-mediated signalling, IRF3/IRF7 activation, and
  induction of type I interferon-stimulated genes (IFIT family, MX1/2, OAS
  family, ISG15), together with HCV immune-evasion mechanisms (NS3/4A-mediated
  cleavage of MAVS and TRIF); and (2) the oncogenic reprogramming that drives
  hepatocellular carcinoma — Wnt/beta-catenin pathway activation (CTNNB1, APC,
  FZD family), MAPK/RAS proliferative signalling (KRAS, BRAF, MAP2K1,
  MAPK1/3), PI3K/AKT survival signalling, and dysregulation of apoptosis
  (TP53, BCL2 family, CASP3/9). This dual structure reflects the disease
  trajectory from chronic HCV infection and immune evasion through cirrhosis to
  hepatocellular carcinoma.
