    evidence:
      - reference: PMID:23063572
        reference_title: "Innate immunity and HCV."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "The HCV NS3/4A protease efficiently cleaves and inactivates two important signaling molecules in the sensory pathways that react to HCV pathogen-associated molecular patterns (PAMPs) to induce interferons (IFNs), i.e., mitochondrial antiviral signaling protein (MAVS) and Toll-IL-1 receptor domain-containing adaptor inducing IFN-β (TRIF)."
        explanation: >-
          This review (Heim 2012, J Hepatol) describes the central antiviral
          defence mechanism engaged during HCV infection: pattern-recognition
          receptors detect HCV PAMPs and signal through MAVS and TRIF to
          induce type I IFNs. Multiple RIG-I-pathway genes present in the
          WikiPathways HCV/HCC gene set — including DDX58 (RIG-I), IFIH1
          (MDA5), MAVS, TRIM25, IRF3, and IRF7 — are annotated to
          GO:0051607 (defense response to virus) in GOA-human, making this
          term the primary core biological process of the innate arm of the
          gene set. The snippet illustrates both the activation of this
          pathway (PAMP sensing) and its subversion by HCV, both of which
          are mechanistically represented in WP3646.
  - term:
