direction: NA
description: >-
  KEGG legacy asthma pathway gene set (MSigDB C2 curated gene set).
  This is a disease pathway gene set representing the allergic inflammatory
  cascade in asthma. Member genes are dominated by Th2/type-2 immune effectors:
  immunoglobulin E (IgE) pathway components, MHC class II antigen-presenting
  molecules (HLA-DRA, HLA-DRB1, HLA-DQA1, HLA-DQB1), Th2-polarising cytokines
  and their receptors (IL4, IL5, IL13, IL4R), mast cell and eosinophil
  effectors (FCER1A, FCER1G, MS4A2), and airway smooth muscle regulators.
  Antigen processing and presentation, IgE-mediated mast cell degranulation,
  eosinophil recruitment, and airway remodelling are the major mechanistic arms
  of the KEGG asthma pathway representation.
