    insight: confirmatory
    evidence:
      - reference: PMID:28057265
        reference_title: "Tbx1: Transcriptional and Developmental Functions."
        supports: SUPPORT
        snippet: "Here, we review recent literature concerning mechanisms of gene regulation by Tbx1 and its role in mammalian development, with a special focus on the cardiac, vascular, and central nervous systems."
        explanation: >-
          22q11.2 deletion syndrome presents with prominent neurodevelopmental
          features including intellectual disability, autism spectrum disorder,
          and markedly elevated risk of schizophrenia (approximately 25–30% of
          affected individuals). DGCR8, a key gene within the 22q11.2 locus,
          encodes a component of the microprocessor complex required for
          microRNA biogenesis and is essential for normal neuronal development.
          TBX1 itself has documented roles in central nervous system development.
          The gene set therefore captures nervous system development as a
          genuine, biologically substantive supporting process, though the term
          is lineage-shared rather than syndrome-specific.
