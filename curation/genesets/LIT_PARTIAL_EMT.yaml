      partial (not complete) EMT.
associations:
  - term:
      id: GO:0001837
      label: epithelial to mesenchymal transition
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    evidence:
      - reference: PMID:29198524
        reference_title: "Single-Cell Transcriptomic Analysis of Primary and Metastatic Tumor Ecosystems in Head and Neck Cancer."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "malignant cells varied within and between tumors in their expression of signatures related to cell cycle, stress, hypoxia, epithelial differentiation, and partial epithelial-to-mesenchymal transition (p-EMT)"
        explanation: >-
          (Partial) epithelial-to-mesenchymal transition is the defining ACTIVE
          program this signature reads out: p-EMT was discovered as one of the
          recurrent malignant-cell expression signatures across HNSCC patient
          tumours by single-cell RNA-seq, and the member genes (the laminins
          LAMC2/LAMB3, TGFBI, VIM, ITGA5) carry EMT-related GO annotations, so
          enrichment recovers this overarching process (annotation_supported).
          Scored lineage_shared because EMT is a process common to epithelial
          lineages and carcinomas rather than specific to one cell type.
          evidence_source HUMAN_CLINICAL because the program was defined directly
          from patient tumour single-cell transcriptomes.
  - term:
      id: GO:0030198
      label: extracellular matrix organization
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      The p-EMT program is dominated by extracellular-matrix and basement-membrane
      genes: the laminins LAMC2 and LAMB3, the top-ranked member TGFBI, and MMP10
      are the genes used to mark and validate the state. These members carry
      ECM-organization annotations, so it is a top enrichment hit over the set
      (annotation_supported). Kept core because the production/remodelling of ECM
      and basement-membrane components is the molecular hallmark of the p-EMT
      readout (the paper describes the program as a partial EMT "with extracellular
      matrix proteins"); lineage_shared because ECM organization is shared across
      epithelial and stromal lineages rather than confined to one cell type.
  - term:
      id: GO:0016477
      label: cell migration
    aspect: biological_process
    category: core_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    evidence:
      - reference: PMID:29198524
        reference_title: "Single-Cell Transcriptomic Analysis of Primary and Metastatic Tumor Ecosystems in Head and Neck Cancer."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Cells expressing the p-EMT program spatially localized to the leading edge of primary tumors."
        explanation: >-
          Migration/invasion is a core activity the p-EMT state confers: cells
          expressing the program localise to the invasive leading edge of primary
          tumours (consistent with a collective-migration model), and sorted
          p-EMT-high cells showed increased invasiveness in the paper's functional
          assays. The migratory/adhesion members (ITGA5, the laminins, VIM) carry
          cell-migration annotations, so enrichment recovers the term
          (annotation_supported). Scored medium and broadly_expressed because cell
          migration is a generic process invoked here as the functional consequence
          of the program rather than a p-EMT-specific term. evidence_source
          HUMAN_CLINICAL for the patient-tumour spatial localisation.
  - term:
      id: GO:0031589
      label: cell-substrate adhesion
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Cell-substrate adhesion is an enabling process of the p-EMT state: the
      integrin ITGA5 and the laminin ligands (LAMC2, LAMB3) that dominate the
      signature mediate attachment of malignant cells to the basement membrane and
      ECM at the invasive front, and carry cell-substrate-adhesion annotations, so
      enrichment recovers it (annotation_supported). Scored supporting rather than
      core because adhesion is one mechanistic arm enabling the migratory program
      rather than the defining EMT activity, and broadly_expressed because
      cell-substrate adhesion operates across many cell types beyond this context.
  - term:
      id: GO:0010718
      label: positive regulation of epithelial to mesenchymal transition
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: curator_added
    recovery_status: annotation_gap
    curator_note: >-
      The p-EMT program actively drives an EMT-like state, so positive regulation
      of EMT is biologically real for this set, but it is recorded as an
      annotation_gap: the genes that define p-EMT are predominantly downstream
      effectors/markers (laminins, TGFBI, ITGA5, MMP10) annotated to their ECM,
      adhesion and proteolysis roles rather than to EMT regulation, and the program
      pointedly LACKS the classical EMT-driving transcription factors (SNAIL, ZEB,
      TWIST) except SNAIL2. Added as curator_added because enrichment recovers the
      EMT process and its effector arms (above) more readily than the upstream
      regulatory term; scored supporting as the mechanism that promotes the core
      EMT activity. The gap is a GO-annotation curation target for the p-EMT
      effector genes.
