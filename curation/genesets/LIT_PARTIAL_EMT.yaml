gene_set_id: LIT:PARTIAL_EMT
gene_set_name: PARTIAL_EMT
collection: LIT:DISEASE_ACTIVITY
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: UP
description: >-
  Literature-defined disease-activity signature of the partial
  epithelial-to-mesenchymal transition (p-EMT) program in malignant head and
  neck squamous cell carcinoma (HNSCC) cells, defined by Puram et al. (Cell 2017,
  PMID:29198524) from single-cell RNA-seq of ~6,000 cells across 18 HNSCC
  patients. Unlike MSigDB causal/driver disease pathway sets, the members here
  are the READOUT of an ACTIVE cellular program, not driver mutations: they are
  the genes UPregulated in malignant cells that express the p-EMT state, recovered
  as a recurrent malignant-cell expression signature (alongside cell-cycle, stress,
  hypoxia and epithelial-differentiation programs) in patient tumours. The program
  is dominated by extracellular-matrix / basement-membrane and cell-adhesion genes:
  the laminins LAMC2 and LAMB3, the top-ranked member TGFBI, plus PDPN, ITGA5, MMP10
  and the mesenchymal marker VIM are the genes the authors used to mark and validate
  the state by immunohistochemistry. Critically, this is a PARTIAL EMT: the program
  retains epithelial markers and LACKS the classical EMT-driving transcription
  factors (the SNAIL, ZEB and TWIST families), with SNAIL2/SLUG the lone exception,
  so it is a metastable, EMT-like state rather than a complete mesenchymal conversion.
  Cells expressing the program localise to the invasive leading edge of primary
  tumours in proximity to cancer-associated fibroblasts, and a high p-EMT score is
  an independent predictor of nodal metastasis, higher grade, and adverse pathologic
  features. Because the member genes literally carry the GO annotations for the ECM,
  adhesion and migration processes the state executes, enrichment recovers those
  processes (annotation_supported) rather than leaving them as gaps; the regulatory
  term "positive regulation of EMT" is recorded as an annotation_gap because the
  effector/marker genes that define p-EMT enact the program but are annotated to
  their effector roles (ECM, adhesion) rather than to EMT regulation. This is a
  STANDALONE signature: no contrasting epithelial-differentiation partner is curated
  yet, so series/series_role are omitted. The defining paper is simultaneously the
  identity, the membership, and the evidence for this set.
