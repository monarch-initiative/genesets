direction: NA
description: >-
  KEGG legacy maturity-onset diabetes of the young (MODY) pathway gene set
  (MSigDB C2 curated gene set). MODY is a rare monogenic, autosomal-dominant
  form of diabetes caused by heterozygous loss-of-function mutations in genes
  encoding pancreatic beta-cell transcription factors and glucokinase. The
  principal MODY subtypes represented in this pathway are driven by mutations
  in HNF4A (MODY1), GCK (MODY2), HNF1A (MODY3), PDX1 (MODY4), HNF1B (MODY5),
  NEUROD1 (MODY6), and PAX4 (MODY9). HNF4A, HNF1A, HNF1B, PDX1, NEUROD1, and
  PAX4 are RNA polymerase II transcription factors essential for endocrine
  pancreas development and for maintenance of mature beta-cell identity and
  function; their loss impairs beta-cell differentiation and glucose-stimulated
  insulin secretion. GCK encodes glucokinase, the pancreatic glucose sensor that
  couples glycolytic flux to insulin secretion. The gene set captures two
  principal MODY mechanisms: impaired transcriptional regulation of beta-cell
  identity and function (TF subtypes), and defective glucose sensing that
  reduces glucose-stimulated insulin secretion (GCK subtype).
