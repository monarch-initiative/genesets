gene_set_id: MSIGDB:TRAVAGLINI_LUNG_CILIATED_CELL
gene_set_name: TRAVAGLINI_LUNG_CILIATED_CELL
collection: C8
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of ciliated epithelial cells from human lung
  (Travaglini et al., MSigDB C8). Airway ciliated cells of the conducting
  airways bear hundreds of motile 9+2 cilia and are the primary drivers of
  mucociliary clearance, propelling mucus and trapped pathogens toward the
  oropharynx via coordinated ciliary beating powered by axonemal dynein motors.
contexts:
  - term:
      id: CL:0000064
      label: ciliated cell
    context_type: cell_type
  - term:
      id: UBERON:0002048
      label: lung
    context_type: anatomical_structure
associations:
  - term:
      id: GO:0003341
      label: cilium movement
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Cilium movement is the defining molecular function of airway ciliated
      cells. The coordinated, ATP-driven beating of hundreds of motile cilia
      per cell drives mucus transport along the mucociliary escalator. Core
      marker genes for this cell type (e.g. DNAI1, DNAI2, DNAH5, RSPH4A)
      are directly annotated to cilium movement in GOA-human, making this
      the primary enrichment recovery signal for this signature.
  - term:
      id: GO:0031514
      label: motile cilium
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Airway ciliated cells are densely covered by hundreds of 9+2 motile
      cilia, with the motile cilium as the defining cellular structure of
      this cell type. This is the dominant localisation annotation for
      the ciliated-cell marker genes (e.g. DNAH5, DNAI1, DNAI2, RSPH9),
      and its recovery in enrichment results is a hallmark of the ciliated
      cell identity.
  - term:
      id: GO:0060271
      label: cilium assembly
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Assembly of hundreds of motile cilia per cell requires substantial
      transcriptional investment in ciliogenesis machinery, including
      intraflagellar transport (IFT) genes and FOXJ1 transcriptional targets.
      Cilium assembly genes are well represented in the marker signature and
      recovered by enrichment. It is categorised as supporting_process
      because the primary cell identity term is cilium movement, with
      assembly being a prerequisite process rather than the defining function.
  - term:
      id: GO:0120197
      label: mucociliary clearance
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    evidence:
      - reference: PMID:25386990
        reference_title: "Cilia dysfunction in lung disease."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "In the airways, cilia function in concert with airway mucus to mediate the critical function of mucociliary clearance, cleansing the airways of inhaled particles and pathogens."
        explanation: >-
          This Annual Review of Physiology article explicitly establishes
          mucociliary clearance as the primary physiological output of
          airway ciliated cells in humans. GO:0120197 (mucociliary clearance)
          is a child of epithelial cilium movement involved in extracellular
          fluid movement and is the respiratory-specific functional outcome
          of ciliated cell activity, directly linking the molecular cilia
          movement machinery to airway defence.
    curator_note: >-
      Mucociliary clearance is the organ-level respiratory process driven
      by ciliary beating in airway epithelial cells and is categorised as
      supporting_process because it describes the multicellular systems-level
      output rather than the individual cell's molecular activity (cilium
      movement). It is annotation_supported since marker genes annotated to
      GO:0003341 (cilium movement) are recovered under GO:0120197 via the
      is-a hierarchy through GO:0003351.
  - term:
      id: GO:0006412
      label: translation
    aspect: biological_process
    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Translation is a ubiquitous housekeeping process. Its appearance as
      an enrichment hit reflects the large number of highly expressed
      ribosomal protein genes in this cell-type signature, not a
      ciliated-cell-specific function. This is a non-informative housekeeping
      enrichment result.
  - term:
      id: GO:0035082
      label: axoneme assembly
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: curator_added
    recovery_status: annotation_supported
    curator_note: >-
      Airway ciliated cells build the 9+2 motile-cilium axoneme in quantity
      (HYDIN, RSPH4A, RSPH9 and many other axonemal genes), so axoneme assembly
      is a core, cell-type-defining process. Curator-added, but recorded as
      annotation_supported: contrary to an initial annotation-gap prediction,
      closure-aware enrichment over current GOA-human recovers axoneme assembly
      very strongly (overlap 66, Bonferroni p_adj 1.3e-74 in the 2026
      iba_vs_benchmark eval); the markers are annotated to it or to descendants.
