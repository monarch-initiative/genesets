gene_set_id: LIT:NEUROTOXIC_REACTIVE_ASTROCYTES_A1
gene_set_name: NEUROTOXIC_REACTIVE_ASTROCYTES_A1
collection: LIT:DISEASE_ACTIVITY
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: UP
series: SERIES:ASTROCYTE_REACTIVITY
series_role: neurotoxic
description: >-
  Literature-defined disease-activity signature of A1 neurotoxic reactive
  astrocytes, the reactive-astrocyte cell state first described by Liddelow,
  Guttenplan, Clarke, Barres et al. (Nature 2017, PMID:28099414). Unlike the
  MSigDB causal/driver disease pathway sets, the members here are the READOUT of
  an ACTIVE program, not driver mutations: they are the transcripts UPregulated
  when resting astrocytes are converted to the A1 state by classically activated
  neuroinflammatory microglia, which secrete IL-1alpha, TNF and C1q (necessary
  and sufficient to induce A1). The signature is dominated by a complement and
  innate-immune/inflammatory program (canonically complement C3, plus the C1
  inhibitor Serping1, complement factor B/Cfb, the interferon-induced Gbp2 and
  Mx1, the MHC-I gene H2-T23, Fbln5, Ugt1a and Amigo2). A1 astrocytes are
  NEUROTOXIC: they lose homeostatic support functions and actively induce the
  death of neurons and oligodendrocytes. Because the member genes literally
  carry the GO annotations for the processes the state executes, enrichment
  recovers those processes (annotation_supported) rather than leaving them as
  gaps. The signature was defined in mouse; we curate the human-orthologous
  program and keep the taxon human per corpus convention. A1 reactive astrocytes
  are a pan-neurodegeneration state, abundant in Alzheimer's, Huntington's and
  Parkinson's disease, amyotrophic lateral sclerosis and multiple sclerosis.
contexts:
  - term:
      id: CL:0000127
      label: astrocyte
    context_type: cell_type
    role_note: >-
      The signature reads out the A1 reactive state of the astrocyte rather than
      a single disease. A1 reactive astrocytes are not specific to one disorder:
      the paper shows they are abundant across multiple human neurodegenerative
      diseases (Alzheimer's, Huntington's and Parkinson's disease, amyotrophic
      lateral sclerosis and multiple sclerosis), so the astrocyte cell type is
      used as the anchoring context rather than any one MONDO disease.
