gene_set_name: M2_MACROPHAGE_ALTERNATIVELY_ACTIVATED
collection: LIT:DISEASE_ACTIVITY
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: UP
series: SERIES:MACROPHAGE_POLARIZATION
series_role: alternative
description: >-
  Literature-defined cell-state ACTIVITY signature of M2 (alternatively
  activated) macrophages, the anti-inflammatory/reparative pole of the
  macrophage polarization axis. The human program was transcriptionally defined
  by Martinez, Gordon, Locati and Mantovani (J Immunol 2006, PMID:17082649),
  who profiled the gene expression of human monocyte-to-macrophage
  differentiation and of macrophages polarized toward the M1 (classical) or M2
  (alternative) phenotype. Alternative (M2) activation is driven by the Th2
  cytokines IL-4 and IL-13 signaling through IL4R and STAT6 (with PPARG and the
  transcription factor MAF as further regulators), in explicit contrast to the
  IFN-gamma/LPS-driven, inflammatory M1 (classically activated) pole curated as
  the paired set in this series. Unlike MSigDB causal/driver disease pathway
  sets, the members here are the READOUT of an ACTIVE program, not driver
  mutations: they are the transcripts UP (high) in M2/alternatively activated
  macrophages relative to resting macrophages. The signature is dominated by
  the canonical alternative-activation markers - the mannose receptor
  MRC1/CD206 and the hemoglobin-haptoglobin scavenger receptor CD163, the
  C-type lectin CLEC10A/CD301, the M2 chemokines CCL17/TARC, CCL22/MDC and
  CCL24/eotaxin-2, transglutaminase 2 (TGM2), the anti-inflammatory cytokine
  IL10, and STAT6/PPARG/MAF (the arginase ARG1 is a robust M2 marker in mouse
  but not in human). Functionally, M2 macrophages execute tissue repair and
  wound healing, dampening of inflammation (anti-inflammatory/resolution), and
  scavenging/endocytic clearance of debris and ligands via MRC1 and CD163 -
  the reparative, homeostatic counterpart to the microbicidal M1 program.
  Because the member genes literally carry the GO annotations for the processes
  the state executes, enrichment recovers those processes
  (annotation_supported) rather than leaving them as gaps. DISEASE RELEVANCE:
  M2-like tumor-associated macrophages promote tumor progression and
  immunosuppression, and the M1/M2 balance is a central axis in chronic
  inflammation, fibrosis, wound repair and infection.
