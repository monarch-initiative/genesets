      term (annotation_supported). Scored supporting rather than core because the
      defining event captured by the set is the alternative ACTIVATION itself,
      with inflammation restraint as one of its functional consequences;
      specificity is broadly_expressed because negative regulation of the
      inflammatory response is shared across many immune contexts.
  - term:
      id: GO:0006898
      label: receptor-mediated endocytosis
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Scavenging and endocytic clearance is a characteristic M2 effector function:
      the two most canonical M2 markers are themselves endocytic receptors - the
      mannose receptor MRC1/CD206 (clearance of mannosylated/glycosylated ligands)
      and CD163 (the hemoglobin-haptoglobin scavenger receptor) - and they carry
      receptor-mediated endocytosis annotations, so enrichment recovers the term
      (annotation_supported). Scored supporting rather than core because endocytic
      scavenging is one functional arm of the M2 state rather than the defining
      activation event; specificity is broadly_expressed because receptor-mediated
      endocytosis is a general cellular process used by many cell types.
