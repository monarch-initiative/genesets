        supports: SUPPORT
        evidence_source: IN_VITRO
        snippet: "M-CSF leads to expression of a substantial part of the M2 transcriptome, suggesting that under homeostatic conditions a default shift toward M2 occurs."
        explanation: >-
          The authors name and characterize the "M2 transcriptome" as a
          coherent polarized-activation program, confirming that the member
          genes are the readout of the M2/alternative macrophage activation
          state this set captures rather than driver lesions. The M2 default
          shift under homeostatic (M-CSF) conditions underlines that this is the
          reparative, anti-inflammatory pole of macrophage activation.
    curator_note: >-
      This is the defining ACTIVE process of the set, not a driver lesion. It is
      cell_type_specific because macrophage activation is, by construction, the
      process this macrophage gene set reads out; M2/alternative activation is
      the specific pole, contrasted with the M1 (classical) pole of the series.
  - term:
      id: GO:0070670
      label: response to interleukin-4
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Alternative (M2) activation is the canonical IL-4 (and IL-13) -driven
      macrophage program: IL-4 signals through IL4R and STAT6 to induce the M2
      transcriptome, so response to interleukin-4 is the identity-defining input
      of this state rather than an incidental process. The IL-4/STAT6 axis genes
      and IL-4-induced effectors (e.g. CCL17, CCL22, MRC1, CLEC10A) are members
      annotated to IL-4 response, so enrichment recovers the term
      (annotation_supported). Kept core because IL-4-driven alternative
      activation is precisely what distinguishes the M2 pole from the
      IFN-gamma-driven M1 pole; specificity is lineage_shared because response
      to IL-4 also occurs in other immune lineages (e.g. T and B cells), even
      though it is the M2-defining signal here. No verbatim evidence snippet is
      attached because the defining paper's retrievable abstract reports the M2
      transcriptome and chemokinome rather than quoting the IL-4 stimulus
      directly; the IL-4/IL-13 dependence of M2 is the well-established
      framework the paper operates within (Interleukin-4 is an indexed MeSH term
      for the study).
  - term:
      id: GO:0042060
      label: wound healing
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      A defining functional output of the M2 state is tissue repair: alternatively
      activated macrophages drive wound healing and resolution after injury, and
      reparative effectors in the signature (e.g. transglutaminase 2/TGM2,
      fibronectin and growth factors such as IGF1) carry wound-healing /
      response-to-wounding annotations, so enrichment recovers the term
      (annotation_supported). Scored supporting rather than core: tissue repair is
      a real downstream consequence of M2 polarization but one effector arm rather
      than the defining activation event, and wound healing is shared across many
      tissue-repair contexts.
