    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      M2 macrophages are anti-inflammatory: in explicit contrast to the
      microbicidal, pro-inflammatory M1 pole, the alternative-activation program
      dampens and resolves inflammation, and signature members (e.g. the
      anti-inflammatory cytokine IL10 and the scavenger receptor CD163) carry
