  label: Homo sapiens
direction: DN
series: SERIES:DANG_MYC_TARGETS
series_role: down
description: >-
  MSigDB C2:CGP genetic-perturbation signature of genes DOWN-regulated by the MYC oncogene
  (Zeller/Dang, PMID:14519204). This 31-gene set represents the DOWN component of the MYC
  transcriptional program — genes whose promoters are bound by MYC and whose expression is
  repressed upon MYC activation. The set is enriched for cell-adhesion molecules (integrins,
  thrombospondin-1/THBS1), growth-arrest mediators (CDKN1A/p21), extracellular matrix
  proteins, and differentiation-associated genes, reflecting MYC's oncogenic function of
  silencing growth-restraint and differentiation programs. Unlike the MYC-UP set, the DN set
  does not enrich for translation or ribosomal biogenesis; spurious translation enrichment
  is not expected and is excluded here.
