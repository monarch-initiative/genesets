description: >-
  WikiPathways WP_MEASLES_VIRUS_INFECTION gene set (MSigDB C2:CP:WIKIPATHWAYS, 136
  genes). This is a host-gene pathway set capturing the major cellular programmes
  engaged during measles virus (MeV) infection of human cells. Three interlinked
  biological axes are represented: (1) innate antiviral defence — cytoplasmic
  recognition of viral RNA through RIG-I (DDX58) and MDA5 (IFIH1), MAVS-mediated
  signalling through TBK1 to IRF3/IRF7, and induction of type I/III interferons and
  interferon-stimulated genes (IFIT1/2/3, MX1, OAS1/2/3, ISG15, RSAD2/viperin);
  (2) viral entry via host-surface receptors — SLAMF1 (CD150) on lymphoid cells and
  PVRL4 (nectin-4) on epithelial cells, which determine MeV tropism and underlie
  lymphocyte infection and subsequent depletion; and (3) measles-induced immune
  suppression — depletion of CD150-expressing memory T and B lymphocytes,
  DC-mediated T-cell silencing via IL-12 suppression, and Th1-to-Th2 immune
  skewing that creates the transient "immune amnesia" characteristic of measles
  infection. The gene set does not contain viral protein-coding sequences; the MeV
  V, P, and C proteins that directly antagonise type I IFN production and signalling
  are viral genes absent from this human host gene set by design.
