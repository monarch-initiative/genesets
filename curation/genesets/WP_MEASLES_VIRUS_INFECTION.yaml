        reference_title: "Measles virus interaction with host cells and impact on innate immunity."
        supports: SUPPORT
        evidence_source: IN_VITRO
        snippet: "The 5' triphosphate-ended virus leader transcript is recognised by RIG-I, a cellular helicase, and induces the interferon response."
        explanation: >-
          The WP_MEASLES_VIRUS_INFECTION gene set is dominated by innate antiviral
          defence genes: RIG-I (DDX58), MDA5 (IFIH1), MAVS, TBK1, IRF3, IRF7,
          STAT1, STAT2, MX1, OAS1/2/3, IFIT1/2/3, RSAD2 (viperin), and ISG15 are
          canonical members. Each is annotated to GO:0051607 (defense response to
          virus) in GOA-human. This 2009 review (Gerlier & Valentin, Curr Top
          Microbiol Immunol) confirms that RIG-I-mediated recognition of MeV 5'
          triphosphate RNA and downstream interferon induction is the primary
          antiviral mechanism represented in this gene set, making GO:0051607 its
          most direct and specific core-process descriptor.
