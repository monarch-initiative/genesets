    category: core_component
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The myelin sheath is the defining subcellular structure produced by
      Schwann cells. Seven set genes localize here in GOA-human: MPZ and PMP2
      (peripheral myelin structural proteins), PLP1, CNP (2',3'-cyclic
      nucleotide 3'-phosphodiesterase), GJC3 (connexin-29, the paranodal
      gap-junction protein), GPM6B and CNTN2. This is the expected top cellular
      component in any enrichment of Schwann-cell markers.
  - term:
      id: GO:0008366
      label: axon ensheathment
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Axon ensheathment is the physical wrapping and electrical insulation of
      peripheral axons, the function Schwann cells perform in both myelinating
      and non-myelinating (Remak-bundle) modes. Ten set genes carry this term
      under closure (PLP1, MPZ, ERBB3, DHH, SOX10, GPC1, UGT8, GAL3ST1, LGI4,
      GPM6B). Classified supporting_process because myelination (GO:0042552) is
      the more precise core term and ensheathment emphasizes the ensheathing
      interaction rather than myelin biogenesis; the broader parent ensheathment
      of neurons (GO:0007272), which also covers non-myelinating Schwann cells,
      is recovered by the same ten genes.
  - term:
      id: GO:0014037
      label: Schwann cell differentiation
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The fetal-adrenal sample captures Schwann cells and Schwann-cell
      precursors of the sympathoadrenal nerves, so lineage-specification genes
      are prominent. Set genes ERBB3 (the NRG1 co-receptor that drives
      Schwann-cell fate), GPC1 and LGI4 are annotated to Schwann cell
      differentiation directly. The master glial transcription factors SOX10 and
      SOX8 with S100B and FOXD3 — all set members — are in current GOA-human
      annotated to the broader parent glial cell differentiation (GO:0010001)
      and to peripheral nervous system development (GO:0007422) rather than to
      this Schwann-specific child, so the cell-type-specific differentiation
      signal is real but partly sits one level up. Classified supporting_process
      because the committed glial/myelinating identity, not the differentiation
      step, is the set's primary signal.
  - term:
