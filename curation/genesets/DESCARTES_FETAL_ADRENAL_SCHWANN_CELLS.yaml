    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Schwann cells are PNS glia and arise during peripheral nervous system
      development from neural-crest-derived Schwann-cell precursors. Six set
      genes are annotated here: SOX10 and SOX8 (SoxE master regulators), ERBB3,
      LGI4, UGT8 and GPC1. This PNS-development context is the peripheral
      counterpart of the central developmental context in the sibling
      oligodendrocyte set and discriminates the peripheral pole of the
      myelinating-glia series. Marked lineage_shared because the term is common
      to peripheral neurons and glia rather than unique to Schwann cells.
  - term:
      id: GO:0022011
      label: myelination in peripheral nervous system
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: curator_added
    recovery_status: annotation_gap
    insight: confirmatory
    curator_note: >-
      Myelination in the peripheral nervous system (GO:0022011) is the
      PNS-specific child of myelination (GO:0042552) and is the biologically
      exact process for Schwann cells, which supply all PNS myelin. It is core
      biology but recorded annotation_gap: of the set's myelin genes only LGI4
      is annotated to this child in current GOA-human, whereas the dominant
      peripheral structural proteins MPZ (which carries an experimental IMP
      annotation) and PMP2 sit at the parent GO:0042552 and at myelin sheath
      (GO:0043209), so enrichment would not independently recover the
      PNS-specific term. This is a GO annotation-curation target and is the
      precise peripheral mirror of the central nervous system myelination
      (GO:0022010) annotation_gap recorded for the sibling oligodendrocyte set;
      together they make the CNS/PNS contrast of the SERIES:MYELINATING_GLIA
      series explicit. Propagation from the parent term would not capture the
      PNS specificity distinction.
