description: >-
  Single-cell marker signature of Schwann cells from human fetal adrenal gland
  (Descartes atlas, Cao et al. 2020 Science, PMID:33184181; MSigDB C8). Schwann
  cells are the myelinating and ensheathing glia of the peripheral nervous
  system; in the fetal adrenal they are the Schwann cells and Schwann-cell
  precursors of the sympathoadrenal nerves, a neural-crest-derived lineage. This
  signature is the PERIPHERAL pole of a myelinating-glia contrast series whose
  central pole is the Descartes fetal cerebrum oligodendrocyte set. Its marker
  genes include the peripheral myelin structural proteins MPZ (myelin protein
  zero / P0), PMP2 and PLP1, myelin-lipid biosynthetic enzymes (UGT8, GAL3ST1),
  the SoxE master glial transcription factors SOX10 and SOX8 with FOXD3, the
  glial marker S100B, and the neurotrophin/neuregulin receptors NGFR (p75) and
  ERBB3 that drive Schwann-cell specification. The canonical CNS myelin gene MBP
  and the PNS gene PMP22 are NOT members of this set.
