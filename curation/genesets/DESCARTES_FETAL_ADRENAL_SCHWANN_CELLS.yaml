    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Myelination is the defining biological process of Schwann cells. Ten set
      genes are annotated to GO:0042552 under the is_a closure in current
      GOA-human, led by MPZ (myelin protein zero / P0; experimental IMP plus
      IBA), the principal structural protein of compact peripheral myelin, with
      PLP1, ERBB3, DHH, the myelin-lipid enzymes UGT8 and GAL3ST1, GPM6B, LGI4
      and GPC1. The canonical CNS gene MBP and the PNS gene PMP22 are not in this
      fetal-adrenal set, but the peripheral structural proteins MPZ, PMP2 and
      PLP1 are members, making myelination the top recovered process and
      confirmatory of Schwann-cell identity.
