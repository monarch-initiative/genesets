  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy systemic lupus erythematosus pathway gene set (MSigDB C2 curated gene set).
  This is a disease pathway gene set representing the immunopathological mechanisms of
  systemic lupus erythematosus, a systemic autoimmune disease. Member genes are heavily
  enriched for nucleosome and histone components (autoantigens targeted by SLE-defining
  anti-dsDNA and anti-histone autoantibodies), complement pathway components (classical
  pathway activation by immune complexes), Fc-gamma receptors (immune complex clearance
  and effector signaling), MHC class II molecules (autoantigen presentation), and B/T
  cell signaling components, reflecting the major mechanistic arms of the KEGG SLE
  pathway: autoantigen exposure, immune complex formation, complement-mediated
  inflammation, and adaptive immune dysregulation.
contexts:
