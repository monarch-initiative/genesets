    evidence:
      - reference: PMID:12615225
        reference_title: "Tails of two Tirs: actin pedestal formation by enteropathogenic E. coli and enterohemorrhagic E. coli O157:H7."
        supports: SUPPORT
        evidence_source: IN_VITRO
        snippet: "Enteropathogenic Escherichia coli (EPEC) and enterohemorrhagic E. coli O157:H7 (EHEC) form characteristic lesions on infected mammalian cells called actin pedestals. Each of these two pathogens injects its own translocated intimin receptor (Tir) molecule into the plasma membranes of host cells. Interaction of translocated Tir with the bacterial outer membrane protein intimin is required to trigger the assembly of actin into focused pedestals beneath bound bacteria."
        explanation: >-
          The defining mechanistic feature of EPEC and EHEC infection is the
          remodelling of host actin into cup-shaped pedestals beneath attached
          bacteria. The KEGG Pathogenic E. coli gene set is dominated by host
          actin cytoskeleton regulators (CDC42, RHOA, N-WASP/WASL, Arp2/3
          complex subunits) that directly execute this actin assembly. This
          review confirms actin pedestal formation as the central host cellular
          process subverted in EPEC/EHEC pathogenesis, establishing actin
          cytoskeleton organization as the core biological process of the set.
    curator_note: >-
      Actin cytoskeleton organization is the primary host-cell biological process
      exploited by EPEC and EHEC. The injected effector Tir (translocated intimin
      receptor) nucleates host actin polymerization via N-WASP/WASL and the
      Arp2/3 complex, forming cup-shaped pedestals beneath attached bacteria.
      Key member genes CDC42, RHOA, WASL (N-WASP), and Arp2/3 complex subunits
      (ARPC1-5) are directly annotated to GO:0030036 in GOA-human. The term is
      broadly expressed (actin regulation occurs in all cell types) but is the
      defining mechanistic output of EPEC/EHEC infection in intestinal epithelial
      cells, making it unambiguously core for this gene set.
  - term:
      id: GO:0015629
      label: actin cytoskeleton
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The actin cytoskeleton is the central host cellular structure manipulated by
      EPEC and EHEC during infection. Effector injection triggers local actin
      polymerization into the characteristic pedestal, which can project several
      micrometres above the plasma membrane beneath an attached bacterium. The
      majority of KEGG Pathogenic E. coli pathway members (WASL/N-WASP, Arp2/3
      complex subunits, CDC42, RHOA, RAC1, cofilins) are annotated to GO:0015629
      (actin cytoskeleton) in GOA-human, making this the dominant cellular
      component annotation for this gene set.
  - term:
      id: GO:0005923
      label: bicellular tight junction
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      EPEC and EHEC disrupt intestinal epithelial tight junctions through injected
      effectors (EspF, Map), increasing paracellular permeability and contributing
      to diarrhoeal pathogenesis. Tight junction structural proteins including
      claudins (CLDN1-4), occludin (OCLN), and ZO-family scaffold proteins
      (TJP1-3) encoded in the KEGG Pathogenic E. coli pathway are annotated to
      GO:0005923 (bicellular tight junction) in GOA-human. The bicellular tight
      junction is lineage-shared (present in epithelial and endothelial cells)
      and is a structurally core component of the intestinal barrier targeted
      by these pathogens.
  - term:
      id: GO:0051056
      label: regulation of small GTPase mediated signal transduction
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Rho-family small GTPases (CDC42, RAC1, RHOA, RHOG) and their regulators
      (GEFs, GAPs) encoded in the KEGG Pathogenic E. coli pathway transduce
      signals from the injected Tir effector to the actin polymerisation machinery
      and to downstream inflammatory cascades. CDC42 in particular activates
      N-WASP/WASL to promote Arp2/3-mediated pedestal actin assembly. Rho GTPase
      signalling is broadly expressed and not pathogen-specific per se, but is a
      mechanistically essential enabling process. It is categorised as
      supporting_process because it is an upstream regulatory pathway that
      enables the defining output (actin remodelling) rather than constituting
      that output itself.
  - term:
      id: GO:0009617
      label: response to bacterium
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Multiple genes in the KEGG Pathogenic E. coli pathway participate in innate
      immune responses to bacterial stimuli, including pattern recognition
      signalling components and NF-kappaB pathway effectors activated during
      attaching-and-effacing infection. Response to bacterium is broadly expressed
      and not EPEC/EHEC-specific, but its recovery reflects genuine host immune
      activation that accompanies A/E lesion formation. It is categorised as
      supporting_process because host innate immune activation is not the dominant
      mechanistic theme of this gene set compared with actin cytoskeleton
      remodelling and tight junction disruption.
