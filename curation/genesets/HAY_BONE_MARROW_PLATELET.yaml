taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of platelets from human bone marrow (Hay et al.,
  MSigDB C8). Platelets are small, anucleate cell fragments derived from
  megakaryocytes in the bone marrow via thrombopoiesis. They are the primary
  cellular effectors of hemostasis and thrombosis, becoming activated upon
  vascular injury to adhere to the subendothelial matrix, aggregate, and
  release granule contents that propagate the hemostatic response and promote
  fibrin clot formation.
