gene_set_id: MSIGDB:TRAVAGLINI_LUNG_CAPILLARY_CELL
gene_set_name: TRAVAGLINI_LUNG_CAPILLARY_CELL
collection: C8
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of capillary endothelial cells from human lung
  (Travaglini et al., 2020). Capillary endothelial cells are thin, flattened
  cells lining the smallest blood vessels of the lung, forming the inner
  surface of the pulmonary capillary bed. They are central to pulmonary
  angiogenesis, vascular barrier integrity, and the regulation of fluid and
  solute exchange across the blood-air interface.
