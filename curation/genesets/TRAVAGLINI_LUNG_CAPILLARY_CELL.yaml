  - term:
      id: GO:0001525
      label: angiogenesis
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    evidence:
      - reference: PMID:17979153
        reference_title: "VEGF in biological control."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "VEGF is a well-known angiogenic factor that is important for vascular development and maintenance in all mammalian organs."
        explanation: >-
          Capillary endothelial cells are the primary cellular effectors of
          angiogenesis, sprouting and proliferating to form new capillary
          networks. VEGF signalling through endothelial VEGFR2 drives the
          angiogenic programme represented among the Travaglini capillary
          marker genes (including PECAM1, CDH5, and ECSCR).
    curator_note: >-
      Angiogenesis is the defining biological process of capillary endothelial
      cells. The Travaglini lung capillary signature includes canonical
      pro-angiogenic markers; enrichment strongly and correctly recovers this
      term. Specificity is lineage_shared because angiogenesis is a shared
      property of all vascular endothelial cells, not uniquely pulmonary
      capillary cells.
  - term:
      id: GO:0001568
      label: blood vessel development
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Blood vessel development is the overarching developmental process that
      produces the vascular tree from which capillaries emerge. Capillary
      endothelial cells participate via vasculogenesis and angiogenic
      remodelling. The term is broader than angiogenesis and shared across all
      vascular endothelial lineages, making it a supporting rather than
      defining process for this specific cell-type signature.
  - term:
      id: GO:0005911
      label: cell-cell junction
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Capillary endothelial cells are characterised by an elaborate system of
      tight junctions and adherens junctions (CLDN5, OCLN, CDH5/VE-cadherin)
      that constitute the vascular barrier. Cell-cell junction components are
      among the most structurally prominent features of endothelial cells and
      are expected to be strongly recovered in enrichment for this signature.
      Specificity is lineage_shared because junction specialisation is a
      property of the endothelial lineage broadly, not restricted to lung
      capillaries.
  - term:
      id: GO:0043114
      label: regulation of vascular permeability
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    evidence:
      - reference: PMID:39234309
        reference_title: "Extracellular purines in lung endothelial permeability and pulmonary diseases."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "The endothelium of both pulmonary and systemic circulation (bronchial vessels) plays a pivotal role in maintaining lung tissue homeostasis by providing an active barrier and modulating adhesion and infiltration of inflammatory cells."
        explanation: >-
          Lung capillary endothelial cells are the primary gatekeepers of
          vascular permeability at the blood-air interface. This review of
          pulmonary endothelial function directly situates the lung endothelium
          in barrier maintenance — the biological process captured by the
          regulation of vascular permeability GO term.
    curator_note: >-
      Regulation of vascular permeability is a key functional attribute of
      capillary endothelial cells; disruption causes pulmonary oedema. Marker
      genes include tight-junction components (CLDN5) and CDH5, both annotated
      to this process. Confidence is medium because permeability regulation is
      not specific to lung capillaries and covers a broad range of vessel types.
  - term:
      id: GO:0006412
      label: translation
    aspect: biological_process
    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Translation appears as a non-specific housekeeping enrichment hit, driven
      by ribosomal protein and elongation factor genes present in the marker
      set. It is ubiquitous in all nucleated cells and carries no information
      about capillary endothelial cell identity. Its recovery illustrates a
      common non-informative enrichment artefact.
  - term:
      id: GO:0045446
      label: endothelial cell differentiation
    aspect: biological_process
    category: core_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: curator_added
    recovery_status: annotation_gap
    insight: confirmatory
    curator_note: >-
      Endothelial cell differentiation is a core developmental process that
      specifies the capillary endothelial lineage from mesodermal precursors
      and is central to the cell-type identity captured by this signature.
      It is added by the curator because enrichment-based approaches
      preferentially recover functional terms (angiogenesis, permeability)
      over the lineage-specification terms even when the marker genes include
      endothelial transcription factors. Relevant genes ARE present in the set
      but are primarily annotated to parent terms (endothelial cell
      proliferation, blood vessel morphogenesis) rather than this more specific
      differentiation term, constituting a GO annotation gap and a curation
      target.
