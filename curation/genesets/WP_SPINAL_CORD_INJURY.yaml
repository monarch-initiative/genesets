    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Translation is a ubiquitous housekeeping process. Its recovery in enrichment of the
      WikiPathways SCI gene set reflects ribosomal protein genes present in the set, not an
      SCI-specific function. Recorded as nonspecific to flag it as a non-informative enrichment
      hit that does not reflect the disease biology of the gene set.
