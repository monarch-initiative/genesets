taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
n_genes: 117
description: >-
  WikiPathways community-curated spinal cord injury pathway gene set (MSigDB
  C2:CP:WIKIPATHWAYS). The 117-member set captures the major molecular arms of
  traumatic SCI pathophysiology: acute neuroinflammation mediated by innate
  immune cells and inflammatory cytokines; secondary neuronal apoptosis driven
  by caspase activation and Bcl-2 family signalling; reactive astrogliosis and
  glial scar formation; deposition of inhibitory chondroitin sulphate
  proteoglycans (CSPGs) in the extracellular matrix that impede axon
  regeneration; and the attempted but largely abortive axon regeneration
  response including growth-cone dynamics and axon-guidance signalling.
