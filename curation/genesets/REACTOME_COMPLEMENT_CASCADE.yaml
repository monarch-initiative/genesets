  - term:
      id: GO:0006958
      label: complement activation, classical pathway
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    curator_note: >-
      The classical pathway initiators C1QA, C1QB, C1QC, C1R, C1S, C4A, C4B,
      and C2 are all represented in the Reactome complement cascade gene set.
      The classical pathway is the best-characterised arm of complement
      activation and its components dominate the set's membership.
  - term:
      id: GO:0006957
      label: complement activation, alternative pathway
    aspect: biological_process
    category: core_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    curator_note: >-
      Alternative pathway components CFB, CFD, CFP, and CFH are members of the
      Reactome complement cascade. The alternative pathway amplification loop
      is a major mechanistic element of the cascade covered by this gene set.
  - term:
      id: GO:0045087
      label: innate immune response
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    curator_note: >-
      Complement is a key effector arm of innate immunity. Innate immune
      response is a broader term shared with other innate immune pathways
      (toll-like receptor signaling, NK cells) and therefore lineage_shared
      rather than complement-specific.
  - term:
      id: GO:0006954
      label: inflammatory response
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    curator_note: >-
      The anaphylatoxins C3a and C5a generated by complement cleavage are
      potent mediators of inflammation, recruiting neutrophils and mast cells
      and triggering cytokine release. Inflammatory response is a broadly
      expressed consequence of complement activation rather than a
      complement-specific function.
  - term:
      id: GO:0008228
      label: opsonization
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    curator_note: >-
      Covalent deposition of C3b and C4b on pathogen surfaces (opsonization)
      is a principal effector function of complement, mediated by C3, C4, and
      their cleavage products. The Reactome gene set includes all relevant
      opsonins and their regulators (CFI, CFH, CD46).
  - term:
      id: GO:0005579
      label: membrane attack complex
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    curator_note: >-
      C5B, C6, C7, C8A, C8B, C8G, and C9 — the terminal complement components
      that polymerize to form the membrane attack complex (MAC) pore — are all
      members of the Reactome complement cascade gene set. The MAC is the
      direct lytic effector of the cascade and is the single most
      complement-specific cellular component represented.
  - term:
      id: GO:0006412
      label: translation
    aspect: biological_process
    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    curator_note: >-
      Translation is a ubiquitous housekeeping process. Its appearance as an
      enrichment hit in pathway gene sets reflects background ribosomal
      protein subunit gene membership and does not represent a complement
      cascade-specific function.
