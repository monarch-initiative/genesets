associations:
  - term:
      id: GO:0050873
      label: brown fat cell differentiation
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    evidence:
      - reference: PMID:18719582
        reference_title: "PRDM16 controls a brown fat/skeletal muscle switch."
        supports: SUPPORT
        evidence_source: IN_VITRO
        snippet: "ectopic expression of PRDM16 in myoblasts induces their differentiation into brown fat cells"
        explanation: >-
          The gene set is, by definition, the readout of the brown-adipocyte
          differentiation program: the brown-fat determination factor PRDM16,
          acting with PPARGC1A (PGC1-alpha) and PPARG, specifies the brown fat
          fate, and ectopic PRDM16 is sufficient to convert myoblasts into UCP1+
          brown fat cells. Brown fat cell differentiation is therefore the
          central, cell-type-specific process the signature represents, and the
          brown-selective members (UCP1, PPARGC1A, PRDM16, CIDEA) carry this GO
          annotation, so enrichment recovers it (annotation_supported).
    curator_note: >-
      This is the defining ACTIVE/identity process of the set, not a driver
      lesion. cell_type_specific because brown fat cell differentiation is, by
      construction, the process this brown-adipocyte signature reads out.
  - term:
      id: GO:0106106
      label: cold-induced thermogenesis
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    evidence:
      - reference: PMID:22796012
        reference_title: "Beige adipocytes are a distinct type of thermogenic fat cell in mouse and human."
        supports: SUPPORT
        evidence_source: OTHER
        snippet: "Brown fat generates heat via the mitochondrial uncoupling protein UCP1, defending against hypothermia and obesity."
        explanation: >-
          UCP1-mediated non-shivering thermogenesis is the defining function of
          the brown adipocyte: brown fat generates heat by using the mitochondrial
          uncoupling protein UCP1 to dissipate the proton-motive force, defending
          against hypothermia and obesity. Cold-induced (adaptive) thermogenesis
          is therefore the central process this constitutively thermogenic pole
          executes, and its members (UCP1, PPARGC1A) carry the annotation, so
          enrichment recovers it (annotation_supported).
    curator_note: >-
      Kept core: UCP1-mediated cold-induced/non-shivering thermogenesis is the
      identity-defining function that separates the brown pole from the white
      (storage) pole. Marked cell_type_specific because constitutive
      UCP1-dependent non-shivering thermogenesis is essentially the brown/beige
      adipocyte's signature output.
  - term:
      id: GO:0005739
      label: mitochondrion
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Brown adipocytes are exceptionally mitochondria-dense — the high
      mitochondrial content (the source of their brown colour) houses the UCP1
      uncoupling machinery and the respiratory chain that thermogenesis depends
      on. The thermogenic and oxidative members (UCP1, PPARGC1A targets, the ETC
      and beta-oxidation enzymes) carry mitochondrial-localisation annotations, so
      enrichment recovers this core component (annotation_supported).
      broadly_expressed because mitochondria are present in virtually all human
      cell types even though brown fat is unusually rich in them.
  - term:
      id: GO:1902600
      label: proton transmembrane transport
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      The biochemical heart of brown-fat thermogenesis is UCP1-mediated proton
      leak: UCP1 transports protons back across the inner mitochondrial membrane,
      uncoupling respiration from ATP synthesis so the energy is released as heat.
      UCP1 carries the proton-transmembrane-transport annotation, so enrichment
      recovers it (annotation_supported). Scored supporting rather than core
      because the GO term is generic (it also covers ATP synthase and other proton
      pumps) and is broadly_expressed, so it captures the uncoupling mechanism but
      is not by itself specific to the brown-fat state.
  - term:
      id: GO:0009409
      label: response to cold
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Cold exposure (via sympathetic/beta-adrenergic signalling) is the
      physiological trigger that activates the brown-fat thermogenic program, and
      thermogenic members such as UCP1 and PPARGC1A are annotated to response to
      cold, so enrichment recovers it (annotation_supported). Scored supporting
      (the upstream stimulus/enabling response) rather than core, and
      broadly_expressed because responsiveness to cold is shared across many cell
      types and is not brown-fat-specific.
  - term:
      id: GO:0006635
      label: fatty acid beta-oxidation
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Brown adipocytes are specialised for lipid CATABOLISM rather than storage:
      fatty acids liberated from their multilocular droplets are oxidised in the
      mitochondria to fuel the UCP1-uncoupled respiration that produces heat.
      Beta-oxidation enzymes induced in the brown-fat program carry this
      annotation, so enrichment recovers it (annotation_supported). Scored
      supporting because beta-oxidation supplies the fuel for thermogenesis rather
      than being the identity-defining process itself, and broadly_expressed
      because fatty-acid oxidation operates across many oxidative tissues.
