  - term:
      id: CL:0000449
      label: brown adipocyte
    context_type: cell_type
    role_note: >-
      thermogenic brown adipocyte (UCP1+, mitochondria-rich). The signature reads
      out the constitutively thermogenic brown-fat state; CL:0000449 (brown
      adipocyte) is the anchoring cell-state context, the contrast pole to the
      white (storage) and inducible beige adipocytes of this adipocyte-state
