description: >-
  Literature-defined cell-state ACTIVITY signature of the classical BROWN
  adipocyte, the constitutively THERMOGENIC pole of the adipocyte-state axis
  (series SERIES:ADIPOCYTE_STATE; series_role brown), anchored on Wu, Spiegelman
  and colleagues (Cell 2012, PMID:22796012) and Seale, Kajimura and Spiegelman
  (Nature 2008, PMID:18719582). Unlike MSigDB causal/driver disease pathway sets,
  the members here are the READOUT of an ACTIVE program rather than driver
  mutations: they are the genes UPregulated in classical brown adipocytes — the
  UCP1-positive, mitochondria-rich fat cells of the interscapular and
  supraclavicular depots that arise from a Myf5+/myoblast-like (non-white)
  lineage. The signature is dominated by the thermogenic/bioenergetic program
  that defines the cell: the mitochondrial uncoupling protein UCP1, the
  transcriptional coactivator PPARGC1A (PGC1-alpha), the brown-fat determination
  factor PRDM16, the lipid-droplet/thermogenic effector CIDEA, the
  very-long-chain fatty-acid elongase ELOVL3, and classical-brown-selective
  markers such as ZIC1, LHX8 and EVA1 (MPZL2) that distinguish constitutive brown
  fat from the inducible beige/brite cells of white depots. These cells carry a
  high mitochondrial content and multilocular lipid droplets, and defend body
  temperature by CONSTITUTIVE NON-SHIVERING THERMOGENESIS: UCP1 dissipates the
  mitochondrial proton-motive force as heat (mitochondrial uncoupling), so brown
  adipocytes burn rather than store chemical energy. Because the member genes
  literally carry the GO annotations for the processes the brown-fat state
  executes, enrichment recovers those processes (annotation_supported) rather than
  leaving them as gaps — an active-program / activity signature, not a
  driver-mutation panel. This set is one POLE of a three-member adipocyte-state
  series: it contrasts with the WHITE adipocyte (energy STORAGE, unilocular,
  low UCP1) and with the inducible BEIGE/brite adipocyte (low basal UCP1 but
  cAMP/cold-inducible high UCP1), against which the same thermogenic terms resolve
  to contrasting interpretations — constitutively core here, absent or merely
  inducible on the other poles. DISEASE RELEVANCE: active brown-fat thermogenesis
  raises energy expenditure and improves glucose and lipid handling, so the brown
  adipocyte program is a therapeutic target in obesity, type 2 diabetes and
  metabolic syndrome, where its loss or inactivity is linked to weight gain and
  metabolic disease.
