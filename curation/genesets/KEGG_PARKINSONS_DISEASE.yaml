gene_set_id: MSIGDB:KEGG_PARKINSONS_DISEASE
gene_set_name: KEGG_PARKINSONS_DISEASE
collection: C2:CP:KEGG_LEGACY
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy Parkinson's disease pathway gene set (MSigDB C2 curated gene set).
  This is a disease pathway gene set, not a cell-type signature. The member genes
  are heavily enriched for mitochondrial electron-transport-chain subunits
  (oxidative phosphorylation), ubiquitin-proteasome system components (parkin/PINK1
  pathway), dopaminergic neuron biology, and apoptosis regulators, reflecting the
  major mechanistic arms of the KEGG Parkinson's disease pathway representation.
contexts:
  - term:
      id: MONDO:0005180
      label: Parkinson disease
    context_type: disease
  - term:
      id: UBERON:0000955
      label: brain
    context_type: anatomical_structure
associations:
  - term:
      id: GO:0006119
      label: oxidative phosphorylation
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    evidence:
      - reference: PMID:31013638
        reference_title: "Oxidative Stress: A Key Modulator in Neurodegenerative Diseases."
        supports: SUPPORT
        snippet: "Mitochondria play a key role in ATP supply to cells via oxidative phosphorylation, as well as synthesis of essential biological molecules. Various redox reactions catalyzed by enzymes take place in the oxidative phosphorylation process. An inefficient oxidative phosphorylation may generate reactive oxygen species (ROS), leading to mitochondrial dysfunction."
        explanation: >-
          The KEGG Parkinson's disease pathway gene set is dominated by ETC
          complex I–V and ATP-synthase subunits. Impaired oxidative
          phosphorylation and the resulting mitochondrial dysfunction are core
          mechanistic features of Parkinson's disease pathophysiology, as
          described in this review of oxidative stress in neurodegenerative
          diseases.
  - term:
      id: GO:0005739
      label: mitochondrion
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    curator_note: >-
      A large fraction of KEGG PD pathway members (NADH dehydrogenase subunits,
      cytochrome bc1 subunits, COX subunits, ATP synthase subunits) are
      localised to the mitochondrion. Mitochondrial dysfunction is a primary
      hallmark of Parkinson's disease pathology, making the mitochondrion the
      dominant cellular compartment represented in this gene set.
  - term:
      id: GO:0006511
      label: ubiquitin-dependent protein catabolic process
    aspect: biological_process
    category: core_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    curator_note: >-
      Parkin (PARK2) is an E3 ubiquitin ligase and key PD gene; loss-of-function
      mutations cause autosomal-recessive PD. Together with PINK1, parkin
      mediates ubiquitination of damaged mitochondria for proteasomal and
      autophagic degradation. The proteasome subunit genes in the KEGG PD
      pathway directly support this annotation. The term is broadly expressed
      but reflects a disease-defining mechanism in PD.
  - term:
      id: GO:0042416
      label: dopamine biosynthetic process
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    curator_note: >-
      Loss of dopaminergic neurons in the substantia nigra pars compacta is the
      pathological hallmark of Parkinson's disease, resulting in dopamine
      deficiency in the nigrostriatal pathway. Genes such as TH (tyrosine
      hydroxylase), DDC, and MAOB in the KEGG PD pathway participate directly
      in dopamine biosynthesis and catabolism. This term is cell-type-specific
      to dopaminergic neurons and is a defining mechanistic feature of this
      disease pathway gene set.
  - term:
      id: GO:0006915
      label: apoptotic process
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    curator_note: >-
      CASP3, CASP9, CYCS, and BCL2-family members in the KEGG PD pathway
      encode canonical intrinsic apoptosis components. Apoptosis is shared
      across many disease contexts and is not PD-specific, but is a significant
      mechanistic component of dopaminergic neuron death in this pathway
      representation.
  - term:
      id: GO:0051402
      label: neuron apoptotic process
    aspect: biological_process
    category: core_process
    confidence: medium
    specificity: lineage_shared
    seed_source: curator_added
    curator_note: >-
      Dopaminergic neuron death by apoptosis is the central downstream outcome
      of the KEGG Parkinson's disease pathway. Added as curator_added because
      enrichment tools may recover the parent term (apoptotic process) in
      preference to this more specific neuron-restricted child term.
  - term:
      id: GO:0006412
      label: translation
    aspect: biological_process
    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    curator_note: >-
      Translation appears as a non-specific enrichment hit driven by ribosomal
      protein subunit genes present in the gene set. It is a ubiquitous
      housekeeping process and does not reflect a disease-specific function of
      the Parkinson's disease pathway.
