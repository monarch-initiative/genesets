description: >-
  KEGG legacy melanoma pathway gene set (MSigDB C2 curated gene set).
  This is a cancer disease pathway gene set, not a cell-type signature. The member
  genes are heavily enriched for RAS/RAF/MAPK pathway components (BRAF, NRAS, RAF1,
  MAP2K1/2, MAPK1/3), PI3K/AKT survival signaling effectors (PIK3CA, PTEN, AKT1),
  cell-cycle regulators controlling the G1/S transition (CDKN2A, CDK4, RB1, E2F
  family), apoptosis modulators (TP53, MDM2, BCL2-family, CASP3), and growth-factor
  receptor inputs (EGFR, MET, FGFR1), reflecting the major mechanistic arms of the
  KEGG melanoma pathway: BRAF-driven MAPK proliferative signaling, PI3K/AKT
  cell-survival signaling, CDKN2A/RB-mediated cell-cycle control, and TP53-dependent
  apoptosis evasion, all operating in the melanocyte cell-of-origin context.
