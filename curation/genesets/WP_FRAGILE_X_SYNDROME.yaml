    evidence:
      - reference: PMID:18957214
        reference_title: "Fragile X syndrome: loss of local mRNA regulation alters synaptic development and function."
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        snippet: "FMRP is a selective RNA-binding protein that regulates the local translation of a subset of mRNAs at synapses in response to activation of Gp1 metabotropic glutamate receptors (mGluRs) and possibly other receptors. In the absence of FMRP, excess and dysregulated mRNA translation leads to altered synaptic function and loss of protein synthesis-dependent plasticity."
        explanation: >-
          FMRP is the defining molecular component of the FXS gene set: it acts as
          a translational repressor at synapses, negatively regulating local
          translation of hundreds of target mRNAs. Loss of this repression is the
          core molecular pathomechanism of Fragile X syndrome, making negative
          regulation of translation the most central functional annotation for this
          gene set. Multiple gene-set members (FMR1, CYFIP1, NUFIP1, AGO1) carry
          GO annotations to this term.
