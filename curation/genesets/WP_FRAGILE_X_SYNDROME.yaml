    evidence:
      - reference: PMID:29380377
        reference_title: "Imbalance of synaptic actin dynamics as a key to fragile X syndrome?"
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        snippet: "dysregulations of spine actin dynamics (reflected by alterations in dendritic spine morphology) can be found in a variety of neurological disorders ranging from schizophrenia to several forms of autism spectrum disorders such as fragile X syndrome (FXS)"
        explanation: >-
          Dendritic spines are the postsynaptic compartments where FMRP exerts its
          translational repression. Spine dysmorphology — long, thin, immature
          spines — is the defining neuropathological hallmark of FXS in postmortem
          human tissue and in Fmr1 KO mice. The gene set includes postsynaptic
          scaffolding genes (SHANK3, DLGAP1, DLG4/PSD-95) and cytoskeletal
          regulators concentrated at dendritic spines.
