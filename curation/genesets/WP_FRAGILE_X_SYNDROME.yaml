description: >-
  WikiPathways Fragile X syndrome gene set (MSigDB C2:CP:WIKIPATHWAYS, 121 genes).
  Fragile X syndrome (FXS) is the most common inherited cause of intellectual
  disability and a leading monogenic cause of autism spectrum disorder, arising
  from CGG trinucleotide repeat expansion in FMR1 that silences FMRP (fragile X
  mental retardation protein). FMRP is a selective RNA-binding protein that represses
  local translation of hundreds of target mRNAs at synapses and regulates dendritic
  mRNA transport in response to metabotropic glutamate receptor activation. Loss of
  FMRP leads to excess and dysregulated synaptic protein synthesis, dendritic spine
  dysmorphology, and impaired activity-dependent synaptic plasticity. The gene set
  captures the major mechanistic arms: translational repression at synapses,
  chemical synaptic transmission, dendritic spine structure, mRNA transport to
  dendrites, and synaptic plasticity.
