    evidence:
      - reference: PMID:29380377
        reference_title: "Imbalance of synaptic actin dynamics as a key to fragile X syndrome?"
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        snippet: "FMRP is involved in mRNA transport as well as regulation of local translation at the synapse"
        explanation: >-
          In addition to translational repression, FMRP participates in the
          regulated dendritic transport of target mRNAs to synaptic sites.
          Correct localisation of mRNAs to dendrites is a prerequisite for
          activity-dependent local translation. Several FXS gene-set members encode
          RNA-binding proteins and motor-complex components involved in mRNA
          localisation (e.g. CYFIP1, FXR1, FXR2).
  - term:
      id: GO:0048167
      label: regulation of synaptic plasticity
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      FMRP-dependent translational control underlies mGluR-mediated long-term
      depression (mGluR-LTD) and other forms of synaptic plasticity. Loss of
      FMRP results in exaggerated mGluR1/5-LTD and impaired NMDAR-dependent LTP,
      collectively disrupting regulation of synaptic plasticity. Multiple
      gene-set members are directly implicated in this process (GRM1, GRM5,
      CYFIP1, SHANK3, CAMK2A). PMID:24346713 documents that "certain aspects of
      mGluR1/5- and NMDAR-dependent synaptic plasticity (such as long-term
      depression and long-term potentiation) are altered in Fmr1 KO mice."
  - term:
      id: GO:0006412
      label: translation
    aspect: biological_process
    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Translation is a ubiquitous housekeeping process. Its appearance as an
      enrichment hit for the FXS gene set reflects the many ribosomal protein
      and translation initiation factor genes in the set. Although FMRP regulates
      local synaptic translation, the broader GO:0006412 term is not
      meaningfully diagnostic for FXS biology; the specific child term GO:0017148
      (negative regulation of translation) is the biologically informative
      annotation and is recorded above as core_process.
