    evidence:
      - reference: PMID:24346713
        reference_title: "From FMRP function to potential therapies for fragile X syndrome."
        supports: SUPPORT
        evidence_source: MODEL_ORGANISM
        snippet: "Numerous studies have demonstrated that FMRP interacts with both coding and non-coding RNAs and represses protein synthesis at dendritic and synaptic locations."
        explanation: >-
          The WikiPathways FX gene set includes numerous postsynaptic and
          presynaptic components (mGluRs, AMPA receptors, NMDARs, CaMKII, SHANK
          proteins, PSD-95) whose coordinated activity underlies chemical synaptic
          transmission. Dysregulated local protein synthesis at synaptic locations
          disrupts the fidelity of postsynaptic receptor signalling and is the
          primary functional deficit in FXS.
