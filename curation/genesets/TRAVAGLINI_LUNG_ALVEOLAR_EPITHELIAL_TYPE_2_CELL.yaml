gene_set_id: MSIGDB:TRAVAGLINI_LUNG_ALVEOLAR_EPITHELIAL_TYPE_2_CELL
gene_set_name: TRAVAGLINI_LUNG_ALVEOLAR_EPITHELIAL_TYPE_2_CELL
collection: C8
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of alveolar epithelial type II (AT2) cells from
  human lung (Travaglini et al.). AT2 cells are cuboidal secretory cells that
  synthesize, store, and secrete pulmonary surfactant via alveolar lamellar
  bodies, maintain alveolar integrity, and serve as progenitors for type I
  alveolar epithelial cells after injury.
contexts:
  - term:
      id: CL:0002063
      label: pulmonary alveolar type 2 cell
    context_type: cell_type
  - term:
      id: UBERON:0002048
      label: lung
    context_type: anatomical_structure
associations:
  - term:
      id: GO:0043129
      label: surfactant homeostasis
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    insight: confirmatory
    evidence:
      - reference: PMID:2163206
        reference_title: Regulation of lung surfactant secretion.
        supports: SUPPORT
        snippet: "Secretion of lung surfactant is the direct step in release of the lipoprotein-like product, synthesized in lung epithelial type II cells, onto the alveolar surface. Release of surfactant phosphatidylcholine (PC) proceeds via formation of surface pores during exocytosis of lamellar bodies."
        explanation: >-
          AT2 cells are the primary cell type responsible for surfactant
          homeostasis in the lung, synthesizing, packaging into lamellar bodies,
          and secreting surfactant onto the alveolar surface. This is the
          defining functional process of the AT2 cell signature.
  - term:
      id: GO:0097208
      label: alveolar lamellar body
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    insight: confirmatory
    curator_note: >-
      Alveolar lamellar bodies are specialized secretory organelles unique to
      AT2 cells, used for storage and exocytosis of pulmonary surfactant. Their
      presence in enrichment results is a hallmark of the AT2 cell identity.
  - term:
      id: GO:0006629
      label: lipid metabolic process
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    insight: confirmatory
    curator_note: >-
      AT2 cells are major producers of surfactant phospholipids, making lipid
      metabolism a prominent process in this signature. However, lipid metabolic
      process is broadly shared with hepatocytes, adipocytes, and other
      lipid-active cell types, so it is lineage_shared rather than AT2-specific.
  - term:
      id: GO:0007585
      label: respiratory gaseous exchange by respiratory system
    aspect: biological_process
    category: marker_driven_plausible
    confidence: low
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    insight: confirmatory
    curator_note: >-
      Gas exchange at the alveolar surface is the primary function of the lung
      but is executed principally by type I alveolar epithelial cells (AT1),
      not AT2 cells. AT2 marker genes involved in surfactant production
      indirectly support gas exchange, making this association plausible but
      not cell-type-specific.
  - term:
      id: GO:0006412
      label: translation
    aspect: biological_process
    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    curator_note: >-
      Translation is a ubiquitous housekeeping process. Its appearance in
      enrichment results reflects highly expressed ribosomal protein and
      secretory pathway genes in AT2 cells, not an AT2-specific function.
      Illustrates a non-informative housekeeping enrichment hit.
  - term:
      id: GO:0048286
      label: lung alveolus development
    aspect: biological_process
    category: core_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: curator_added
    insight: confirmatory
    curator_note: >-
      AT2 cells are essential for alveolar development and repair, functioning
      as alveolar progenitor cells. Enrichment-based approaches may recover
      surfactant-secretion terms preferentially over developmental terms; this
      association is added by the curator to capture the AT2 progenitor and
      developmental role that marker enrichment might miss.
