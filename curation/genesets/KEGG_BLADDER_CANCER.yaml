direction: NA
description: >-
  KEGG legacy bladder cancer pathway gene set (MSigDB C2 curated gene set).
  This is a cancer disease pathway gene set, not a cell-type signature. The member
  genes are heavily enriched for RAS/RAF/MAPK pathway components (HRAS, NRAS, RAF1,
  MAP2K1/2, MAPK1/3), cell-cycle regulators and tumour suppressors from the RB/TP53
  axis (RB1, TP53, CDKN2A, CDK4, MDM2, E2F family), PI3K/AKT survival effectors
  (PIK3CA, PTEN, AKT1), VEGF-driven angiogenesis components (VEGFA, FLT1, KDR),
  and ECM/invasion machinery (MMP family, integrin subunits), reflecting the major
  mechanistic arms of the KEGG urinary bladder cancer pathway: RAS-MAPK-driven
  proliferative signalling, RB/TP53-mediated cell-cycle control, VEGF-stimulated
  tumour angiogenesis, ECM remodelling for local invasion, and apoptosis evasion.
