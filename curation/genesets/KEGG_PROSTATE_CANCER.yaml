  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy prostate cancer pathway gene set (MSigDB C2 curated gene set).
  This is a cancer disease pathway gene set, not a cell-type signature. The member
  genes are dominated by androgen-receptor (AR) signaling components (AR, KLK3/PSA,
  FKBP5, SRD5A1/2), PI3K/AKT effectors (PIK3CA, PTEN, AKT1), RAS/MAPK pathway
  members (KRAS, BRAF, MAP2K1, MAPK1/3), cell-cycle regulators acting through the
  RB1/TP53 axis (RB1, E2F1, CDKN1A/CDKN2A), and apoptosis modulators (TP53, BCL2,
  CASP3), reflecting the major mechanistic arms of the KEGG prostate cancer pathway:
  androgen-driven transcription, PI3K survival signaling, MAPK-mediated proliferation,
  cell-cycle dysregulation, and apoptosis evasion.
