    evidence:
      - reference: PMID:29773871
        reference_title: "The somatostatin-secreting pancreatic delta-cell in health and disease."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "This closure initiates membrane depolarization and electrical activity and increased somatostatin secretion."
        explanation: >-
          Somatostatin secretion is the defining function of the pancreatic
          delta cell; the GO definition of GO:0070253 explicitly localises this
          process to "the D cells of the pancreas." This review establishes the
          glucose-triggered, ATP-sensitive-potassium-channel-gated electrical
          mechanism that drives somatostatin release, making GO:0070253 the
          single most cell-type-specific process represented in this marker set.
    curator_note: >-
      The defining hormone of the delta cell. SST (somatostatin, the prohormone
      itself) is present in the signature, together with regulators that act
      selectively on delta cells to drive somatostatin release: GHSR (the
      ghrelin receptor, selectively expressed in delta cells), CASR (the
      calcium-sensing receptor) and the somatostatin autoreceptor SSTR1.
      annotation_supported: these regulatory genes carry somatostatin-secretion
      / regulation-of-somatostatin-secretion GOA annotations and the hormone
      gene SST is present, so enrichment recovers this delta-cell-defining term.
  - term:
      id: GO:0030072
      label: peptide hormone secretion
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Peptide hormone secretion is the immediate parent of somatostatin
      secretion (GO:0070253) and is shared across the islet endocrine lineage —
      alpha cells (glucagon), beta cells (insulin) and delta cells
      (somatostatin) — and broader enteroendocrine cell types. Its recovery
      reflects the delta cell's fundamental identity as a peptide-hormone-
      secreting endocrine cell (SST, CPE, PCSK1, CADPS, PTPRN, SNAP25) but is
      not uniquely delta-cell-specific, hence lineage_shared and
      supporting_process rather than core.
  - term:
      id: GO:0016486
      label: peptide hormone processing
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Mature somatostatin-14 is generated from pre-prosomatostatin by
      post-translational prohormone cleavage and C-terminal processing. The
      signature carries the canonical regulated-secretory-pathway processing
      enzymes: CPE (carboxypeptidase E), PCSK1 (prohormone convertase 1/3),
      PCSK1N (proSAAS) and PAM (peptidylglycine alpha-amidating monooxygenase).
      annotation_supported: CPE, PCSK1 and PAM carry direct peptide-hormone-
      processing GOA annotations. Categorised lineage_shared/supporting because
      the same prohormone-processing machinery operates in all peptidergic
      endocrine cells, not just delta cells.
  - term:
      id: GO:0017156
      label: calcium-ion regulated exocytosis
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Somatostatin-14 stored in delta-cell granules is released by
      Ca2+-dependent regulated exocytosis: a rise in cytosolic Ca2+ following
      electrical activity triggers granule fusion. The signature carries the
      core neuroendocrine release machinery — CADPS (calcium-dependent
      secretion activator, dense-core-vesicle exocytosis), SYT1 (synaptotagmin-1,
      the Ca2+ sensor), SNAP25 (SNARE), PCLO (piccolo) and RAB3D.
      annotation_supported: CADPS, SYT1 and SNAP25 carry calcium-ion-regulated /
      regulated exocytosis GOA annotations. lineage_shared/supporting because
      this Ca2+-triggered exocytosis machinery is common to neurons and other
      regulated-secretory cells; it enables, but does not by itself define, the
      delta-cell identity.
  - term:
      id: GO:0030141
      label: secretory granule
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Somatostatin-14 is synthesised, processed and stored in dense-core
      secretory granules from which it is released by regulated exocytosis;
      the granule is the diagnostic cellular structure of the delta cell in
      the islet. Signature genes localising to this compartment include SST
      (the granule cargo), the processing enzymes CPE / PCSK1 / PCSK1N, the
      granule-membrane phosphatase PTPRN (IA-2) and HID1 (dense-core granule
      biogenesis). annotation_supported: SST, CPE and PCSK1 carry
      secretory-granule GOA annotations.
  - term:
      id: GO:0031018
      label: endocrine pancreas development
    aspect: biological_process
    category: core_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: curator_added
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Delta cells arise from the endocrine pancreas lineage, and the signature
      carries the key transcription factors that drive endocrine-pancreas
      specification and delta-cell fate: ISL1 (pan-islet endocrine TF), HHEX
      (required for delta-cell differentiation and maturation) and INSM1
      (endocrine differentiation), together with PROX1 and PBX3.
      annotation_supported: ISL1, HHEX and INSM1 carry endocrine-pancreas-
      development GOA annotations, so the genes that would carry this term are
      present and annotated. Marked seed_source: curator_added because
      enrichment on adult delta-cell marker genes preferentially recovers
      secretory-function terms over developmental ones (the few developmental
      regulators do not reach enrichment significance), so the curator adds it
      to capture the developmental lineage commitment that defines delta-cell
      identity. confidence: medium because it is a secondary, identity-defining
      aspect of an adult marker signature rather than its dominant signal.
