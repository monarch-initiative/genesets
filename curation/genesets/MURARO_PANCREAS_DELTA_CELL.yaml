description: >-
  Single-cell marker signature of pancreatic delta (D) cells from human pancreas
  (Muraro et al. single-cell atlas of the human pancreas, MSigDB C8). Delta cells
  are the somatostatin-secreting endocrine cells of the islets of Langerhans,
  comprising roughly 5% of islet cells. Their defining function is the regulated
  secretion of somatostatin-14, which acts locally as a paracrine inhibitor of
  insulin (beta-cell) and glucagon (alpha-cell) secretion. The Muraro delta
  signature is anchored by SST (somatostatin) together with the delta-cell
  ghrelin receptor (GHSR), the calcium-sensing receptor (CASR), the somatostatin
  autoreceptor (SSTR1), and the islet endocrine transcription factors ISL1, HHEX
  and INSM1.
