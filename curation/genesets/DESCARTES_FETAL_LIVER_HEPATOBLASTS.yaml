gene_set_id: MSIGDB:DESCARTES_FETAL_LIVER_HEPATOBLASTS
gene_set_name: DESCARTES_FETAL_LIVER_HEPATOBLASTS
collection: C8
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of hepatoblasts from human fetal liver
  (Descartes atlas). Hepatoblasts are bipotential fetal liver progenitors
  that give rise to hepatocytes and cholangiocytes; the signature is
  dominated by hepatic metabolic biology reflecting early hepatocyte
  differentiation.
contexts:
  - term:
      id: CL:0005026
      label: hepatoblast
    context_type: cell_type
  - term:
      id: CL:0000182
      label: hepatocyte
    context_type: cell_type
  - term:
      id: UBERON:0002107
      label: liver
    context_type: anatomical_structure
associations:
  - term:
      id: GO:0006094
      label: gluconeogenesis
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    evidence:
      - reference: PMID:24692138
        reference_title: Energy metabolism in the liver.
        supports: SUPPORT
        snippet: "In the fasted state or during exercise, fuel substrates (e.g. glucose and TAG) are released from the liver into the circulation and metabolized by muscle, adipose tissue, and other extrahepatic tissues."
        explanation: >-
          Hepatocytes are the primary site of hepatic gluconeogenesis,
          supplying glucose to extrahepatic tissues during fasting. This
          review establishes gluconeogenesis as a defining metabolic function
          of the hepatocyte lineage, making it a core_process for this
          hepatoblast signature.
  - term:
      id: GO:0034358
      label: plasma lipoprotein particle
    aspect: cellular_component
    category: core_component
    confidence: medium
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    curator_note: >-
      Hepatocytes assemble and secrete VLDL and other plasma lipoprotein
      particles. The plasma lipoprotein particle CC term is expected to be
      enriched in hepatocyte/hepatoblast marker genes encoding apolipoproteins
      and lipid-transfer proteins.
  - term:
      id: GO:0034377
      label: plasma lipoprotein particle assembly
    aspect: biological_process
    category: core_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    curator_note: >-
      Hepatocytes are the principal site of VLDL and HDL assembly. Marker
      genes in this signature include apolipoproteins and microsomal
      triglyceride transfer protein (MTTP), which drive lipoprotein particle
      assembly.
  - term:
      id: GO:0006805
      label: xenobiotic metabolic process
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    curator_note: >-
      Cytochrome P450 and phase II conjugation enzymes are hallmark markers
      of the hepatocyte lineage. Xenobiotic metabolism is a cell-type-specific
      function already expressed in fetal hepatoblasts undergoing hepatocyte
      differentiation.
  - term:
      id: GO:0007596
      label: blood coagulation
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    curator_note: >-
      The liver synthesizes the majority of plasma clotting factors
      (fibrinogen, factors II, VII, IX, X). Blood coagulation is lineage-shared
      rather than hepatoblast-specific because it is acquired progressively
      during hepatocyte maturation.
  - term:
      id: GO:0006956
      label: complement activation
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    curator_note: >-
      The liver is the primary source of most complement proteins (C3, C4,
      factor B, C1q subunits). Complement component genes are hepatocyte
      markers shared across the hepatocyte lineage.
  - term:
      id: GO:0006412
      label: translation
    aspect: biological_process
    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    curator_note: >-
      Translation is a ubiquitous housekeeping process. Ribosomal protein
      genes are highly expressed in metabolically active fetal hepatoblasts,
      producing a non-informative enrichment hit.
  - term:
      id: GO:0001889
      label: liver development
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: curator_added
    curator_note: >-
      Hepatoblasts are the principal cellular agents of liver organogenesis.
      Liver development is a biologically essential curator-added term that
      enrichment tools may under-recover because developmental GO terms are
      less densely annotated than metabolic terms.
