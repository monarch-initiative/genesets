  label: Homo sapiens
direction: NA
description: >-
  MSigDB C2 KEGG legacy gene set representing the enzymes of the tricarboxylic
  acid (TCA) cycle, also known as the citric acid cycle or Krebs cycle. This is
  a pure metabolic-pathway signature, not a cell-type or disease signature.
  Member genes encode the eight enzymatic complexes that catalyse the sequential
  oxidation of acetyl-CoA in the mitochondrial matrix: citrate synthase (CS),
  aconitase (ACO2), isocitrate dehydrogenase (IDH2/IDH3A/IDH3B/IDH3G),
  2-oxoglutarate dehydrogenase complex (OGDH/DLST/DLD), succinyl-CoA synthetase
  (SUCLG1/SUCLG2/SUCLA2), succinate dehydrogenase (SDHA/SDHB/SDHC/SDHD),
  fumarase (FH), and malate dehydrogenase (MDH2). The cycle oxidises
  acetyl-CoA to CO2, reduces NAD+ and FAD to NADH and FADH2, and generates
  GTP, providing reducing equivalents for the electron transport chain and
  biosynthetic precursors for amino acids, nucleotides, and porphyrins.
