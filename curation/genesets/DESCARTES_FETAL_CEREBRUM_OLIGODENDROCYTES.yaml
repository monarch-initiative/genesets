description: >-
  Single-cell marker signature of oligodendrocytes from human fetal cerebrum
  (Descartes atlas, MSigDB C8). Oligodendrocytes are the myelinating glia of
  the central nervous system, responsible for wrapping axons in compact myelin
  sheaths that enable fast saltatory impulse conduction. In the fetal cerebrum,
  oligodendrocyte lineage cells range from proliferating progenitors to
  committed precursors (OPCs) and nascent myelinating oligodendrocytes. Their
  marker genes include the major myelin structural proteins (MBP, PLP1, MOG,
  MOBP), transcription factors governing lineage specification (OLIG1, OLIG2,
  SOX10), and ribosomal/translational components reflecting the high biosynthetic
  demand of myelin membrane production.
