        snippet: "Oligodendrocytes generate multiple layers of myelin membrane around axons of the central nervous system to enable fast and efficient nerve conduction."
        explanation: >-
          Myelination is the cardinal biological process of oligodendrocytes.
          The Descartes fetal cerebrum oligodendrocyte marker set is dominated
          by major myelin structural proteins (MBP, PLP1, MOG, MOBP) whose
          primary annotated function is participation in myelination. This
          comprehensive review of CNS myelin biology confirms that
          oligodendrocyte-driven myelination is the defining cellular function
          of this lineage.
  - term:
