      label: myelin sheath
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The myelin sheath is the defining subcellular structure produced by
      oligodendrocytes. Major marker genes of this signature — including MBP
      (myelin basic protein), PLP1 (proteolipid protein 1), MOG (myelin
      oligodendrocyte glycoprotein), and MOBP (myelin-associated
      oligodendrocyte basic protein) — are localized to the myelin sheath,
      making this the expected top cellular component in any enrichment
      analysis of oligodendrocyte markers.
  - term:
      id: GO:0008366
      label: axon ensheathment
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Axon ensheathment is the process by which glial cell membranes close
      around neuronal axons to provide electrical insulation. In the CNS,
      oligodendrocytes carry out this function as an integral component of
      their myelinating program. This term is closely related to myelination
      but emphasizes the physical ensheathing interaction rather than myelin
      biogenesis per se; marker genes such as PLP1 and MOBP carry this
      annotation. Classified as supporting_process because myelination
      (GO:0042552) is the more precise core term.
  - term:
      id: GO:0048709
      label: oligodendrocyte differentiation
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The Descartes fetal cerebrum sample captures oligodendrocyte lineage
      cells at various stages of differentiation, including OPCs and nascent
      myelinating cells. Transcription factors and lineage markers (OLIG1,
      OLIG2, SOX10, NKX2-2) that govern oligodendrocyte specification and
      maturation are expected marker genes in this fetal signature and carry
      oligodendrocyte differentiation annotations. Classified as
      supporting_process because the gene set captures the committed
      myelinating state as its primary identity, with differentiation genes
      present as developmental context.
  - term:
      id: GO:0006412
      label: translation
    aspect: biological_process
    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Translation is a ubiquitous housekeeping process. Its enrichment in
      oligodendrocyte marker signatures reflects the exceptionally high
      biosynthetic demand of myelinating cells — oligodendrocytes must produce
      vast quantities of myelin membrane proteins — leading to abundant
      ribosomal protein gene transcripts in the marker set. The enrichment
      signal is real but is not informative for cell-type identity per se and
      appears in the marker sets of most metabolically active cell types.
  - term:
      id: GO:0022010
      label: central nervous system myelination
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: curator_added
    recovery_status: annotation_gap
    insight: confirmatory
    curator_note: >-
      Central nervous system myelination (GO:0022010) is the CNS-specific
      child of myelination (GO:0042552) and precisely describes the
      biological function of oligodendrocytes, which exclusively supply myelin
      to the CNS (Schwann cells handle the PNS). It is expected core biology
      but is classified as annotation_gap: the dominant marker genes (MBP,
      PLP1, MOG, MOBP) are annotated primarily to the parent GO:0042552
      myelination in current GOA-human rather than to this more-specific child
      term, making the term unlikely to be independently recovered by
      enrichment even though it is biologically more accurate for this cell
      type. This is a GO annotation curation target; propagation from the
      parent term would not capture the CNS specificity distinction.
