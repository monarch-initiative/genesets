    evidence:
      - reference: PMID:17340630
        reference_title: "Sudden Infant Death Syndrome: review of implicated genetic factors."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "genes for ion channel proteins based on electrocardiographic evidence of prolonged QT intervals in SIDS victims"
        explanation: >-
          The WikiPathways SIDS susceptibility gene set is anchored by ion
          channel genes whose mutations disrupt cardiac conduction: SCN5A
          (Nav1.5), KCNQ1 (LQT1), KCNH2/hERG (LQT2), KCNE1 (LQT5), and
          KCNE2 (LQT6). This comprehensive review of genetic factors in SIDS
          explicitly identifies prolonged QT intervals as a primary
          electrophysiological finding in SIDS victims and proposes cardiac ion
          channel gene variants as a first-category genetic risk factor,
          directly supporting cardiac conduction as the dominant core
          biological process in this gene set.
    curator_note: >-
      Impaired cardiac conduction — specifically prolonged ventricular
      repolarisation manifesting as long-QT syndrome — is the best-established
      genetic mechanism for at least a fraction of SIDS cases. KCNQ1, KCNH2,
      SCN5A, KCNE1, and KCNE2 are all members of this gene set and are directly
      annotated to cardiac conduction in GOA-human, making enrichment recovery
      of GO:0061337 straightforward.
  - term:
      id: GO:0035725
      label: sodium ion transmembrane transport
    aspect: biological_process
    category: core_process
    confidence: high
