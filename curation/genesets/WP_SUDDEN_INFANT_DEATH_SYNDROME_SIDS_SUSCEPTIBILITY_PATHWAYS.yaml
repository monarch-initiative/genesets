description: >-
  WikiPathways SIDS susceptibility pathways gene set (MSigDB C2 curated gene
  set). This is a disease susceptibility pathway gene set, not a cell-type
  signature. Spanning 159 genes, it captures the major mechanistic arms
  implicated in Sudden Infant Death Syndrome: (1) cardiac-conduction ion
  channels whose loss- or gain-of-function mutations prolong the QT interval
  or otherwise disturb cardiac rhythm (SCN5A/Nav1.5, KCNQ1, KCNH2/hERG,
  KCNE1, KCNE2), (2) serotonergic (5-HT) brainstem signalling components
  (SLC6A4 serotonin transporter, HTR1A, HTR2A, HTR1B serotonin receptors)
  whose deficits impair the arousal response to hypoxia and hypercarbia,
  (3) autonomic nervous system developmental and signalling genes (PHOX2B,
  RET, EDN3, EDNRB) governing brainstem respiratory and cardiovascular
  control, and (4) immune/infection-response and metabolic stress genes whose
  dysregulation can precipitate acute physiological decompensation in a
  vulnerable infant.
