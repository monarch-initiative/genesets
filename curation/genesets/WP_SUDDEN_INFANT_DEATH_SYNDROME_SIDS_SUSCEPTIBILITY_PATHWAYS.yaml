    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    evidence:
      - reference: PMID:26916278
        reference_title: "The role of mutations in the SCN5A gene in cardiomyopathies."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Since 1995 several hundred mutations in this gene have been found to be causative for inherited arrhythmias including Long QT syndrome, Brugada syndrome, cardiac conduction disease, sudden infant death syndrome, etc."
        explanation: >-
          SCN5A encodes Nav1.5, the primary cardiac voltage-gated sodium
          channel, and is a direct member of the WikiPathways SIDS
          susceptibility gene set. This review of SCN5A-associated
          cardiomyopathies confirms that SCN5A mutations cause sudden infant
          death syndrome and documents the channel's role in sodium ion
          transmembrane transport underlying cardiac action potential
          depolarisation. SCN5A is annotated to GO:0035725 in GOA-human,
          ensuring enrichment recovery of this term from the gene set.
    curator_note: >-
      SCN5A (Nav1.5) is the primary cardiac sodium channel and a direct SIDS
      susceptibility gene; loss-of-function variants cause Brugada
      syndrome/LQT3-type SIDS and gain-of-function variants cause LQT3.
      The gene set additionally contains potassium channel genes (KCNQ1, KCNH2)
      whose repolarising currents interact tightly with the sodium current;
      both ion-species' transmembrane transport terms are biologically core
      to the SIDS cardiac arm. Sodium ion transmembrane transport is selected
      as the more specific representative because SCN5A is the gene most
      directly implicated in SIDS.
  - term:
      id: GO:0001518
      label: voltage-gated sodium channel complex
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      SCN5A (Nav1.5) and its regulatory beta-subunits (SCN1B, SCN4B), all of
      which are present in the SIDS susceptibility gene set, localise to the
      voltage-gated sodium channel complex in cardiomyocytes. Nav1.5 is the
      pore-forming alpha-subunit and its complex with beta-subunits is
      annotated to GO:0001518 in GOA-human. This cellular-component term
      captures the dominant ion-channel complex through which SCN5A mutations
      exert their arrhythmogenic effect in SIDS.
  - term:
      id: GO:0007210
      label: serotonin receptor signaling pathway
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    evidence:
      - reference: PMID:21152449
        reference_title: "Serotonin in the sudden infant death syndrome."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "The serotonergic neuromodulator system has roles in the control of cardiac autonomic and respiratory function, as well as now being identified as abnormal in infants with SIDS."
        explanation: >-
          Multiple serotonin-system genes are members of the WikiPathways SIDS
          susceptibility set: SLC6A4 (serotonin transporter), HTR1A, HTR2A,
          and HTR1B (serotonin receptors). This review directly states that the
          serotonergic system controls cardiac autonomic and respiratory
          function and is abnormal in SIDS infants, establishing serotonin
          receptor signalling as a well-supported supporting biological process.
          The HTR genes are annotated to GO:0007210 in GOA-human, enabling
          enrichment recovery.
    curator_note: >-
      Post-mortem studies of SIDS victims show decreased serotonergic receptor
      binding in brainstem nuclei (Kinney et al. triple-risk model). The SIDS
      susceptibility gene set includes SLC6A4, HTR1A, HTR2A, and HTR1B,
      which collectively encode the key transporter and receptor proteins of
      the 5-HT system implicated in brainstem homeostatic control. This is
      classified as supporting_process rather than core_process because the
      serotonergic arm is one of two major etiological hypotheses (alongside
      the cardiac ion channel arm), and not all SIDS cases involve serotonergic
      dysfunction.
  - term:
      id: GO:0043576
      label: regulation of respiratory gaseous exchange
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    evidence:
      - reference: PMID:29908886
        reference_title: >-
          The potential role of substance P in brainstem homeostatic control in
          the pathogenesis of sudden infant death syndrome (SIDS).
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Victims of sudden infant death syndrome (SIDS) are believed to have an underlying dysfunction in medullary homeostatic control that impairs critical responses to life threatening challenges such as hypoxia, hypercarbia and asphyxia, often during a sleep period."
        explanation: >-
          Brainstem regulation of respiratory gaseous exchange — specifically
          the medullary homeostatic response to hypoxia and hypercarbia — is
          a central mechanism proposed for SIDS pathogenesis. The WikiPathways
          SIDS susceptibility set includes PHOX2B (paired-like homeobox 2b,
          the master regulator of autonomic neurons in the respiratory centre),
          RET, EDN3, and EDNRB, several of which carry annotations to
          regulation of respiratory system processes in GOA-human, supporting
          enrichment recovery of this term.
    curator_note: >-
      The failure of the infant to arouse and correct hypoxia/hypercarbia is
      the proximate mechanism of death in SIDS. Brainstem control of
      respiratory gaseous exchange is therefore core to the SIDS aetiology
      but is classified here as supporting_process because it is mediated
      primarily through the serotonergic and autonomic developmental genes
      (PHOX2B, RET) whose GO annotations may not be sufficiently deep to
      recover this precise term at high enrichment significance from only
      159 genes.
