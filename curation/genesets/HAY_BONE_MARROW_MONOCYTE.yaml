taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of monocytes from human bone marrow (Hay et al.,
  MSigDB C8 cell-type marker collection). Monocytes are innate mononuclear
  phagocytes that develop in the bone marrow, circulate in blood, and patrol
  peripheral tissues as a first line of defence against pathogens and cellular
  debris. They phagocytose microorganisms and foreign material, produce
  pro-inflammatory cytokines (TNF-alpha, IL-1beta, IL-6, IL-12), and can
  differentiate into macrophages or dendritic cells upon tissue entry. The bone
  marrow monocyte signature captures both mature monocyte identity genes and
  residual differentiation-stage markers reflecting the developmental context of
  the source tissue.
