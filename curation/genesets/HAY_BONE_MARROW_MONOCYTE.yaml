    evidence:
      - reference: PMID:33275661
        reference_title: "Thyroid Hormone and Deiodination in Innate Immune Cells."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Highly specialized cells of the innate immune system, including neutrophils, monocytes/macrophages, and dendritic cells, are capable of identifying pathogens and initiating an inflammatory response. They can either phagocytose and kill microbes, or recruit other innate or adaptive immune cells to the site of inflammation."
        explanation: >-
          Phagocytosis is a defining functional activity of monocytes; they
          engulf and destroy pathogens, opsonised particles, and cellular debris.
          This review explicitly identifies monocytes/macrophages as innate immune
          cells that phagocytose and kill microbes, establishing phagocytosis as a
          core process expected to dominate enrichment of any monocyte marker gene
          set.
  - term:
      id: GO:0045087
      label: innate immune response
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Monocytes are key innate sentinels that detect pathogen-associated
      molecular patterns via TLRs, NLRs, and CLRs and mount rapid innate immune
      responses. Innate immune response is shared broadly across the myeloid
      lineage (neutrophils, macrophages, dendritic cells, NK cells) and is
      therefore lineage_shared rather than monocyte-specific.
  - term:
