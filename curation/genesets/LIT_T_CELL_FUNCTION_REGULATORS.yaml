description: >-
  Literature-defined set of genes whose CRISPR knockout changes the proliferation
  of primary human T cells, taken from the defining genome-wide loss-of-function
  screen of Shifrut et al. (Cell 2018, PMID:30449619). Using the SLICE platform
  (sgRNA lentiviral infection with Cas9 protein electroporation) the authors
  stimulated CD8 T cells from healthy human donors, sorted highly-proliferating
  (CFSE-low) from non-proliferating (CFSE-high) cells, and used MAGeCK robust rank
  aggregation to call genes positively or negatively selected in the dividing
  population. The set has two arms with opposite biology. The non-obvious arm — and
  the interpretive value of this set — is a convergent network of NEGATIVE
  regulators / "brakes" (positively selected; knockout ENHANCES proliferation and,
  for several, anti-tumor killing): the diacylglycerol kinases DGKZ/DGKA, the
  SOCS1/TCEB2(ELOB)/CUL5/RNF7 cullin-RING complex that suppresses JAK/STAT cytokine
  signaling, the E3 ligase CBLB and its partner CD5, the RAS-GAP RASA2, the
  NF-kB-restraining TNFAIP3 and UBASH3A, and others (TMEM222, CDKN1B, SMARCB1).
  These are not what a "T cell proliferation" framing predicts; their loss removes
  inhibitory checkpoints, which is of direct relevance to immunotherapy and is the
  set's mechanistic insight. The confirmatory arm is the canonical TCR/CD28
  activation machinery (negatively selected; knockout IMPAIRS proliferation): CD3D,
  CD3E, CD247, LCK, ZAP70, LCP2, VAV1, RHOH, LAT, PLCG1, PRKCQ, CARD11, RELA, SH2D1A,
  CD28 — entailed by the premise of a TCR-stimulation proliferation screen.
  MEMBERSHIP was captured authoritatively from the paper's supplementary MAGeCK
  output (Elsevier mmc4.xlsx, sheet "MAGeCK_Gene_GWscreen_rep1and2", the integrated
  genome-wide screen, which reproduces the gene ranks quoted in the Results, e.g.
  DGKZ pos-rank 1, SOCS1 3, CBLB 4, TCEB2 5). The negative-regulator arm is the full
  set of positively-selected genes at MAGeCK pos|FDR < 0.10 (n=17; a natural cutoff
  with a gap between rank 17 DGKA, FDR 0.093, and rank 18, FDR 0.165 — retains DGKA,
  the most weakly-significant brake the authors explicitly validate). The
  positive-regulator arm is RESTRICTED to the canonical TCR/CD28 activation
  components the authors name as the depleted TCR-signaling machinery (all
  neg|FDR <= 0.0031), because the unrestricted negatively-selected list is ~960 genes
  at FDR < 0.05 dominated by pan-essential housekeeping genes (ribosome, splicing,
  translation factors) that impair proliferation non-specifically and are not T-cell
  immune regulators; including them would misrepresent the set. CAVEATS: (1) ARID1A
  is named as a brake in some summaries of this work, but in this integrated
  genome-wide screen it is NOT significant (pos|rank 41, FDR 0.74) and is therefore
  excluded; the related SWI/SNF subunit SMARCB1 IS a significant hit and is included.
  (2) TCEB2 is the symbol used in the 2018 paper; it is HGNC-normalized here to ELOB
  (elongin B, HGNC:11619). (3) CD8A appears as a positively-selected hit and is
  retained on threshold, though in a CD8 T cell screen its enrichment in the dividing
  fraction is plausibly a marker/readout effect rather than a genuine proliferation
  brake. Symbols HGNC-verified via mygene.info; only TCEB2 required normalization.
