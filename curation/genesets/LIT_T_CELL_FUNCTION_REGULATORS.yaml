        reference_title: "Genome-wide CRISPR Screens in Primary Human T Cells Reveal Key Regulators of Immune Function."
        supports: SUPPORT
        evidence_source: IN_VITRO
        snippet: "essential T cell receptor signaling components"
        explanation: >-
          The negatively-selected ("positive regulator") arm of the set is the
          canonical TCR-proximal signaling machinery — CD3D, CD3E, CD247, LCK, ZAP70,
          LCP2, VAV1, RHOH, LAT, PLCG1, PRKCQ, CARD11 — whose knockout impairs
          stimulation-dependent proliferation. These genes are members of the set and
          carry the TCR-signaling annotation, so enrichment recovers it
          (annotation_supported). Scored confirmatory because identifying the TCR
          pathway as required for a TCR-stimulation proliferation screen recapitulates
          the assay design rather than revealing new mechanism.
    curator_note: >-
      GSEA in the paper reported significant over-representation of the depleted hits
      in the TCR signaling pathway (FDR < 0.01).
  - term:
      id: GO:0042110
      label: T cell activation
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Both arms of the set converge on T cell activation: the TCR-machinery positives
      are required for it, and the brakes tune it. Arrayed knockout of negative
      regulators raised the early activation markers CD69 and CD154, while knockout of
      the positive regulator LCP2 lowered them, confirming these genes act on the
      activation program. Confirmatory rather than mechanistic because T cell
      activation is the assayed process itself. No verbatim snippet attached: the
      relevant full-text sentences interleave figure callouts; grounding is the CD69/
      CD154 arrayed-validation experiments.
