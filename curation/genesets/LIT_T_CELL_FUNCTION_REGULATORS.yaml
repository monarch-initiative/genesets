associations:
  - term:
      id: GO:0050868
      label: negative regulation of T cell activation
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: mechanistic
    evidence:
      - reference: PMID:30449619
        reference_title: "Genome-wide CRISPR Screens in Primary Human T Cells Reveal Key Regulators of Immune Function."
        supports: SUPPORT
        evidence_source: IN_VITRO
        snippet: "Genome-wide loss-of-function screens identified essential T cell receptor signaling components and genes that negatively tune proliferation following stimulation."
        explanation: >-
          The central, non-obvious discovery of the screen is a convergent network of
          negative regulators — "genes that negatively tune proliferation following
          stimulation" — whose knockout ENHANCES T cell function. These brake genes —
          SOCS1, CBLB, CD5, TNFAIP3, UBASH3A, DGKA/DGKZ, RASA2, TCEB2(ELOB) — are
          members of the set and carry the negative-regulation-of-T-cell-activation
          annotation, so enrichment recovers the term (annotation_supported). It is
          scored mechanistic because removing inhibitory checkpoints to boost immunity
          is not entailed by a "T cell proliferation" framing; it is the
          immunotherapy-relevant insight the screen was built to surface. (Snippet is
          the abstract sentence; the full text further shows ablation of SOCS1, TCEB2,
          RASA2 and CBLB enhanced both proliferation and anti-tumor killing.)
    curator_note: >-
      Core mechanistic term for this set: the positively-selected ("brake") arm. Loss
      of these genes increases proliferation, activation-marker expression (CD69,
      CD154), and for SOCS1/TCEB2/RASA2/CBLB also in vitro tumor-cell killing.
  - term:
      id: GO:0001960
      label: negative regulation of cytokine-mediated signaling pathway
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: mechanistic
    curator_note: >-
      A specific mechanistic axis within the brake network: SOCS1 (pos-rank 3) and its
      binding partner TCEB2/ELOB (pos-rank 5), together with CUL5 and RNF7, form a
      cullin-RING complex that the authors describe as suppressing JAK/STAT cytokine
      signaling in activated T cells (Shifrut 2018 full text). Both SOCS1 and ELOB are
      members of the set and carry negative-regulation-of-cytokine-signaling
      annotations, so the term is recovered (annotation_supported). Scored mechanistic
      because a cytokine-signaling brake emerging from a TCR-stimulation proliferation
      screen is non-obvious, and supporting rather than core because it is one
      molecular module of the broader negative-regulation discovery; ablation of TCEB2
      improved tumor clearance, nominating the complex as an immunotherapy target. No
      verbatim snippet is attached because this complex is described in the full text,
      not the abstract (the only text available to the reference validator), and per
      curation policy snippets are not fabricated.
