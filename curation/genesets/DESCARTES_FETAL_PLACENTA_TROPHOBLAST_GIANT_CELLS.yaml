description: >-
  Single-cell marker signature of trophoblast giant cells of the human FETAL
  placenta (Descartes fetal cell atlas, Cao et al. 2020, PMID:33184181; MSigDB
  C8). Trophoblasts form the fetal-maternal interface and are the placenta's
  professional endocrine cells; the trophoblast giant cell is a terminally
  differentiated, hormone-secreting trophoblast. The signature is dominated by
  the placental endocrine program: the chorionic gonadotropin subunits CGA
  (shared glycoprotein hormone alpha subunit) and CGB3 (hCG beta), the
  chorionic somatomammotropins / placental lactogens CSH1, CSH2 and CSHL1, the
  placental growth-hormone variant GH2 (and GH1), the early-placental insulin
  -like peptide INSL4, placental corticotropin-releasing hormone CRH, and a
  large block of pregnancy-specific glycoproteins (PSG1, PSG2, PSG3, PSG4,
  PSG5, PSG6, PSG7, PSG8, PSG9, PSG11). It also carries the placental
  steroidogenic enzymes CYP19A1 (aromatase), HSD17B1, HSD3B1 and HSD11B2, the
  placental galectins LGALS13/14/16, ALPP (placental alkaline phosphatase),
  INHBA (activin/inhibin beta A) and the endogenous retroviral envelope ERV3-1.
  Notably the fusogenic syncytins ERVW-1 / ERVFRD-1 and the syncytialisation
  master regulator GCM1 are NOT members, so the cell-cell-fusion / placental
  morphogenesis program is recorded below as a membership_gap.
