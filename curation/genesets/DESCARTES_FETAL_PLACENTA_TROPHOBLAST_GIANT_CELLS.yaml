  - term:
      id: GO:0007565
      label: female pregnancy
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Maintenance of female pregnancy is the organismal process this placental
      cell type exists to execute, and it is the dominant annotation-supported
      signal in the signature. In goa_human, set members annotated to female
      pregnancy (or its subprocesses) include the whole pregnancy-specific
      glycoprotein block PSG1, PSG2, PSG3, PSG4, PSG5, PSG6, PSG7, PSG9 and
      PSG11, the placental corticotropin-releasing hormone CRH (a regulator of
      gestational length), the fetoprotective cortisol-inactivating enzyme
      HSD11B2 (11-beta-HSD type 2), ENDOU and ANGPT2. Contrary to the common
      expectation that PSGs are poorly annotated, the PSG paralogues here ARE
      annotated to female pregnancy, so this is firmly annotation_supported.
      Confirmatory: a placental trophoblast marker set recovering female
      pregnancy recapitulates the cell type's defining context by construction.
  - term:
      id: GO:0005179
      label: hormone activity
    aspect: molecular_function
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The trophoblast giant cell is a professional endocrine cell, and the
      single most characteristic molecular function of its marker genes is
      hormone activity. Twelve set members are annotated to hormone activity in
      goa_human: the chorionic gonadotropin subunits CGA (the shared
      glycoprotein hormone alpha subunit) and CGB3 (hCG beta), the chorionic
      somatomammotropins / placental lactogens CSH1, CSH2 and CSHL1, the
      growth-hormone variant GH2 and GH1, the insulin-like peptide INSL4,
      placental CRH, cholecystokinin CCK, GDF15 and the activin/inhibin subunit
      INHBA. This co-expression of glycoprotein (CGA/CGB3) and peptide
      (CSH/GH/INSL4) hormones is the placental endocrine fingerprint, so the
      term is annotation_supported. Categorised core_process (the closest
      available bucket for a defining molecular role, following house style for
      core molecular-function terms). Confirmatory: the hormone-ligand identity
      is entailed by the cell type's construction as the placenta's endocrine
      compartment.
  - term:
      id: GO:0046879
      label: hormone secretion
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: curator_added
    recovery_status: annotation_gap
    insight: confirmatory
    curator_note: >-
      Regulated secretion of hormones into the maternal circulation (hCG,
      placental lactogen, placental growth hormone) is the defining effector
      OUTPUT of this cell type, distinct from the hormone-ligand activity of the
      molecules themselves. This is an annotation_gap: the carrier genes ARE in
      the set (CGA, CGB3, CSH1, CSH2, CSHL1, GH2, INSL4 are all present and
      annotated to hormone activity), but only INHBA among them is annotated to
      the biological-process term hormone secretion (GO:0046879) in goa_human.
      The secreted-hormone phenotype that names this cell biologically is
      therefore not captured at the secretion-process level — a GO annotation
      curation target rather than a gene-set deficiency. Added by curator;
      enrichment cannot recover a process the carriers are not annotated to.
  - term:
      id: GO:0006703
      label: estrogen biosynthetic process
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      The placenta is the principal site of estrogen biosynthesis during human
      pregnancy, and this signature carries a converging set of the
      steroidogenic enzymes that execute it: CYP19A1 (aromatase, the
      rate-limiting conversion of androgens to estrogens), HSD17B1 (17-beta-HSD
      type 1, estrone to estradiol) and HSD3B1 (3-beta-HSD type 1, the placental
      isoform). All three are annotated under estrogen biosynthetic process in
      goa_human, making this annotation_supported. The multi-enzyme convergence
      is a genuine and specific placental-steroidogenesis read-out of the
      signature (HSD11B2, also present, instead protects the fetus by
      inactivating maternal cortisol). Confirmatory rather than mechanistic:
      placental estrogen production is an expected hallmark of trophoblast
      endocrine identity.
  - term:
      id: GO:0060707
      label: trophoblast giant cell differentiation
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: curator_added
    recovery_status: annotation_gap
    insight: confirmatory
    curator_note: >-
      This is the literal cell-type term for the signature and is therefore a
      core, cell-type-defining process. It is an annotation_gap: zero human set
      genes are annotated to GO:0060707 in goa_human, because the term is
      largely mouse-defined (in mouse, trophoblast giant cell differentiation is
      driven by the prolactin/placental-lactogen family together with Hand1 and
      Stra13/Bhlhe40). The human orthologous effectors of that differentiated
      state ARE present here — the placental lactogens CSH1, CSH2 and CSHL1 and
      the chorionic gonadotropin subunits CGA and CGB3 are the differentiated
      trophoblast giant cell hormone markers — but they are annotated to hormone
      activity and female pregnancy rather than to this differentiation process.
      The gap is GO's (a curation target for projecting the mouse TGC
      differentiation program onto human trophoblast genes), not the gene set's.
  - term:
      id: GO:0001890
      label: placenta development
    aspect: biological_process
    category: supporting_process
    confidence: high
    specificity: lineage_shared
    seed_source: curator_added
    recovery_status: membership_gap
    insight: confirmatory
    curator_note: >-
      Placenta development is real and relevant for any placental cell type, but
      it is a membership_gap here: zero set genes are annotated to GO:0001890 in
      goa_human, because the canonical placental-morphogenesis regulators
      (GCM1, PPARG, OVOL1, PEG10 and the fusogenic syncytins ERVW-1 / ERVFRD-1)
      are NOT members of this signature. The set captures the terminally
      differentiated, hormone-secreting effector state of the trophoblast giant
      cell rather than the developmental/morphogenetic program that builds the
      organ, so the genes that would carry placenta development are absent. The
      association is correct for the underlying biology and should appear in a
      complete placental description; the gap is the gene set's. Categorised
      supporting_process (lineage-level context, not the defining function of
      this differentiated cell).
  - term:
      id: GO:0000768
      label: syncytium formation by cell-cell fusion
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: curator_added
    recovery_status: membership_gap
    insight: confirmatory
    curator_note: >-
      Syncytialisation by cell-cell fusion is a striking trophoblast-lineage
      process, but it is a membership_gap for THIS set: the fusogenic syncytins
      ERVW-1 (syncytin-1) and ERVFRD-1 (syncytin-2) and their transcriptional
      master regulator GCM1 are NOT members, so no set gene is annotated to
      GO:0000768. The endogenous retroviral envelope ERV3-1 IS present, but it
      is non-fusogenic (its env lacks functional membrane-fusion activity in
      humans) and is not annotated to cell-cell fusion. Biologically, fusion
      builds the syncytiotrophoblast, a trophoblast derivative distinct from the
      giant cell captured here (trophoblast giant cells characteristically
      become polyploid via endoreduplication rather than by fusion), hence the
      medium confidence. Left confirmatory, NOT mechanistic: the
      retroviral-envelope-driven fusion mechanism would be a genuine insight only
      if the syncytin fusogens were present and annotation-supported, and here
      they are absent. Recorded to make the gap visible and scoreable.
