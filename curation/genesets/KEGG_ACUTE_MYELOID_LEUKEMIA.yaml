description: >-
  KEGG legacy acute myeloid leukemia pathway gene set (MSigDB C2 curated gene set).
  This is a blood cancer disease pathway gene set, not a cell-type signature. The member
  genes encode hematopoietic transcription factors recurrently mutated or dysregulated
  in AML (RUNX1, CEBPA, PML-RARA, MYC, EVI1/MECOM), growth-factor receptors and
  RAS/MAPK signaling components (KIT, FLT3, RAS, RAF, MAP2K, MAPK), PI3K-AKT
  survival effectors, and core apoptosis regulators (BCL2-family, CASP3, CYCS),
  reflecting the major mechanistic arms of the KEGG acute myeloid leukemia pathway:
  transcription-factor-driven differentiation block, growth-factor/RAS/MAPK
  proliferative signaling, PI3K-AKT survival signaling, and apoptosis evasion.
