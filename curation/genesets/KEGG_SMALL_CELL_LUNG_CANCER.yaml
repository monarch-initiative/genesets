gene_set_id: MSIGDB:KEGG_SMALL_CELL_LUNG_CANCER
gene_set_name: KEGG_SMALL_CELL_LUNG_CANCER
collection: C2:CP:KEGG_LEGACY
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy small cell lung cancer pathway gene set (MSigDB C2 curated gene set).
  This is a cancer disease pathway gene set, not a cell-type signature. The member
  genes represent the major mechanistic arms of SCLC pathogenesis: universal biallelic
  loss of RB1 and TP53 driving cell-cycle deregulation and checkpoint abrogation,
  BCL2-family overexpression conferring anti-apoptotic survival, integrin and ECM
  components (ITGA/ITGB subunits, collagen IV chains, laminin subunits, fibronectin)
  mediating cell-adhesion-based drug resistance (CAM-DR), and MYC amplification
  with PI3K/AKT signaling driving proliferative expansion. SCLC is a high-grade
  neuroendocrine carcinoma with near-universal initial chemosensitivity but rapid
  acquired resistance, reflected in the pathway's emphasis on ECM-mediated survival
  signaling alongside the canonical cell-cycle and apoptosis machinery.
