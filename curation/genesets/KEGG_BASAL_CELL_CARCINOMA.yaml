  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy basal cell carcinoma pathway gene set (MSigDB C2 curated gene set).
  This is a skin cancer disease pathway gene set, not a cell-type signature. The
  member genes are heavily enriched for components of the Hedgehog signaling axis
  (PTCH1, SMO, SHH, GLI1, GLI2, SUFU), which is the defining oncogenic driver
  of basal cell carcinoma. Additional pathway arms include Wnt/beta-catenin
  signaling components (CTNNB1, WNT family members, FZD receptors), TP53-mediated
  tumour suppression, CDKN2A/RB1 cell-cycle regulators driving proliferative
  expansion, and apoptosis modulators (CASP3, BCL2-family), reflecting the
  major mechanistic arms of the KEGG basal cell carcinoma pathway: Hedgehog-driven
  initiation and expansion, Wnt co-activation, and TP53 loss enabling tumour
  progression.
