  - term:
      id: GO:0001913
      label: T cell mediated cytotoxicity
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    evidence:
      - reference: PMID:11861606
        reference_title: Lymphocyte-mediated cytotoxicity.
        supports: SUPPORT
        snippet: "Virtually all of the measurable cell-mediated cytotoxicity delivered by cytotoxic T lymphocytes and natural killer cells comes from either the granule exocytosis pathway or the Fas pathway."
        explanation: >-
          CD8+ cytotoxic T lymphocytes are the primary cellular executors of T cell
          mediated cytotoxicity, deploying perforin/granzyme granule exocytosis and
          the Fas pathway to kill target cells bearing cognate peptide-MHC class I.
          This is the defining functional process of the CD8+ T cell signature.
  - term:
      id: GO:0030141
      label: secretory granule
    aspect: cellular_component
    category: core_component
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    curator_note: >-
      CD8+ cytotoxic T cells store perforin and granzymes in lytic/secretory
      granules that are polarised toward the immunological synapse upon target
      cell recognition. The secretory granule compartment is a hallmark of
      cytotoxic lymphocyte biology and is expected to be enriched in CD8+ T cell
      marker sets. Shared with NK cells (lineage_shared).
  - term:
      id: GO:0050852
      label: T cell receptor signaling pathway
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    curator_note: >-
      Antigen recognition through the TCR-CD8 complex is the initiating event
      for CD8+ T cell activation and cytotoxic function. TCR signaling pathway
      genes (CD3, ZAP70, LAT, etc.) are canonical markers of this lineage.
  - term:
      id: GO:0006955
      label: immune response
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: enrichment_recovered
    curator_note: >-
      Generic immune response term recovered by enrichment of any immune cell
      signature. Provides contextual support for immune identity but is not
      specific to CD8+ T cells.
  - term:
      id: GO:0002250
      label: adaptive immune response
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    curator_note: >-
      CD8+ T cells are adaptive immune lymphocytes that respond to specific
      antigens via a somatically diversified TCR. Shared with CD4+ T cells and
      B cells; lineage_shared rather than CD8-specific.
  - term:
      id: GO:0006412
      label: translation
    aspect: biological_process
    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    curator_note: >-
      Translation is a ubiquitous housekeeping process. Its appearance in
      enrichment results reflects highly expressed ribosomal protein genes in
      bone marrow CD8+ T cells, not a T cell-specific function. Illustrates a
      non-informative enrichment hit.
  - term:
      id: GO:0042110
      label: T cell activation
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: curator_added
    curator_note: >-
      T cell activation encompasses the morphological and functional changes that
      follow antigen recognition by CD8+ T cells, including proliferation,
      differentiation into cytotoxic effectors, and acquisition of killing
      capacity. Added by curator as a broader core process term expected to be
      annotated to CD8+ T cell markers even when not directly recovered by
      enrichment.
