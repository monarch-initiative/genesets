gene_set_id: MSIGDB:HAY_BONE_MARROW_CD8_T_CELL
gene_set_name: HAY_BONE_MARROW_CD8_T_CELL
collection: C8
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of CD8-positive, alpha-beta T cells from human bone marrow
  (Hay et al.). CD8+ cytotoxic T cells are adaptive immune effectors that recognise
  peptide-MHC class I complexes on infected or transformed cells and kill them via
  perforin/granzyme-mediated granule exocytosis and the Fas/FasL death receptor pathway.
