gene_set_id: MSIGDB:HP_DEGENERATION_OF_ANTERIOR_HORN_CELLS
gene_set_name: HP_DEGENERATION_OF_ANTERIOR_HORN_CELLS
collection: C5:HPO
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
n_genes: 21
description: >-
  MSigDB C5:HPO phenotype gene set: human genes annotated to the Human Phenotype
  Ontology term "Degeneration of anterior horn cells" (HP:0002398). The anterior
  (ventral) horn of the spinal cord houses the cell bodies of lower motor
  neurons, so this is a lower-motor-neuron-degeneration gene set rather than a
  cell-type expression signature. The members are causal genes for spinal
  muscular atrophy and related lower motor neuron disorders (e.g. SMN1, SMN2,
  DYNC1H1, BICD2, VAPB, IGHMBP2, ASAH1, TRPV4). Their shared biology converges on
  the maintenance and survival of spinal motor neurons: SMN-driven assembly of
  spliceosomal snRNPs (whose deficiency selectively kills motor neurons in SMA,
  the prototypic anterior-horn disease), dynein-based axonal transport, neuronal
  process outgrowth, and ultimately the apoptotic death of motor neurons that
  produces the degeneration phenotype.
contexts:
