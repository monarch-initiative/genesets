description: >-
  MSigDB C2:CGP gene set of genes up-regulated by the MYC oncogenic transcription
  factor and whose promoters are directly bound by MYC, as defined by Zeller and
  Dang et al. (2003, PMID:14519204). This is a genetic-perturbation response
  signature (MYC oncogene activation, UP component), not a cell-type signature:
  member genes are induced across diverse cellular contexts by enforced MYC
  expression and reflect the canonical MYC transcriptional programme, which centres
  on ribosome biogenesis, rRNA processing and modification, translation, nucleotide
  biosynthesis, and cell cycle entry. The 130 member genes were prioritised by
  transcriptomic evidence of MYC responsiveness and validated by chromatin
  immunoprecipitation of MYC promoter binding.
