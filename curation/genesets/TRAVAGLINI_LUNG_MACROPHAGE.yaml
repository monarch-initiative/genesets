  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of alveolar macrophages from human lung
  (Travaglini et al.). Alveolar macrophages are tissue-resident phagocytes
  that patrol the alveolar space, phagocytose inhaled particulate matter,
  apoptotic cells, and spent surfactant aggregates. They serve as frontline
  innate immune sentinels, regulate local inflammation, and maintain alveolar
  lipid and surfactant homeostasis.
