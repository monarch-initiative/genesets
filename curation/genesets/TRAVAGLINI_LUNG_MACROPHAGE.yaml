        snippet: "They phagocytose inhaled material and initiate protective immune responses to pathogens, while preventing excessive inflammatory responses and tissue damage."
        explanation: >-
          Phagocytosis is the defining functional activity of alveolar macrophages;
          they continuously engulf inhaled particles, bacteria, apoptotic cells,
          and surplus surfactant debris. This review explicitly identifies
          phagocytosis of inhaled material as a core function of alveolar
          macrophages in the alveolar niche.
  - term:
      id: GO:0043129
      label: surfactant homeostasis
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Alveolar macrophages are the primary cells responsible for clearing
      spent and excess pulmonary surfactant from the alveolar surface by
      phagocytosis of surfactant aggregates. This function is unique to the
      alveolar niche and differentiates alveolar macrophages from other
      tissue-resident macrophage populations such as Kupffer cells. Lipid-handling
      marker genes prominent in alveolar macrophage signatures (FABP4, ABCA1,
      APOC1) support recovery of surfactant and lipid homeostasis terms.
  - term:
      id: GO:0006954
      label: inflammatory response
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Alveolar macrophages secrete pro-inflammatory cytokines (TNF-alpha,
      IL-6, IL-1beta, IL-12) and chemokines upon encountering pathogens or
      injury signals in the alveolar space. Inflammatory response is a
      property shared across macrophage lineages and is therefore lineage_shared
      rather than alveolar-macrophage-specific.
  - term:
      id: GO:0045087
      label: innate immune response
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Alveolar macrophages are frontline innate immune sentinels that express
      pattern-recognition receptors (TLRs, NLRs, scavenger receptors) and
      respond to inhaled pathogens and particulates. Innate immune response
      is shared broadly across macrophage and myeloid cell types and is
      lineage_shared rather than alveolar-macrophage-specific.
  - term:
      id: GO:0045335
      label: phagocytic vesicle
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: cell_type_specific
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    insight: confirmatory
    curator_note: >-
      Alveolar macrophages form abundant phagocytic vesicles as part of their
      central role in engulfing inhaled particles, bacteria, apoptotic cells,
      and surfactant aggregates. Phagocytic vesicles (phagosomes) are the
      organellar hallmark of professional phagocytes and are expected to be
      enriched in alveolar macrophage gene signatures.
  - term:
