      label: translation
    aspect: biological_process
    category: nonspecific
    confidence: high
    specificity: ubiquitous
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Translation is a ubiquitous housekeeping process. Its appearance in
      alveolar macrophage enrichment results reflects highly expressed ribosomal
      protein genes rather than a macrophage-specific function. This is a
      non-informative housekeeping enrichment hit typical of cell-type gene
      signatures.
  - term:
      id: GO:0042116
      label: macrophage activation
    aspect: biological_process
    category: core_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: curator_added
    recovery_status: annotation_gap
    insight: confirmatory
    curator_note: >-
      Macrophage activation (M1-like inflammatory and M2-like tolerogenic
      polarization) is a defining feature of alveolar macrophage biology;
      these cells switch between activation states in response to the alveolar
      microenvironment, inhaled stimuli, and tissue signals. Key activation
      markers such as MRC1 (CD206), CD163, and PPARG are present in the
      Travaglini alveolar macrophage signature, but these genes are not
      consistently annotated to GO:0042116 in GOA-human. The gap is in
      GO annotation depth, not in the biology — this is a GO curation target.
