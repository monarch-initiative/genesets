gene_set_id: MSIGDB:KEGG_COLORECTAL_CANCER
gene_set_name: KEGG_COLORECTAL_CANCER
collection: C2:CP:KEGG_LEGACY
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy colorectal cancer pathway gene set (MSigDB C2 curated gene set).
  This is a cancer disease pathway gene set, not a cell-type signature. The member
  genes are heavily enriched for Wnt/beta-catenin signaling components (APC, CTNNB1,
  FZD family, TCF/LEF), RAS/MAPK pathway members (KRAS, BRAF, MAP2K1, MAPK1/3),
  PI3K/AKT effectors (PIK3CA, PTEN, AKT1), cyclin-dependent kinase regulators driving
  proliferation, and apoptosis modulators (TP53, CASP3, BCL2-family), reflecting the
  major mechanistic arms of the KEGG colorectal cancer pathway: Wnt-driven initiation,
  MAPK-mediated proliferation, PI3K survival signaling, cell migration, and apoptosis
  dysregulation.
contexts:
  - term:
      id: MONDO:0005575
      label: colorectal cancer
    context_type: disease
  - term:
