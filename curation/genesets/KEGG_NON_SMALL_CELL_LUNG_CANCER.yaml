taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy non-small cell lung cancer pathway gene set (MSigDB C2 curated gene set).
  This is a cancer disease pathway gene set, not a cell-type signature. The member
  genes represent the major mechanistic arms of NSCLC pathogenesis: EGFR/HER2
  activating mutations or amplification driving constitutive receptor tyrosine kinase
  signalling, KRAS/HRAS/NRAS oncogenic mutation directly activating RAS-RAF-MEK-ERK
  (MAPK cascade) and PI3K-AKT survival signalling, homozygous deletion of CDKN2A
  derepressing CDK4/6-CCND1 to override RB1 and drive G1/S transition, and TP53/MDM2
  axis abrogating DNA-damage checkpoint responses. NSCLC encompasses adenocarcinoma,
  squamous cell carcinoma, and large-cell carcinoma and is distinguished from small-cell
  lung cancer by its dominant dependence on RTK/RAS oncogene addiction and by the
  absence of near-universal RB1 biallelic loss.
