  - term:
      id: GO:0002250
      label: adaptive immune response
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: lineage_shared
    seed_source: curator_added
    recovery_status: annotation_gap
    curator_note: >-
      Adaptive immune response is the overarching biological context of GVHD:
      donor T cells — adaptive immune effectors expressing antigen-specific TCRs —
      recognise host alloantigens, clonally expand, and mount a targeted
      cytotoxic response against host tissues. While the KEGG GVHD pathway genes
      are well-annotated to specific child processes (T cell mediated cytotoxicity,
      antigen processing and presentation), direct annotations to this broad parent
      term are sparse in GOA-human, and standard GO enrichment tools recover the
      more informative specific children rather than this parent. Added by curator
      to make the adaptive immune context explicit; recovery_status is annotation_gap
      because the gene set members carry direct annotations predominantly to specific
      effector child terms rather than to adaptive immune response itself, reflecting
      incomplete propagation of annotations in GOA-human rather than absence of
      the biology.
