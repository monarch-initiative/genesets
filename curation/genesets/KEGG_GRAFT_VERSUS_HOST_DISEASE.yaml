gene_set_id: MSIGDB:KEGG_GRAFT_VERSUS_HOST_DISEASE
gene_set_name: KEGG_GRAFT_VERSUS_HOST_DISEASE
collection: C2:CP:KEGG_LEGACY
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy graft versus host disease pathway gene set (MSigDB C2 curated gene set).
  This is a disease pathway gene set representing alloimmune-mediated tissue damage
  following allogeneic hematopoietic cell transplantation. Donor T cells recognise
  host MHC and minor histocompatibility alloantigens, then expand and differentiate
  into effector cells that destroy host tissues through direct cytotoxicity
  (perforin-granzyme and Fas-FasL pathways) and pro-inflammatory cytokine release
  (TNF, IL-1alpha/beta, IFN-gamma). NK cells contribute additional cytotoxic killing
  using the shared perforin-granzyme machinery. Member genes are enriched for MHC class
  I (HLA-A, HLA-B, HLA-C, B2M) and class II (HLA-DRA, HLA-DRB1, HLA-DQA1, HLA-DQB1,
  HLA-DPA1, HLA-DPB1) molecules, cytotoxic effectors (PRF1, GZMB, FASLG), cytokine
  and cytokine-receptor signalling components (IL1A, IL1B, TNF, IFNG, IL6, IL10),
  and co-stimulatory molecules (CD80, CD86, CD28). As a legacy KEGG pathway
  representation, the set captures the established alloimmune effector phase and
  omits some regulatory and upstream priming events.
