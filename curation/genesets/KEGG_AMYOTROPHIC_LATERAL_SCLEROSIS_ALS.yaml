  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy amyotrophic lateral sclerosis (ALS) pathway gene set (MSigDB C2
  curated gene set). This is a disease pathway gene set, not a cell-type
  signature. ALS is a fatal motor neuron disease characterised by progressive
  degeneration of upper and lower motor neurons. The member genes reflect the
  major mechanistic arms represented in the KEGG ALS pathway: SOD1-mediated
  superoxide detoxification and oxidative stress, glutamate excitotoxicity
  through ionotropic (AMPA/NMDA) receptors, neurofilament accumulation and
  cytoskeletal disruption, mitochondrial dysfunction, and the downstream
  apoptotic execution of motor neurons. As a legacy/core pathway it captures
  the dominant established mechanisms as of the time of KEGG pathway assembly.
