gene_set_id: MSIGDB:MURARO_PANCREAS_ALPHA_CELL
gene_set_name: MURARO_PANCREAS_ALPHA_CELL
collection: C8
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of pancreatic alpha (A) cells from human pancreas
  (Muraro et al.). Pancreatic alpha cells are glucagon-secreting endocrine cells
  located at the periphery of the islets of Langerhans that play an essential role
  in glucose homeostasis by releasing glucagon in response to hypoglycaemia.
contexts:
