description: >-
  WikiPathways gastric cancer network 2 gene set (MSigDB C2:CP:WIKIPATHWAYS,
  32 genes). This cancer disease pathway gene set captures the receptor tyrosine
  kinase / RAS-MAPK and PI3K/AKT signalling axes that drive gastric (stomach)
  carcinoma proliferation and survival, together with cell-cycle deregulation and
  apoptosis dysregulation. In contrast to the first gastric cancer network
  (WP_GASTRIC_CANCER_NETWORK_1), this set emphasises RTK-initiated oncogenic
  cascades: EGFR, HER2/ERBB2, FGFR2, and MET are among the receptor tyrosine
  kinases frequently amplified or mutated in gastric cancer that initiate
  downstream RAS-RAF-MEK-ERK (MAPK cascade) and PI3K-AKT survival signalling.
  Oncogenic KRAS mutations and HER2 amplification are the best-characterised
  drivers in this gene set. Downstream cell-cycle entry is mediated by
  cyclin D1 (CCND1) in complex with CDK4/CDK6 driving G1/S transition, while
  apoptosis evasion involves BCL2-family members and TP53 inactivation. The set
  thus represents the mitogenic signalling hierarchy from cell-surface RTK
  through MAPK and PI3K second-messenger cascades to proliferative and
  anti-apoptotic transcriptional outputs.
