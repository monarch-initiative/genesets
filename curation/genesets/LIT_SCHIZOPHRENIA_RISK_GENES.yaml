gene_set_id: LIT:SCHIZOPHRENIA_RISK_GENES
gene_set_name: SCHIZOPHRENIA_RISK_GENES
collection: LIT:GENETIC
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Literature-defined panel of schizophrenia risk genes assembled from human
  genetics: common-variant GWAS loci (Trubetskoy et al., Nature 2022,
  PMID:35396580 — 287 genome-wide-significant loci, 120 prioritised genes) and
  rare disruptive-coding-variant studies, integrated with the landmark
  complement-component-4 finding (Sekar et al., Nature 2016, PMID:26814963).
  Unlike the LIT:DISEASE_ACTIVITY signatures, these are DRIVERS (risk alleles),
  not the differentially-expressed readout of an active program, so the
  convergent biology they enact is often an annotation_gap rather than directly
  annotation_supported. The convergent interpretation is twofold. (1) A largely
  EXPECTED synaptic/glutamatergic convergence: GWAS signal concentrates in
  excitatory and inhibitory neurons and in synaptic genes — the glutamate
  receptor subunits GRIN2A (the flagship common+rare convergence), GRIN1 and
  GRIA1, the calcium channel CACNA1C, the postsynaptic scaffolds DLG2 and SHANK,
  plus transcriptional/chromatin risk genes such as TCF4, SP4, ZNF804A and the
  rare-variant gene SETD1A. (2) The NON-OBVIOUS mechanistic centrepiece:
  complement-mediated synaptic pruning. Sekar showed that schizophrenia's
  strongest (MHC) association is driven by structurally diverse C4 alleles whose
  schizophrenia risk tracks C4A expression, that C4 localises to synapses, and
  that C4 mediates synapse elimination in mice — implicating EXCESSIVE COMPLEMENT
  ACTIVITY (an immune process one would not predict from a psychiatric phenotype)
  in over-pruning of synapses during adolescent development. The complement genes
  C4A and C4B carry this signal in the set.
