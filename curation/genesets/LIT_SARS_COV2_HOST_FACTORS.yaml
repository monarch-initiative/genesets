gene_set_id: LIT:SARS_COV2_HOST_FACTORS
gene_set_name: SARS_COV2_HOST_FACTORS
collection: LIT:GENETIC
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Literature-defined set of human host genes REQUIRED for SARS-CoV-2 infection,
  taken from the two defining genome-wide CRISPR loss-of-function screens:
  Daniloski et al. (Cell 2021, PMID:33147445), performed in human ACE2-expressing
  A549 alveolar epithelial cells, and the companion screen of Wei et al. (Cell
  2021, PMID:33147444), performed in Vero-E6 cells with orthogonal validation in
  human cells. Critically, the members are host DEPENDENCY factors — cellular
  genes the virus hijacks, whose knockout makes cells RESISTANT — not antiviral
  restriction factors. The interpretive value of this set is therefore the
  convergent host MACHINERY the virus co-opts, which is non-obvious for "viral
  infection": top-ranked hits cluster into the vacuolar (V-)type ATPase proton
  pump and endosomal/lysosomal acidification (e.g. ATP6V1A, ATP6AP1), the
  endosomal protein-sorting Retromer and Commander (CCC) complexes that drive
  retrograde endosome-to-Golgi transport (VPS35/VPS29/VPS26, CCDC22/CCDC93/COMMD
  genes), class III PI3-kinase / VPS34 (PIK3C3) which generates the endosomal
  PI3P that recruits this sorting machinery, the small GTPase RAB7A controlling
  late-endosomal trafficking of the ACE2 receptor, and — in the Wei screen — the
  SWI/SNF chromatin-remodeling complex (SMARCA4, ARID1A) that is required for
  ACE2 expression. Single-cell RNA-seq of cells lacking top hits additionally
  revealed a convergent up-regulation of cholesterol biosynthesis, with raised
  intracellular cholesterol conferring resistance. Because these are
  loss-of-function screen hits rather than an expression signature, the carrier
  machinery (V-ATPase subunits, Retromer/Commander, PIK3C3, SWI/SNF) is itself in
  the set and carries the relevant GO annotations (annotation_supported); the
  cholesterol-biosynthesis arm is a downstream transcriptional convergence whose
  enzymes are not themselves screen hits (membership_gap). taxon kept human per
  corpus convention. msigdb_release and n_genes omitted: this is a ranked screen
  result with no single canonical hit count.
