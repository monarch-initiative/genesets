taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of podocytes (glomerular visceral epithelial
  cells) from human fetal kidney (Descartes atlas, MSigDB C8). Podocytes
  are highly specialised, terminally differentiated epithelial cells that
  wrap around glomerular capillaries, extending interdigitating foot
  processes bridged by slit diaphragms to form the glomerular filtration
  barrier. The signature reflects the core structural and physiological
  identity of the podocyte: selective macromolecular filtration, slit-
  diaphragm junction biology, and foot-process cytoskeletal organisation,
  together with a developmental component appropriate for the fetal
  tissue of origin.
