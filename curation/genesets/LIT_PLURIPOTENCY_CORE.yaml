gene_set_id: LIT:PLURIPOTENCY_CORE
gene_set_name: PLURIPOTENCY_CORE
collection: LIT:DISEASE_ACTIVITY
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: UP
description: >-
  Literature-defined cell-state ACTIVITY signature of the core pluripotency
  transcriptional program — the OCT4/SOX2/NANOG (POU5F1/SOX2/NANOG) core
  regulatory circuitry that maintains the self-renewing, undifferentiated state
  of human embryonic stem cells, mapped by Boyer, Young et al. (Cell 2005,
  PMID:16153702) using genome-scale location analysis (ChIP) of OCT4, SOX2 and
  NANOG in human ES cells. The authors showed that the three master factors
  co-occupy a substantial fraction of their target genes, autoregulate their own
  promoters, and form interconnected autoregulatory and feed-forward regulatory
  loops, and concluded that OCT4, SOX2 and NANOG contribute to pluripotency and
  self-renewal. Unlike MSigDB causal/driver disease pathway sets, the members
  here are the READOUT of an ACTIVE identity program, not driver mutations: they
  are the genes UP (high) in the pluripotent state. The panel is anchored by the
  core circuitry and its co-bound, positively regulated targets — POU5F1 (OCT4),
  SOX2, NANOG, FOXD3, TDGF1 (CRIPTO), SALL4, ZFP42 (REX1), LIN28A, DPPA4 and
  DNMT3B. Because the member genes literally carry the GO annotations for the
  processes the pluripotent state executes (stem-cell self-renewal, active
  repression of differentiation, master-transcription-factor-driven activation),
  enrichment recovers those processes (annotation_supported) rather than leaving
  them as gaps. STATE/DISEASE RELEVANCE: this active circuitry is the defining
  axis of pluripotency; its experimental re-activation is the basis of induced
  pluripotency (reprogramming), and aberrant expression of these same factors
  (OCT4/SOX2/NANOG/LIN28A) marks poorly differentiated, stem-like tumours. The
  program was defined in human embryonic stem cells in vitro; we keep the taxon
  human per corpus convention.
contexts:
  - term:
      id: CL:0002322
      label: embryonic stem cell
    context_type: cell_type
    role_note: >-
      The signature reads out the core OCT4/SOX2/NANOG pluripotency circuitry of
      the embryonic stem cell — the self-renewing, undifferentiated identity
      program, not any single disease. The pluripotent ES cell is therefore the
      anchoring context; the same factors define the inner cell mass in vivo and
      are the substrate of somatic-cell reprogramming.
