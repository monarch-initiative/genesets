gene_set_id: MSIGDB:TUCKER_HEART_VENTRICULAR_CARDIOMYOCYTE
gene_set_name: TUCKER_HEART_VENTRICULAR_CARDIOMYOCYTE
collection: C8
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of ventricular cardiomyocytes from human heart
  (Tucker et al.). Ventricular cardiomyocytes are striated, non-blood muscle
  cells that drive systolic contraction of the cardiac ventricles via organized
  sarcomere arrays. They have extremely high mitochondrial content and ATP
  demand to sustain continuous rhythmic contractile activity throughout life.
