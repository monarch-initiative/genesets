gene_set_id: LIT:PARKINSONS_GWAS_GENES
gene_set_name: PARKINSONS_GWAS_GENES
collection: LIT:GENETIC
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
n_genes: 92
description: >-
  Literature-defined panel of Parkinson's disease (PD) risk genes nominated by
  the largest PD genome-wide association study (GWAS) meta-analysis to date
  (Nalls MA, Blauwendraat C, Vallerga CL et al., Lancet Neurol 2019,
  PMID:31701892; 37,688 cases, 18,618 UK Biobank proxy-cases, 1.4 million
  controls). The study identified 90 independent genome-wide significant risk
  signals across 78 genomic regions, including 38 novel signals. Membership here
  was captured authoritatively from the EBI GWAS Catalog association download for
  this publication (https://www.ebi.ac.uk/gwas/api/search/downloads?q=pubmedId:31701892),
  taking the REPORTED GENE(S) per association, splitting the FAM47E-STBD1
  readthrough, dropping intergenic/lncRNA-only/uncharacterized entries
  (LINC00693, MAPT-AS1, CASC16, GS1-124K5.11, LOC100131289), and normalising
  every symbol to its current HGNC-approved form via mygene.info/genenames.org
  (FAM49B -> CYRIB; GBAP1 -> GBA1LP). GBA1LP (HGNC:4178, a pseudogene previously
  GBAP1) is retained because it is the authoritative reported gene tagging the
  flagship GBA1 lysosomal locus (the GWAS Catalog MAPPED_GENE at this signal is
  GBA1). Symbols were NOT padded from memory; the canonical monogenic PD genes
  (PINK1, PRKN, ATP13A2, DJ-1) are absent because they are not common-variant
  GWAS hits in this dataset. Unlike a transcriptional disease-activity readout,
  this is a DRIVER/risk panel: the members are the genes implicated by common
  genetic variation. Its value is mechanistic convergence. Because the panel was
  derived agnostically (genome-wide, with no pathway prior), the landmark,
  NON-OBVIOUS insight is that the risk genes converge on the
  lysosomal/autophagic axis -- the "PD is a lysosomal disorder" hypothesis --
  with members including GBA1LP (GBA1 locus), GALC, CTSB, SCARB2, TMEM175,
  GPNMB and VPS13C carrying lysosomal/autophagic functions, and the paper's own
  unbiased pathway-enrichment analysis recovering vacuolar (lysosomal) function
  among its top enriched gene sets. The dopaminergic/synaptic arm
  (synaptic-vesicle endocytosis and recycling: SH3GL2, NSF, VAMP4, SYT17, RIMS1,
  GAK, HIP1R, BIN3; and dopamine biosynthesis via GCH1) is also present but is
  the EXPECTED, confirmatory interpretation for a disorder defined by loss of
  nigral dopaminergic neurons. Mitochondrial biology -- a classic PD theme -- is
  only weakly represented here (e.g. CRLS1) because it is driven largely by
  monogenic genes outside this common-variant set.
contexts:
  - term:
      id: MONDO:0005180
      label: Parkinson disease
    context_type: disease
    role_note: >-
      PD risk genes nominated by common-variant GWAS (reported genes at the 90
      genome-wide significant risk signals); these are risk/driver loci, not a
      differential-expression signature.
associations:
  - term:
      id: GO:0005764
      label: lysosome
    aspect: cellular_component
    category: core_component
    confidence: high
    specificity: broadly_expressed
    seed_source: curator_added
    recovery_status: annotation_supported
    insight: mechanistic
    evidence:
      - reference: PMID:31701892
        reference_title: "Identification of novel risk loci, causal insights, and heritable risk for Parkinson's disease: a meta-analysis of genome-wide association studies."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "At least three candidate genes within novel loci are involved in lysosomal storage disorders (GUSB, GRN, and NEU1), a pathway of keen interest in PD."
        explanation: >-
          The headline non-obvious convergence of the agnostically derived PD
          GWAS panel is on the lysosome. Multiple members carry direct lysosomal
          component annotations -- GBA1LP marks the GBA1 locus (glucocerebrosidase,
          the major PD lysosomal gene), GALC (galactosylceramidase), CTSB
          (cathepsin B), SCARB2/LIMP-2, TMEM175 (lysosomal K+ channel) and
          GPNMB -- so a GO analysis of the panel recovers the lysosome
          (annotation_supported). The authors themselves flag lysosomal storage
          disorder genes among the risk loci, framing the lysosome as "a pathway
          of keen interest in PD". This lysosomal convergence is not predictable
          from the clinical dopaminergic phenotype, hence mechanistic.
    curator_note: >-
      This is the headline mechanistic insight of the set: a genome-wide,
      pathway-agnostic PD risk panel converges on lysosomal genes, the molecular
      core of the "PD is a lysosomal disorder" hypothesis. Kept core_component at
      high confidence because the lysosome is the dominant convergent compartment
      of the panel, not a peripheral hit.
  - term:
      id: GO:0006914
      label: autophagy
    aspect: biological_process
    category: core_process
    confidence: high
    specificity: broadly_expressed
    seed_source: curator_added
    recovery_status: annotation_supported
    insight: mechanistic
    evidence:
      - reference: PMID:31701892
        reference_title: "Identification of novel risk loci, causal insights, and heritable risk for Parkinson's disease: a meta-analysis of genome-wide association studies."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "including four related to vacuolar function and three related to known drug targets"
        explanation: >-
          The paper's unbiased FUMA pathway-enrichment analysis of the risk loci
          returned ten significantly enriched gene sets, four of which relate to
          vacuolar function -- the vacuole being the lysosomal/autophagic
          degradative compartment. Several members are autophagy effectors
          (VPS13C and LRRK2 in autophagosome-lysosome biology; RETREG3
          reticulophagy; STBD1 glycophagy; BAG3 chaperone-assisted selective
          autophagy), so the panel recovers autophagy (annotation_supported).
          This autophagic-degradation convergence, emerging from a
          pathway-agnostic GWAS, illuminates disease mechanism rather than
          recapitulating the set's construction, hence mechanistic.
    curator_note: >-
      Co-central with the lysosome term: together the lysosome and autophagy
      terms constitute the autophagy-lysosome (vacuolar degradation) axis that is
      the set's principal mechanistic insight. The supporting datum is the
      paper's own enrichment of vacuolar-function gene sets.
  - term:
      id: GO:0007040
      label: lysosome organization
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: broadly_expressed
    seed_source: curator_added
    recovery_status: annotation_gap
    insight: mechanistic
    curator_note: >-
      A biological-process facet of the lysosomal convergence: members such as
      TMEM175 (lysosomal ion homeostasis), VPS13C (lysosomal membrane lipid
      transfer) and SCARB2 act on lysosome biogenesis/organization, but these
      genes are better annotated to the lysosome CELLULAR COMPONENT than to the
      lysosome-organization BIOLOGICAL PROCESS, so a GO-BP enrichment may
      under-recover this term -- recorded as annotation_gap (a GO BP-annotation
      curation target), without weakening the mechanistic category. Marked
      supporting rather than core only to avoid double-counting the lysosomal
      axis already captured by the lysosome component term.
  - term:
      id: GO:0048488
      label: synaptic vesicle endocytosis
    aspect: biological_process
    category: supporting_process
    confidence: medium
    specificity: cell_type_specific
    seed_source: curator_added
    recovery_status: annotation_supported
    insight: confirmatory
    evidence:
      - reference: PMID:31701892
        reference_title: "Identification of novel risk loci, causal insights, and heritable risk for Parkinson's disease: a meta-analysis of genome-wide association studies."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "Our GWAS results also include candidate genes VAMP4 and NOD2 from the endocytic pathway."
        explanation: >-
          A real, well-annotated arm of the panel is synaptic-vesicle
          endocytosis/recycling: SH3GL2 (endophilin A1), NSF, VAMP4, SYT17,
          RIMS1, GAK and HIP1R are presynaptic vesicle-cycling genes that carry
          this annotation directly, and the authors explicitly highlight VAMP4
          and NOD2 from the endocytic pathway among the risk loci
          (annotation_supported). Marked confirmatory: synaptic/neuronal
          dysfunction is the expected interpretation for a neurodegenerative
          movement disorder and is entailed by the disease context, unlike the
          lysosomal convergence.
    curator_note: >-
      Presynaptic vesicle endocytosis and recycling is a genuine and
      annotation-supported convergent arm of the panel, but it is the expected
      neuronal interpretation for PD rather than a non-obvious mechanism, hence
      confirmatory.
  - term:
      id: GO:0042416
      label: dopamine biosynthetic process
    aspect: biological_process
    category: supporting_process
    confidence: low
    specificity: cell_type_specific
    seed_source: curator_added
    recovery_status: membership_gap
    insight: confirmatory
    curator_note: >-
      Loss of substantia-nigra dopaminergic neurons is the defining pathology of
      PD, so dopamine biosynthesis is the maximally expected (confirmatory)
      interpretation. Within this panel only GCH1 (GTP cyclohydrolase 1, rate-
      limiting for the tetrahydrobiopterin cofactor of tyrosine hydroxylase)
      directly touches dopamine synthesis; the core enzymes (TH, DDC) and other
      dopaminergic-identity genes are not common-variant GWAS hits and are absent
      from the set, so this is a membership_gap. Nalls 2019 does not report a
      verbatim dopamine-biosynthesis enrichment statement, so no snippet is
      attached (not fabricated).
  - term:
      id: GO:0005739
      label: mitochondrion
    aspect: cellular_component
    category: marker_driven_plausible
    confidence: low
    specificity: broadly_expressed
    seed_source: curator_added
    recovery_status: membership_gap
    insight: confirmatory
    curator_note: >-
      Mitochondrial dysfunction is a classic PD theme, but it is driven mainly by
      the monogenic recessive genes PINK1, PRKN and complex-I biology, which are
      NOT common-variant signals in this GWAS and are absent from the panel; only
      a few members (e.g. CRLS1, cardiolipin synthase of the mitochondrial inner
      membrane) are clearly mitochondrial, so this is a membership_gap and the
      category is only marker_driven_plausible. The Nalls 2019 full text reports
      no mitochondrial pathway among its enriched gene sets, so NO verbatim
      snippet can be grounded and none is fabricated; the insight is scored
      confirmatory (expected PD biology) rather than mechanistic because this
      common-variant panel provides no non-obvious mitochondrial signal.
