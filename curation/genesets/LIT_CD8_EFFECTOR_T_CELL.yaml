gene_set_id: LIT:CD8_EFFECTOR_T_CELL
gene_set_name: CD8_EFFECTOR_T_CELL
collection: LIT:DISEASE_ACTIVITY
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: UP
series: SERIES:CD8_TCELL_EXHAUSTION
series_role: effector
description: >-
  Literature-defined cell-state ACTIVITY signature of acute-antigen effector
  cytotoxic CD8+ T cells, the functional effector program profiled by Wherry,
  Ha, Kaech, Ahmed et al. (Immunity 2007, PMID:17950003) when they compared the
  gene-expression profiles of dysfunctional, exhausted lymphocytic
  choriomeningitis virus (LCMV)-specific CD8+ T cells from chronic infection to
  FUNCTIONAL LCMV-specific effector and memory CD8+ T cells generated after
  acute infection. Unlike MSigDB causal/driver disease pathway sets, the members
  here are the READOUT of an ACTIVE program, not driver mutations: they are the
  transcripts UP (high) in the antigen-activated, cytotoxic effector CD8 state.
  The signature is dominated by the canonical effector/cytotoxic markers — the
  cytotoxic granule effectors GZMB, GZMA, PRF1 and (in human) GNLY, the
  killer-lectin/degranulation markers NKG7 and KLRG1, the death-ligand FASLG,
  the hallmark effector cytokine IFNG (interferon-gamma), the master effector
  transcription factor TBX21 (T-bet), and the terminal-effector chemokine
  receptor CX3CR1. Because the member genes literally carry the GO annotations
  for the processes the effector state executes (cytotoxic killing, IFN-gamma
  production, antiviral defense), enrichment recovers those processes
  (annotation_supported) rather than leaving them as gaps. This set is the
  EFFECTOR pole of a two-state SERIES: it is paired with the EXHAUSTED CD8 T cell
  signature (series_role exhausted) from the same defining experiment, where the
  effector program is progressively lost as cells become exhausted during chronic
  antigen exposure. DISEASE RELEVANCE: loss of this effector cytotoxic program is
  the core lesion of T cell exhaustion in chronic viral infection and cancer, and
  its reinvigoration is the intended outcome of checkpoint-blockade immunotherapy.
  The signature was defined in the LCMV mouse model; we curate the
  human-orthologous program and keep the taxon human per corpus convention (of
  note, the cytotoxic effector GNLY/granulysin has no mouse ortholog and is a
  human-specific member).
contexts:
  - term:
      id: CL:0001050
      label: effector CD8-positive, alpha-beta T cell
    context_type: cell_type
    role_note: >-
      The signature reads out the acute-antigen effector cytotoxic state of the
      CD8-positive, alpha-beta T cell rather than any single disease. This is the
      functional effector pole generated after acute infection (the comparator
      against which exhaustion was defined), so the effector CD8 T cell type is
      the anchoring context rather than one MONDO disease; its contrasting pole in
      the series is the exhausted CD8 T cell state of chronic infection.
associations:
