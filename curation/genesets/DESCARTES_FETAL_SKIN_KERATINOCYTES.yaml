taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of keratinocytes from human fetal skin (Descartes
  atlas). Keratinocytes are the predominant cell type of the epidermis; they
  undergo a tightly orchestrated program of terminal differentiation as they
  migrate from the basal layer to the stratum corneum, progressively accumulating
  keratin intermediate filaments and ultimately assembling the cornified envelope
  that forms the physical skin barrier. This fetal signature captures early-stage
  keratinocyte identity and differentiation in developing skin.
