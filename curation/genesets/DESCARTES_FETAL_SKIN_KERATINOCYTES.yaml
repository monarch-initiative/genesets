        reference_title: "Skin Barrier in Atopic Dermatitis."
        supports: SUPPORT
        evidence_source: HUMAN_CLINICAL
        snippet: "the stratum corneum (SC) is critically dependent on terminal differentiation of epidermal keratinocytes, which transform into protein-rich corneocytes surrounded by extracellular lamellae of unique epidermal lipids, conferring permeability barrier function"
        explanation: >-
          Keratinocyte differentiation is the defining biological program of
          this cell type — the progressive transition from proliferative basal
          cells through spinous and granular layers to terminally differentiated
          corneocytes. This review directly links terminal differentiation of
          epidermal keratinocytes to stratum corneum formation and barrier
          function, establishing keratinocyte differentiation as the central
          process captured by this marker signature.
  - term:
