gene_set_id: LIT:AUTISM_RISK_GENES
gene_set_name: AUTISM_RISK_GENES
collection: LIT:GENETIC
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
n_genes: 102
description: >-
  Literature-defined panel of high-confidence autism spectrum disorder (ASD)
  risk genes from the largest ASD exome sequencing study to date (Satterstrom,
  Kosmicki, Wang et al., Cell 2020, PMID:31981491; n = 35,584 samples, 11,986
  with ASD). Integrating de novo and case-control rare variation, the study
  identifies 102 risk genes at FDR <= 0.1. Unlike the LIT:DISEASE_ACTIVITY
  signatures (which are transcriptional READOUTS of an active cell state), this
  is a DRIVER/causal panel: the members are the mutated genes themselves, defined
  by an excess of disruptive de novo and rare variants. Its value is mechanistic
  convergence. The paper shows the 102 genes fall into two major functional
  groups: gene-expression regulation (GER) -- chromatin regulators and
  transcription factors (e.g. CHD8, CHD2, ARID1B, POGZ, KMT2A, KMT2E, ADNP,
  SETD5, TBR1, BCL11A, FOXP1) -- and neuronal communication (NC) -- synaptic and
  ion-channel genes (e.g. SCN2A, SHANK3, SYNGAP1, GRIN2B, DYRK1A). The landmark,
  NON-OBVIOUS insight is the convergence on chromatin/transcriptional regulation:
  one would not predict, from the behavioral/synaptic phenotype of autism, that a
  large share of risk genes are nuclear regulators of gene expression. The
  synaptic/neuronal-communication convergence is also real and co-equal in the
  paper, but more expected for a neurodevelopmental disorder. Risk genes are
  expressed early (prenatally biased for GER genes) in brain development and are
  enriched in maturing excitatory and inhibitory neuronal lineages, consistent
  with multiple paths to an excitatory-inhibitory imbalance underlying ASD.
  Because the convergent processes ARE the direct, annotated molecular functions
  of these driver genes (chromatin regulators carry chromatin/transcription GO
  annotations; channel/scaffold genes carry synaptic annotations), a simple GO
  analysis over the 102 genes recovers them, so the core terms are
  annotation_supported rather than annotation gaps.
