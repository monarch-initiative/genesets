description: >-
  WikiPathways head and neck squamous cell carcinoma pathway gene set (MSigDB
  C2:CP:WIKIPATHWAYS, 74 genes). This is a cancer disease pathway gene set
  representing the principal mechanistic arms of HNSCC oncogenesis: EGFR/RTK
  overexpression and activation (EGFR is overexpressed in ~90% of HNSCC cases)
  driving downstream RAS/RAF/MEK/ERK (MAPK cascade) and PI3K/AKT/mTOR cascades
  that promote tumour cell proliferation and survival. Cell-cycle deregulation
  through loss or inactivation of TP53 and CDKN2A (p16/INK4A) together with
  cyclin D1 (CCND1) amplification and CDK4/6 activity allows G1/S checkpoint
  bypass. Apoptosis evasion via BCL2-family members and AKT-mediated survival
  signalling enables tumour progression, invasion, and metastasis. The gene set
  spans both HPV-negative (tobacco/alcohol-associated, high TP53/CDKN2A
  mutation load) and HPV-positive (oropharyngeal, PI3K-pathway enriched) HNSCC
  subtypes.
