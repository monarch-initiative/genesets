gene_set_id: MSIGDB:GAO_LARGE_INTESTINE_ADULT_CA_ENTEROENDOCRINE_CELLS
gene_set_name: GAO_LARGE_INTESTINE_ADULT_CA_ENTEROENDOCRINE_CELLS
collection: C8
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of enteroendocrine cells from adult human large
  intestine (Gao et al. colonic atlas, MSigDB C8). Enteroendocrine cells are the
  rare hormone-secreting epithelial cells of the intestinal lining: they sense
  luminal and neural cues and release peptide hormones and amines from regulated
  dense-core granules. The signature is dominated by the pan-endocrine secretory
  apparatus (secretogranins/chromogranins, prohormone convertases, dense-core
  vesicle exocytosis machinery), the enteroendocrine transcription-factor program
  (NEUROD1, INSM1, NKX2-2, RFX6, PAX4), and the serotonin-producing
  enterochromaffin signal (TPH1, SLC18A1).
contexts:
