gene_set_id: MSIGDB:KEGG_AUTOIMMUNE_THYROID_DISEASE
gene_set_name: KEGG_AUTOIMMUNE_THYROID_DISEASE
collection: C2:CP:KEGG_LEGACY
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  KEGG legacy autoimmune thyroid disease pathway gene set (MSigDB C2 curated gene set).
  This is a disease pathway gene set covering both Graves' disease (GD,
  autoantibody-mediated hyperthyroidism) and Hashimoto's thyroiditis (HT,
  T-cell-mediated hypothyroidism). Member genes are dominated by MHC class I and
  II antigen-presentation machinery (HLA-A, HLA-B, HLA-DRA, HLA-DRB1, HLA-DQA1,
  HLA-DQB1), cytotoxic T-cell effectors (granzymes, perforin), complement components,
  and immunoglobulin-related genes, reflecting the major mechanistic arms of the
  KEGG autoimmune thyroid disease pathway: MHC-restricted autoantigen presentation,
  CD8+ cytotoxic T-cell killing of thyrocytes, B-cell activation and autoantibody
  production against thyroid autoantigens (thyroglobulin, TPO, TSHR), and
  complement-mediated cytotoxicity. Shared pathway members with the KEGG type 1
  diabetes pathway include much of the MHC and cytotoxic machinery, reflecting the
  common adaptive-immune core of organ-specific autoimmunity.
