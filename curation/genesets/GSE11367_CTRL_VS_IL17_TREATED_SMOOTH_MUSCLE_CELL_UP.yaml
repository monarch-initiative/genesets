gene_set_id: MSIGDB:GSE11367_CTRL_VS_IL17_TREATED_SMOOTH_MUSCLE_CELL_UP
gene_set_name: GSE11367_CTRL_VS_IL17_TREATED_SMOOTH_MUSCLE_CELL_UP
collection: C7
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: UP
description: >-
  Genes upregulated in human smooth muscle cells treated with interleukin-17
  (IL-17) versus untreated control (GSE11367, MSigDB C7 immunologic-signature
  contrast). Reflects the transcriptional response of smooth muscle cells to
  IL-17-driven inflammatory signaling, including chemokine production, NF-kappaB
  activation, and neutrophil-recruiting responses.
