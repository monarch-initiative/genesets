gene_set_id: MSIGDB:HAY_BONE_MARROW_ERYTHROID
gene_set_name: HAY_BONE_MARROW_ERYTHROID
collection: C8
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: NA
description: >-
  Single-cell marker signature of erythroid-lineage cells (red blood cell
  precursors and erythrocytes) from human bone marrow (Hay et al.). Erythroid
  cells are a non-immune myeloid lineage whose defining function is the
  synthesis of hemoglobin and transport of oxygen to tissues.
