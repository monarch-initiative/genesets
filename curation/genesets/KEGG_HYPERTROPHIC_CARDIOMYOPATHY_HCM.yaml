direction: NA
description: >-
  KEGG legacy hypertrophic cardiomyopathy pathway gene set (MSigDB C2 curated gene set).
  This is a disease pathway gene set, not a cell-type signature. The member genes
  are dominated by sarcomere and contractile apparatus proteins (beta-myosin heavy
  chain MYH7, myosin-binding protein C MYBPC3, actin ACTC1, troponins TNNT2/TNNI3/
  TNNC1, tropomyosin TPM1, titin TTN, myosin light chains MYL2/MYL3), the
  dystrophin-glycoprotein complex (DMD, sarcoglycans, DAG1), and calcium-handling
  proteins (ATP2A2/SERCA2a, RYR2, PLN) whose mutation or dysregulation causes
  pathological left ventricular wall thickening and diastolic dysfunction. The set
  substantially overlaps the KEGG dilated cardiomyopathy gene set but emphasises
  the hypertrophic rather than dilated structural outcome. As a KEGG legacy pathway
  it reflects the established mechanistic arms and major disease genes known at the
  time of pathway curation.
