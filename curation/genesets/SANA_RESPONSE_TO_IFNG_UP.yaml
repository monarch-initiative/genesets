gene_set_id: MSIGDB:SANA_RESPONSE_TO_IFNG_UP
gene_set_name: SANA_RESPONSE_TO_IFNG_UP
collection: C2:CGP
msigdb_release: v2025.1.Hs
taxon:
  id: NCBITaxon:9606
  label: Homo sapiens
direction: UP
n_genes: 75
description: >-
  MSigDB C2:CGP signature of genes up-regulated by interferon-gamma (IFN-γ)
  stimulation across five primary human endothelial cell types (iliac artery,
  aortic, lung, colon, and dermal), as reported by Sana et al. (2005,
  PMID:15749026). A cytokine-perturbation UP signature: member genes are
  induced by IFN-γ in endothelium and encompass MHC class I antigen
  presentation machinery, CXCL chemokines (CXCL9/10/11), adhesion molecules
  (ICAM1), and interferon-stimulated genes. This is an independent endothelial
  dataset distinct from the Hallmark IFN-γ Response set (which is cell-type
  agnostic); both share the PR:000000017 interferon-gamma chemical_perturbagen
  context.
