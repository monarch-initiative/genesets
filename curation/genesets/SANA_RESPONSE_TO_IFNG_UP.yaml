    evidence:
      - reference: PMID:15749026
        reference_title: "Microarray analysis of primary endothelial cells challenged with different inflammatory and immune cytokines."
        supports: SUPPORT
        evidence_source: IN_VITRO
        snippet: "Overall, IFN-gamma caused the largest number of gene expression changes and its profile was least correlated with IL-4."
        explanation: >-
          Sana et al. challenged five primary human endothelial cell types
          with IFN-gamma and measured genome-wide gene expression changes by
          microarray. The SANA_RESPONSE_TO_IFNG_UP set is explicitly defined
          as genes elevated upon IFN-gamma stimulation across those endothelial
          cells, making cellular response to type II interferon (GO:0071346)
          the canonical and most direct GO descriptor of this signature.
  - term:
