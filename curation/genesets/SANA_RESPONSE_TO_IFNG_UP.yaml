    specificity: ubiquitous
    seed_source: enrichment_recovered
    recovery_status: annotation_supported
    curator_note: >-
      Translation is a ubiquitous housekeeping process. Its appearance in
      enrichment results reflects ribosomal protein genes present in the
      gene set and does not reflect an IFN-gamma-specific function in
      endothelial cells. Illustrates a non-informative enrichment hit.
