analysis: go_iba_impact_expression500
question: "Across 500 expression-derived MSigDB/GSE gene sets, which enrichment calls are retained, lost, or gained when current GOA human annotations are restricted from all NOT-filtered evidence to IBA-only evidence?"
binary: genesets-rs

query_sets:
  source_dir: expression_like/generated/msigdb_gse_500
  limit: 500
  selection: first N emitted sets from the source query snapshot
  fetch:
    query: "GSE*"
    source_filter: msigdb
    limit: 500
    min_genes: 20
    max_genes: 1000

snapshots:
  left:
    label: "2026-03-25 all evidence"
    dir: go_timepoints/generated/now_2026_03_25
    annotation_variant: all
    output_prefix: go_2026_03_25_all
  right:
    label: "2026-03-25 IBA only"
    dir: go_timepoints/generated/now_2026_03_25
    annotation_variant: iba
    output_prefix: go_2026_03_25_iba

statistics:
  min_overlap: 2
  max_p_adjust: 0.05
  correction: bonferroni

compare:
  p_adjust_cutoff: 0.05
  crossings_only: false

post_processing:
  ranked_term_scope:
    mode: include
    subset: goslim_generic
    snapshot: left
    include_descendants: true
    max_target_size: 1000

output:
  dir: ../notebooks/generated/go_iba_impact_expression500
  result_stem: expression500
